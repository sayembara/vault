<div class="card">
    <h2>💰 Fund Waterfall Configuration</h2>
    <p class="help-text">Prioritizes payouts in order. Calculations stop when the Total Fund is exhausted.</p>

    <div class="waterfall-setup">
        <h3 style="color: var(--accent); font-size: 0.9rem;">Phase 1: Minimum Guarantees</h3>
        <div class="grid">
            <div class="input-group">
                <label>Weekly Min (TBNB)</label>
                <input type="number" id="wk_min" value="1000">
            </div>
            <div class="input-group">
                <label>Season Min (TBNB)</label>
                <input type="number" id="sea_min" value="5000">
            </div>
            <div class="input-group">
                <label>Constructor Min (TBNB)</label>
                <input type="number" id="con_min" value="2000">
            </div>
        </div>

        <h3 style="color: var(--accent); font-size: 0.9rem; margin-top: 20px;">Phase 2: Performance Caps</h3>
        <div class="grid">
            <div class="input-group">
                <label>Weekly Max (TBNB)</label>
                <input type="number" id="wk_max" value="5000">
            </div>
            <div class="input-group">
                <label>Season Max (TBNB)</label>
                <input type="number" id="sea_max" value="25000">
            </div>
            <div class="input-group">
                <label>Constructor Max (TBNB)</label>
                <input type="number" id="con_max" value="10000">
            </div>
        </div>
    </div>

    <div class="card" style="background: #0d1117; margin-top: 20px; border-style: dashed;">
        <label>Current Total Fund: <span id="display_total_fund">15000</span> TBNB</label>
        <div id="waterfall_result" style="font-family: monospace; font-size: 0.85rem; line-height: 1.6;">
            </div>
    </div>
</div>

<script>
    function calculateWaterfall(totalFund) {
        // Values from inputs
        const wkMin = parseFloat(document.getElementById('wk_min').value);
        const seaMin = parseFloat(document.getElementById('sea_min').value);
        const conMin = parseFloat(document.getElementById('con_min').value);
        
        const wkMax = parseFloat(document.getElementById('wk_max').value);
        const seaMax = parseFloat(document.getElementById('sea_max').value);
        const conMax = parseFloat(document.getElementById('con_max').value);

        let remaining = totalFund;
        let payout = { weekly: 0, season: 0, constructor: 0, overflow: 0 };

        // 1. Weekly Min
        payout.weekly = Math.min(remaining, wkMin);
        remaining -= payout.weekly;

        // 2. Season Min
        payout.season = Math.min(remaining, seaMin);
        remaining -= payout.season;

        // 3. Constructor Min
        payout.constructor = Math.min(remaining, conMin);
        remaining -= payout.constructor;

        // 4. Weekly Top-up (to Max)
        let wkTopUp = Math.min(remaining, wkMax - payout.weekly);
        payout.weekly += wkTopUp;
        remaining -= wkTopUp;

        // 5. Season Top-up (to Max)
        let seaTopUp = Math.min(remaining, seaMax - payout.season);
        payout.season += seaTopUp;
        remaining -= seaTopUp;

        // 6. Constructor Top-up (to Max)
        let conTopUp = Math.min(remaining, conMax - payout.constructor);
        payout.constructor += conTopUp;
        remaining -= conTopUp;

        // 7. Overflow
        payout.overflow = remaining;

        displayResults(payout);
    }

    function displayResults(p) {
        const div = document.getElementById('waterfall_result');
        div.innerHTML = `
            <div style="color: #fff">Weekly Allocation: ${p.weekly.toFixed(2)} TBNB</div>
            <div style="color: #fff">Season Allocation: ${p.season.toFixed(2)} TBNB</div>
            <div style="color: #fff">Constructor Allocation: ${p.constructor.toFixed(2)} TBNB</div>
            <hr style="border: 0; border-top: 1px solid #333;">
            <div style="color: var(--accent)">💰 OVERFLOW (To Reserve): ${p.overflow.toFixed(2)} TBNB</div>
        `;
    }
</script>
