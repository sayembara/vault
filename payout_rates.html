<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Economic Config</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #0b0e14; --card: #161b22; --border: #30363d; --dim: #8b949e; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 40px; display: flex; justify-content: center; }
        
        .config-card { width: 100%; max-width: 500px; background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; color: var(--dim); text-align: center; }
        
        .input-group { margin-bottom: 30px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; }
        
        input[type=number] { 
            width: 100%; background: #0d1117; border: 2px solid var(--border); color: white; padding: 20px; 
            border-radius: 12px; font-size: 2.5rem; font-family: monospace; text-align: center; outline: none; transition: 0.3s;
        }
        input[type=number]:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,255,204,0.2); }

        .btn-save { 
            width: 100%; background: var(--accent); color: black; border: none; padding: 20px; 
            border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        .btn-save:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        .preview-chart { height: 150px; margin-top: 30px; opacity: 0.6; }
        .status-msg { text-align: center; font-size: 0.8rem; margin-top: 20px; color: var(--dim); height: 20px; }
    </style>
</head>
<body>

<div class="config-card">
    <h1>Global Payout Curve</h1>
    
    <div class="input-group">
        <label>Base Beta (β) Control</label>
        <input type="number" id="beta-val" value="4.0" step="0.1" oninput="updatePreview()">
    </div>

    <button class="btn-save" onclick="saveBeta()">Update Global Beta</button>
    
    <div id="status" class="status-msg"></div>

    <div class="preview-chart">
        <canvas id="miniChart"></canvas>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let chart;

    // Load existing Beta on startup
    window.onload = async () => {
        const snap = await db.ref('settings/global_beta').once('value');
        if (snap.exists()) {
            document.getElementById('beta-val').value = snap.val();
        }
        updatePreview();
    };

    function updatePreview() {
        const beta = parseFloat(document.getElementById('beta-val').value) || 4.0;
        const data = [];
        const n = 100; // Sample N for preview
        const denom = 1 - Math.exp(-beta);
        
        for (let r = 1; r <= 80; r++) {
            data.push(Math.exp(-beta * (r - 1) / n) / denom);
        }
        renderChart(data);
    }

    async function saveBeta() {
        const beta = parseFloat(document.getElementById('beta-val').value);
        const status = document.getElementById('status');
        
        try {
            await db.ref('settings/global_beta').set(beta);
            status.innerText = "✓ Beta successfully updated in Firebase";
            status.style.color = "var(--accent)";
            setTimeout(() => status.innerText = "", 3000);
        } catch (e) {
            status.innerText = "Error: " + e.message;
            status.style.color = "red";
        }
    }

    function renderChart(data) {
        const ctx = document.getElementById('miniChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map((_, i) => i),
                datasets: [{ data: data, borderColor: '#00ffcc', pointRadius: 0, fill: false, borderWidth: 2 }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { x: { display: false }, y: { display: false } },
                plugins: { legend: { display: false } }
            }
        });
    }
</script>
</body>
</html>
