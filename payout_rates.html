<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Exponential Economy v3</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #0b0e14; --card: #161b22; --border: #30363d; --dim: #8b949e; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 30px; margin: 0; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; }
        label { display: block; font-size: 0.6rem; color: var(--dim); text-transform: uppercase; margin-bottom: 8px; font-weight: 800; }
        input { width: 100%; background: #0d1117; border: 1px solid var(--border); color: var(--accent); padding: 10px; border-radius: 6px; box-sizing: border-box; font-family: monospace; font-size: 1.1rem; outline: none; }
        
        /* Toggle Switch */
        .switch-group { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        .chart-container { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; height: 300px; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        th { background: rgba(255,255,255,0.03); text-align: left; padding: 12px; font-size: 0.65rem; color: var(--dim); text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); font-family: monospace; }
        
        .tier-tag { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .diamond { background: rgba(0, 255, 204, 0.1); color: var(--accent); }
        .plat { background: rgba(179, 0, 255, 0.1); color: #b300ff; }
        .gold { background: rgba(255, 215, 0, 0.1); color: #ffd700; }
        .silver { background: rgba(255, 255, 255, 0.05); color: #fff; }
    </style>
</head>
<body>

<div class="grid">
    <div class="card">
        <label>Total Cars (N)</label>
        <input type="number" id="N" value="20" oninput="run()">
    </div>
    <div class="card">
        <label>Total Pool (P)</label>
        <input type="number" id="P" value="10000" oninput="run()">
    </div>
    <div class="card">
        <label>Base Beta (β)</label>
        <input type="number" id="beta" value="4.0" step="0.1" oninput="run()">
    </div>
</div>

<div class="switch-group">
    <label class="switch">
        <input type="checkbox" id="small_race_toggle" onchange="run()" checked>
        <span class="slider"></span>
    </label>
    <div style="font-size: 0.8rem; font-weight: bold;">Enable Small Race Optimization (Auto-Beta 1.5 if N < 20)</div>
</div>

<div class="chart-container">
    <canvas id="expChart"></canvas>
</div>

<table>
    <thead>
        <tr>
            <th>Rank</th>
            <th>Tier</th>
            <th>Payout (TBNB)</th>
            <th>% of Pot</th>
        </tr>
    </thead>
    <tbody id="payout_list"></tbody>
</table>

<script>
    let chart;

    function run() {
        const N = parseInt(document.getElementById('N').value) || 1;
        const P = parseFloat(document.getElementById('P').value) || 0;
        let beta = parseFloat(document.getElementById('beta').value) || 0.1;
        const useSmartBeta = document.getElementById('small_race_toggle').checked;

        // Apply Toggle Logic
        if (N < 20 && useSmartBeta) {
            beta = 1.5; 
        }

        const cutoff = Math.max(1, Math.floor(0.8 * N));
        const denomConst = 1 - Math.exp(-beta);
        
        // 1. Calculate Alpha (Summing the exponential sequence)
        let sumPart = 0;
        for (let r = 1; r <= cutoff; r++) {
            sumPart += Math.exp(-beta * (r - 1) / N) / denomConst;
        }
        const alpha = N / sumPart;

        // 2. Generate and Sort Payouts
        let payouts = [];
        for (let r = 1; r <= cutoff; r++) {
            const val = (P / N) * ((alpha * Math.exp(-beta * (r - 1) / N)) / denomConst);
            payouts.push({ rank: r, val: val });
        }

        // 3. Render Table (Corrected Sorting)
        const list = document.getElementById('payout_list');
        list.innerHTML = '';
        
        // Show Top 20 or all if less than 20
        const displayRows = payouts.slice(0, 20);
        displayRows.forEach(item => {
            let tierClass = 'silver';
            let tierName = 'Silver';
            const r = item.rank;

            if (r <= N * 0.05) { tierClass = 'diamond'; tierName = 'Diamond'; }
            else if (r <= N * 0.20) { tierClass = 'plat'; tierName = 'Platinum'; }
            else if (r <= N * 0.50) { tierClass = 'gold'; tierName = 'Gold'; }

            list.innerHTML += `
                <tr>
                    <td>#${r}</td>
                    <td><span class="tier-tag ${tierClass}">${tierName}</span></td>
                    <td>${item.val.toFixed(4)}</td>
                    <td>${((item.val / P) * 100).toFixed(2)}%</td>
                </tr>`;
        });

        updateChart(payouts);
    }

    function updateChart(data) {
        const ctx = document.getElementById('expChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(d => d.rank),
                datasets: [{
                    label: 'Payout',
                    data: data.map(d => d.val),
                    borderColor: '#00ffcc',
                    backgroundColor: 'rgba(0, 255, 204, 0.1)',
                    fill: true,
                    pointRadius: data.length < 50 ? 3 : 0,
                    tension: 0.2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } },
                    y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    window.onload = run;
</script>
</body>
</html>
