<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payout Policy | SANRAT</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #0b0e14; --card: #161b22; --border: #30363d; --warning: #f1c40f; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: var(--accent); font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; }

        .tier-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 30px; }
        .tier-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .tier-title { color: var(--accent); font-weight: 900; text-transform: uppercase; font-size: 0.9rem; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 0.6rem; color: #8b949e; text-transform: uppercase; padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        
        .rank-label { font-family: monospace; font-weight: bold; color: #8b949e; width: 100px; }
        input { background: #0d1117; border: 1px solid var(--border); color: var(--accent); padding: 8px; border-radius: 4px; width: 80px; font-weight: bold; text-align: center; outline: none; }
        input:focus { border-color: var(--accent); }

        .checksum { font-size: 0.7rem; font-weight: 800; }
        .valid { color: var(--accent); }
        .invalid { color: #ff4b2b; }

        .btn-save { background: var(--accent); color: black; border: none; padding: 15px 40px; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.2s; }
        .btn-save:hover { filter: brightness(1.1); transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 Payout Percentage Editor</h1>
        <div id="status" style="font-size: 0.7rem; color: #555;">READY</div>
    </div>

    <div class="tier-section" id="section_tier1">
        <div class="tier-header">
            <div class="tier-title">Tier A: Small Grid (Top 5 Payout)</div>
            <div class="checksum" id="check_tier1">Total: 0%</div>
        </div>
        <table id="table_tier1">
            <thead><tr><th>Ranking</th><th>% of Prize Pool</th></tr></thead>
            <tbody id="body_tier1"></tbody>
        </table>
    </div>

    <div class="tier-section" id="section_tier2">
        <div class="tier-header">
            <div class="tier-title">Tier B: Mid Grid (Top 10 Payout)</div>
            <div class="checksum" id="check_tier2">Total: 0%</div>
        </div>
        <table id="table_tier2">
            <thead><tr><th>Ranking</th><th>% of Prize Pool</th></tr></thead>
            <tbody id="body_tier2"></tbody>
        </table>
    </div>

    <div class="tier-section" id="section_tier3">
        <div class="tier-header">
            <div class="tier-title">Tier C: Full Grid (Top 15 Payout)</div>
            <div class="checksum" id="check_tier3">Total: 0%</div>
        </div>
        <table id="table_tier3">
            <thead><tr><th>Ranking</th><th>% of Prize Pool</th></tr></thead>
            <tbody id="body_tier3"></tbody>
        </table>
    </div>

    <button class="btn-save" onclick="savePolicies()">Save Payout Structures</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const config = [
        { id: 'tier1', label: 'Small', ranks: 5 },
        { id: 'tier2', label: 'Mid', ranks: 10 },
        { id: 'tier3', label: 'Full', ranks: 15 }
    ];

    window.onload = () => {
        // Initialize tables
        config.forEach(tier => {
            const container = document.getElementById(`body_${tier.id}`);
            for(let i=1; i<=tier.ranks; i++) {
                container.innerHTML += `
                    <tr>
                        <td class="rank-label">P${i}</td>
                        <td><input type="number" step="0.1" class="in-${tier.id}" data-rank="${i}" oninput="validate('${tier.id}')" value="0"> %</td>
                    </tr>`;
            }
        });

        // Load existing data
        db.ref('payout_rates').once('value', snap => {
            const val = snap.val();
            if(val) {
                config.forEach(tier => {
                    if(val[tier.id]) {
                        Object.keys(val[tier.id]).forEach(rank => {
                            const input = document.querySelector(`.in-${tier.id}[data-rank="${rank}"]`);
                            if(input) input.value = val[tier.id][rank];
                        });
                        validate(tier.id);
                    }
                });
            }
        });
    };

    function validate(tierId) {
        const inputs = document.querySelectorAll(`.in-${tierId}`);
        let total = 0;
        inputs.forEach(i => total += parseFloat(i.value || 0));
        
        const display = document.getElementById(`check_${tierId}`);
        display.innerText = `Total: ${total.toFixed(1)}%`;
        
        if(total === 100) {
            display.className = "checksum valid";
        } else {
            display.className = "checksum invalid";
        }
        return total;
    }

    function savePolicies() {
        const data = {};
        let allValid = true;

        config.forEach(tier => {
            const tierTotal = validate(tier.id);
            if(tierTotal !== 100) allValid = false;

            data[tier.id] = {};
            const inputs = document.querySelectorAll(`.in-${tier.id}`);
            inputs.forEach(i => {
                data[tier.id][i.getAttribute('data-rank')] = parseFloat(i.value || 0);
            });
        });

        if(!allValid) {
            if(!confirm("One or more tiers do not equal 100%. Save anyway?")) return;
        }

        db.ref('payout_rates').set(data).then(() => {
            document.getElementById('status').innerText = "LAST SAVED: " + new Date().toLocaleTimeString();
            alert("Payout Policies Synchronized.");
        });
    }
</script>
</body>
</html>
