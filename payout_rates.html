<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Band-Based Payout Simulator | SANRAT</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #0b0e14; --card: #161b22; --border: #30363d; --dim: #8b949e; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 30px; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .input-group { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; }
        label { display: block; font-size: 0.65rem; color: var(--dim); text-transform: uppercase; margin-bottom: 10px; font-weight: 800; }
        input { width: 100%; background: #0d1117; border: 1px solid var(--border); color: var(--accent); padding: 10px; border-radius: 6px; box-sizing: border-box; font-family: monospace; font-size: 1.2rem; }

        .table-container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.02); text-align: left; padding: 15px; font-size: 0.7rem; color: var(--dim); text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        
        .band-name { font-weight: 900; color: var(--accent); }
        .val-main { font-family: monospace; font-weight: bold; }
        
        .chart-container { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; height: 300px; }
        .ladder-check { font-size: 0.7rem; font-weight: bold; padding: 4px 8px; border-radius: 4px; }
        .ok { background: rgba(0,255,204,0.1); color: var(--accent); }
        .fail { background: rgba(255,75,43,0.1); color: #ff4b2b; }
    </style>
</head>
<body>

<h1>Band-Based Payout Simulation</h1>

<div class="controls">
    <div class="input-group">
        <label>Total Participants (N)</label>
        <input type="number" id="num_n" value="1000" oninput="calculate()">
    </div>
    <div class="input-group">
        <label>Total Prize Pool (TBNB)</label>
        <input type="number" id="total_pot" value="10000" oninput="calculate()">
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Band</th>
                <th>Participants</th>
                <th>Share of Pot</th>
                <th>Best Case (P1 of Band)</th>
                <th>Worst Case (Last of Band)</th>
                <th>Ladder Status</th>
            </tr>
        </thead>
        <tbody id="payout_rows"></tbody>
    </table>
</div>

<div class="chart-container">
    <canvas id="payoutChart"></canvas>
</div>

<script>
    let myChart;

    const bands = [
        { name: "Band A (Top 1%)", percent: 0.01, pot_share: 0.25 },
        { name: "Band B (Next 9%)", percent: 0.09, pot_share: 0.25 },
        { name: "Band C (Next 20%)", percent: 0.20, pot_share: 0.20 },
        { name: "Band D (Next 30%)", percent: 0.30, pot_share: 0.15 },
        { name: "Band E (Next 20%)", percent: 0.20, pot_share: 0.15 },
        { name: "Band F (Bottom 20%)", percent: 0.20, pot_share: 0.00 }
    ];

    function calculate() {
        const N = parseInt(document.getElementById('num_n').value) || 0;
        const total_pot = parseFloat(document.getElementById('total_pot').value) || 0;
        const tbody = document.getElementById('payout_rows');
        tbody.innerHTML = '';
        
        let current_rank = 1;
        let chartLabels = [];
        let chartData = [];
        let bandResults = [];

        bands.forEach((band, index) => {
            let band_size = Math.max(1, Math.round(N * band.percent));
            
            // Adjust last band to match total N
            if (index === bands.length - 1) {
                band_size = N - (current_rank - 1);
            }

            if (band_size <= 0) return;

            const band_pot = total_pot * band.pot_share;
            let sum_weights = (band_size * (band_size + 1)) / 2;
            let band_payouts = [];

            for (let i = 0; i < band_size; i++) {
                let weight = (band_size - i);
                let payout = band_pot * (weight / sum_weights);
                
                band_payouts.push(payout);
                
                // Only sample data for graph if N is large to avoid lag
                if (N < 500 || i % Math.floor(N/100) === 0 || i === 0 || i === band_size - 1) {
                    chartLabels.push(`Rank ${current_rank + i}`);
                    chartData.push(payout);
                }
            }

            const p_first = band_payouts[0] || 0;
            const p_last = band_payouts[band_payouts.length - 1] || 0;

            bandResults.push({ name: band.name, size: band_size, p1: p_first, pLast: p_last });
            current_rank += band_size;
        });

        // Render Table & Check Ladder
        bandResults.forEach((res, i) => {
            let ladderHtml = '-';
            if (i < bandResults.length - 1 && bandResults[i+1].p1 > 0) {
                const isOk = res.pLast >= bandResults[i+1].p1;
                ladderHtml = isOk ? 
                    '<span class="ladder-check ok">✓ LADDER OK</span>' : 
                    '<span class="ladder-check fail">⚠ GAP ERROR</span>';
            }

            tbody.innerHTML += `
                <tr>
                    <td class="band-name">${res.name}</td>
                    <td>${res.size} cars</td>
                    <td>${(bands[i].pot_share * 100).toFixed(0)}%</td>
                    <td class="val-main">${res.p1.toFixed(2)}</td>
                    <td class="val-main">${res.pLast.toFixed(2)}</td>
                    <td>${ladderHtml}</td>
                </tr>
            `;
        });

        updateChart(chartLabels, chartData);
    }

    function updateChart(labels, data) {
        const ctx = document.getElementById('payoutChart').getContext('2d');
        if (myChart) myChart.destroy();
        
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Prize Amount (TBNB)',
                    data: data,
                    borderColor: '#00ffcc',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(0, 255, 204, 0.1)',
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { display: false },
                    y: { ticks: { color: '#8b949e' }, grid: { color: '#30363d' } }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });
    }

    window.onload = calculate;
</script>

</body>
</html>
