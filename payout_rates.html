<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exponential Payout Engine | SANRAT</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #0b0e14; --card: #161b22; --border: #30363d; --dim: #8b949e; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; }
        label { display: block; font-size: 0.65rem; color: var(--dim); text-transform: uppercase; margin-bottom: 10px; font-weight: 800; }
        input { width: 100%; background: #0d1117; border: 1px solid var(--border); color: var(--accent); padding: 10px; border-radius: 6px; box-sizing: border-box; font-family: monospace; font-size: 1.2rem; outline: none;}
        
        table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-top: 20px;}
        th { background: rgba(255,255,255,0.02); text-align: left; padding: 12px; font-size: 0.7rem; color: var(--dim); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); font-family: monospace; }
        
        .chart-container { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; height: 350px; margin-top: 20px; }
        .p1-box { color: var(--accent); font-size: 1.5rem; font-weight: 900; }
    </style>
</head>
<body>

<h1>Exponential Prize Engine</h1>

<div class="grid">
    <div class="card">
        <label>Total Participants (N)</label>
        <input type="number" id="N" value="1000" oninput="run()">
    </div>
    <div class="card">
        <label>Total Pot (P)</label>
        <input type="number" id="P" value="10000" oninput="run()">
    </div>
    <div class="card">
        <label>Decay Constant (β)</label>
        <input type="number" id="beta" value="4" step="0.1" oninput="run()">
    </div>
</div>

<div class="grid">
    <div class="card">
        <label>Winner (P1)</label>
        <div id="p1_val" class="p1-box">0</div>
    </div>
    <div class="card">
        <label>Payout Cutoff (80% of N)</label>
        <div id="cutoff_val" class="p1-box" style="color: #b300ff;">0</div>
    </div>
    <div class="card">
        <label>Total Distributed</label>
        <div id="sum_val" class="p1-box" style="color: white;">0</div>
    </div>
</div>

<div class="chart-container">
    <canvas id="expChart"></canvas>
</div>

<table>
    <thead>
        <tr>
            <th>Rank</th>
            <th>Payout (TBNB)</th>
            <th>% of Pot</th>
        </tr>
    </thead>
    <tbody id="payout_list"></tbody>
</table>

<script>
    let chart;

    function run() {
        const N = parseInt(document.getElementById('N').value);
        const P = parseFloat(document.getElementById('P').value);
        const beta = parseFloat(document.getElementById('beta').value);
        const cutoff = Math.floor(0.8 * N); // Formula uses 0.8N as sum limit

        // 1. Calculate the denominator for Alpha (Normalization)
        let sumPart = 0;
        const denominator_const = 1 - Math.exp(-beta);
        
        for (let r = 1; r <= cutoff; r++) {
            sumPart += Math.exp(-beta * (r - 1) / N) / denominator_const;
        }

        const alpha = N / sumPart;

        // 2. Generate Payouts
        let payouts = [];
        let totalSum = 0;

        for (let r = 1; r <= cutoff; r++) {
            const val = (P / N) * ((alpha * Math.exp(-beta * (r - 1) / N)) / denominator_const);
            payouts.push(val);
            totalSum += val;
        }

        // 3. UI Updates
        document.getElementById('p1_val').innerText = payouts[0].toFixed(2);
        document.getElementById('cutoff_val').innerText = payouts[payouts.length - 1].toFixed(2);
        document.getElementById('sum_val').innerText = totalSum.toFixed(0);

        const list = document.getElementById('payout_list');
        list.innerHTML = '';
        // Show Top 10 and then some samples
        payouts.slice(0, 10).forEach((v, i) => {
            list.innerHTML += `<tr><td>${i+1}</td><td>${v.toFixed(4)}</td><td>${((v/P)*100).toFixed(2)}%</td></tr>`;
        });

        updateChart(payouts);
    }

    function updateChart(data) {
        const ctx = document.getElementById('expChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map((_, i) => i + 1),
                datasets: [{
                    label: 'Exponential Payout',
                    data: data,
                    borderColor: '#00ffcc',
                    backgroundColor: 'rgba(0, 255, 204, 0.1)',
                    fill: true,
                    pointRadius: 0,
                    tension: 0.2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { display: false },
                    y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    window.onload = run;
</script>
</body>
</html>
