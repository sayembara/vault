<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Distribution Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #0b0e14; --card: #161b22; --border: #30363d; --dim: #8b949e; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 25px; }
        
        /* Navigation */
        .mode-nav { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn-mode { flex: 1; background: var(--card); border: 1px solid var(--border); color: var(--dim); padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 0.7rem; transition: 0.2s; }
        .btn-mode.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }

        /* Stats Display */
        .stats-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; position: relative;}
        .stat-card label { display: block; font-size: 0.6rem; color: var(--dim); text-transform: uppercase; margin-bottom: 5px; font-weight: 800; }
        .stat-val { font-size: 1.6rem; font-weight: 900; }
        .opt-indicator { position: absolute; top: 15px; right: 15px; font-size: 0.6rem; color: var(--accent); border: 1px solid var(--accent); padding: 2px 6px; border-radius: 4px; display: none;}

        /* Execution Control */
        .exec-panel { background: #1c2128; border: 1px solid var(--border); padding: 25px; border-radius: 12px; margin-bottom: 25px; display: flex; align-items: flex-end; gap: 20px; }
        .beta-input-group { flex: 1; }
        .beta-input-group input { width: 100%; background: #0d1117; border: 1px solid var(--border); color: var(--accent); padding: 15px; border-radius: 8px; font-size: 1.5rem; font-family: monospace; outline: none; transition: border 0.3s; }
        .beta-input-group input:focus { border-color: var(--accent); }

        .btn-main { background: var(--accent); color: black; border: none; padding: 15px 45px; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; height: 58px; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,255,204,0.2); }
        .btn-main:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-main:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Visualization */
        .chart-container { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; height: 280px; margin-bottom: 25px; }
        
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        th { background: rgba(255,255,255,0.03); text-align: left; padding: 12px; font-size: 0.6rem; color: var(--dim); text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); font-family: monospace; font-size: 0.9rem; }
        .rank-col { color: var(--dim); width: 60px; }
        .prize-col { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="mode-nav">
    <button id="btn-round" class="btn-mode active" onclick="switchMode('round')">Round</button>
    <button id="btn-season" class="btn-mode" onclick="switchMode('season')">Season</button>
    <button id="btn-constructor" class="btn-mode" onclick="switchMode('constructor')">Constructor</button>
</div>

<div class="stats-bar">
    <div class="stat-card">
        <label id="n-label">Participants (N)</label>
        <div id="val-n" class="stat-val">--</div>
        <div id="opt-tag" class="opt-indicator">Auto-Beta ACTIVE</div>
    </div>
    <div class="stat-card">
        <label>Total Pool (P)</label>
        <div id="val-p" class="stat-val">-- <small style="font-size: 0.7rem; color:var(--dim)">TBNB</small></div>
    </div>
</div>

<div class="exec-panel">
    <div class="beta-input-group">
        <label>Adjust Base Beta (β)</label>
        <input type="number" id="beta-in" value="4.0" step="0.1" oninput="calculate()">
    </div>
    <button id="exec-btn" class="btn-main" onclick="distribute()">Finalize & Distribute</button>
</div>

<div class="chart-container"><canvas id="prizeChart"></canvas></div>

<table>
    <thead><tr><th class="rank-col">Rank</th><th>Entity/Player</th><th class="prize-col">Prize</th><th>Share</th></tr></thead>
    <tbody id="table-body"></tbody>
</table>

<script>
    const firebaseConfig = { databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let chart, currentMode = 'round';
    let localN = 0, localP = 0, localList = [];
    let activePayouts = [];

    async function switchMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${mode}`).classList.add('active');
        
        let nPath, pPath, listPath;
        if(mode === 'round') {
            nPath = 'race_stats/day7/total_cars';
            pPath = 'funding/round_fund';
            listPath = 'race_results/day7_final_leaderboard';
            document.getElementById('n-label').innerText = "Round Cars (Day 7)";
        } else if(mode === 'season') {
            nPath = 'season_stats/cars_with_points';
            pPath = 'funding/season_fund';
            listPath = 'season_results/leaderboard';
            document.getElementById('n-label').innerText = "Season Cars w/ Points";
        } else {
            nPath = 'constructor_stats/teams_with_points';
            pPath = 'funding/constructor_fund';
            listPath = 'constructor_results/leaderboard';
            document.getElementById('n-label').innerText = "Constructor Teams";
        }

        const [nSnap, pSnap, listSnap] = await Promise.all([
            db.ref(nPath).once('value'),
            db.ref(pPath).once('value'),
            db.ref(listPath).orderByChild('rank').once('value')
        ]);

        localN = nSnap.val() || 0;
        localP = pSnap.val() || 0;
        localList = [];
        listSnap.forEach(c => localList.push({ id: c.key, name: c.val().name || c.key, rank: c.val().rank }));

        document.getElementById('val-n').innerText = localN;
        document.getElementById('val-p').innerText = localP.toLocaleString();
        calculate();
    }

    function calculate() {
        if (!localN) return;
        let beta = parseFloat(document.getElementById('beta-in').value) || 4.0;
        
        // Small Race Optimization (Locked)
        if (localN < 20) {
            beta = 1.5;
            document.getElementById('opt-tag').style.display = 'block';
        } else {
            document.getElementById('opt-tag').style.display = 'none';
        }

        const cutoff = Math.max(1, Math.floor(0.8 * localN));
        const denom = 1 - Math.exp(-beta);
        
        let sumPart = 0;
        for (let r = 1; r <= cutoff; r++) sumPart += Math.exp(-beta * (r - 1) / localN) / denom;
        const alpha = localN / sumPart;

        activePayouts = [];
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        for (let r = 1; r <= cutoff; r++) {
            const val = (localP / localN) * ((alpha * Math.exp(-beta * (r - 1) / localN)) / denom);
            activePayouts.push(val);
            
            if (r <= 25) { // Table preview top 25
                const player = localList.find(p => p.rank === r) || { name: '---' };
                tbody.innerHTML += `<tr><td class="rank-col">#${r}</td><td>${player.name}</td><td class="prize-col">${val.toFixed(4)}</td><td style="color:var(--dim)">${((val/localP)*100).toFixed(2)}%</td></tr>`;
            }
        }
        updateChart();
    }

    async function distribute() {
        if (!confirm(`PUSH TO BLOCKCHAIN: Distribute ${localP} TBNB to ${activePayouts.length} participants?`)) return;
        const btn = document.getElementById('exec-btn');
        btn.disabled = true;
        btn.innerText = "Writing to Database...";

        try {
            for (let i = 0; i < activePayouts.length; i++) {
                const player = localList[i];
                const amount = activePayouts[i];
                if (player && amount > 0) {
                    const ref = db.ref(`players/${player.id}/pending_claim`);
                    await ref.transaction(current => (current || 0) + amount);
                }
            }
            alert("Success: Payouts added to player balances.");
            btn.innerText = "Distribution Complete";
        } catch (e) {
            alert("Error: " + e.message);
            btn.disabled = false;
        }
    }

    function updateChart() {
        const ctx = document.getElementById('prizeChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: activePayouts.map((_, i) => i + 1),
                datasets: [{ data: activePayouts, borderColor: '#00ffcc', fill: true, backgroundColor: 'rgba(0, 255, 204, 0.1)', pointRadius: 0, tension: 0.2 }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { color: '#333' }, ticks: { color: '#8b949e' } } }, plugins: { legend: { display: false } } }
        });
    }

    window.onload = () => switchMode('round');
</script>
</body>
</html>
