<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Master Control</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00ffcc; --gold: #ffcc00; --danger: #ff4b2b; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: #0b0e14; color: white; display: flex; flex-direction: column; align-items: center; }
        #admin-ui { width: 100%; max-width: 1250px; display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; }
        .full-width { grid-column: 1 / -1; }
        
        .status-tag { background: var(--accent); color: #000; padding: 4px 12px; border-radius: 4px; font-weight: bold; }
        .btn-master { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-right: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.75rem; table-layout: fixed; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        th { background: rgba(255,255,255,0.05); color: var(--accent); }
        
        /* THE FIX: Active Day Highlighting */
        .active-day-col { background: rgba(255, 75, 43, 0.3) !important; border: 2px solid var(--danger) !important; font-weight: bold; }

        .track-box { background: #000; height: 400px; position: relative; border-radius: 10px; border: 1px solid #444; overflow-y: auto; overflow-x: hidden; }
        .marker-1000 { position: absolute; left: 50%; top: 0; bottom: 0; border-left: 1px dashed #666; z-index: 1; }
        .track-lane { position: relative; width: 100%; height: 35px; border-bottom: 1px solid #222; }
        
        .track-car { 
            position: absolute; height: 22px; width: 40px; border-radius: 4px; top: 6px; 
            font-size: 0.65rem; color: black; font-weight: 900; text-align: center; line-height: 22px; 
            transition: left 1s ease-in-out; z-index: 2; 
        }
        .track-car.hero { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .track-car.support { background: var(--accent); }
        
        .hp-container { width: 100%; height: 3px; background: #333; position: absolute; bottom: -5px; left: 0; }
        .hp-bar { height: 100%; background: #00ff00; transition: width 0.3s; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.1; } 100% { opacity: 1; } }
        .critical-hp { animation: blink 0.4s infinite; }
    </style>
</head>
<body>
    <div id="admin-ui">
        <div class="card full-width" style="display:flex; justify-content:space-between; align-items:center;">
            <div style="font-size: 1.2rem;">
                SEASON: <span id="seasonNum" class="status-tag">1</span> 
                ROUND: <span id="roundNum" class="status-tag">1</span>
                <span id="dayLabel" style="margin-left:20px; color:var(--danger); font-weight:900;">DAY 1</span>
            </div>
            <div>
                <button class="btn-master" style="background:var(--accent);" onclick="generateSeason()">GENERATE SEASON</button>
                <button class="btn-master" style="background:#fff;" onclick="triggerTick()">NEXT DAY</button>
                <button id="endRoundBtn" class="btn-master" style="background:var(--danger); color:white;" onclick="runToEndOfRound()">END ROUND</button>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0; color:var(--gold);">LEADERBOARD</h3>
            <table id="rankTable">
                <thead><tr><th>#</th><th>ID</th><th>Dist</th></tr></thead>
                <tbody id="rankBody"></tbody>
            </table>
        </div>

        <div class="card">
            <h3>7-DAY MATRIX</h3>
            <table id="matrixTable">
                <thead><tr id="mat-head"></tr></thead>
                <tbody id="mat-body"></tbody>
            </table>
        </div>

        <div class="card full-width">
            <div class="track-box">
                <div class="marker-1000"></div>
                <div id="master-layer"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, update, onValue, get, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const icons = { straight:"➡️", right:"⤴️", left:"⤵️", flatland:"➖", uphill:"🔼", downhill:"🔽", dry:"☀️", wet:"🌧️" };

        // --- HP & DISTANCE CALCULATOR ---
        window.triggerTick = async () => {
            const [cSnap, carsSnap, sSnap] = await Promise.all([get(ref(db,'race_constants')), get(ref(db,'cars')), get(ref(db,'race_state'))]);
            const cars = carsSnap.val();
            const state = sSnap.val() || { day_in_round: 1, round: 1 };
            const updates = {};

            const isDaySeven = state.day_in_round === 7;

            Object.keys(cars).forEach(id => {
                const car = cars[id];
                const coreVal = car.traits.core || 1;

                if (isDaySeven) {
                    updates[`cars/${id}/total_dist`] = 0; // WARP BACK
                } else {
                    // Update Distance
                    if (car.role && (car.hp || 100) > 0) {
                        updates[`cars/${id}/total_dist`] = (car.total_dist || 0) + (Math.random() * 200 + 100);
                    }
                }

                // HP Logic
                if (car.role === 'support') {
                    // Drain: 5-12% - (Core/20)
                    const drain = (Math.random() * 7 + 5) - (coreVal / 20);
                    updates[`cars/${id}/hp`] = Math.max(0, (car.hp || 100) - drain);
                } else if (!car.role) {
                    // Heal: 8-13% + (Core/20)
                    const heal = (Math.random() * 5 + 8) + (coreVal / 20);
                    updates[`cars/${id}/hp`] = Math.min(100, (car.hp || 100) + heal);
                }
            });

            const nextDay = isDaySeven ? 1 : state.day_in_round + 1;
            if (isDaySeven) updates['race_state/round'] = (state.round || 1) + 1;
            updates['race_state/day_in_round'] = nextDay;

            await update(ref(db), updates);
            return nextDay;
        };

        window.runToEndOfRound = async () => {
            let currentDay = (await get(ref(db, 'race_state'))).val()?.day_in_round || 1;
            const interval = setInterval(async () => {
                if (currentDay === 7) {
                    await triggerTick();
                    clearInterval(interval);
                    alert("Round Ended. Cars warped to start.");
                } else {
                    currentDay = await triggerTick();
                }
            }, 1000);
        };

        // --- UI SYNC & MATRIX FIX ---
        onValue(ref(db, 'race_state'), snap => {
            const s = snap.val() || {};
            document.getElementById('seasonNum').innerText = s.season || 1;
            document.getElementById('roundNum').innerText = s.round || 1;
            document.getElementById('dayLabel').innerText = `DAY ${s.day_in_round || 1}`;
            renderMatrix(); // Re-render matrix to update highlighting
        });

        async function renderMatrix() {
            const cSnap = await get(ref(db, 'race_constants'));
            const sSnap = await get(ref(db, 'race_state'));
            const c = cSnap.val();
            const s = sSnap.val();
            if(!c || !s) return;

            const activeDay = s.day_in_round || 1;

            // Header Row
            let h = '<th>Detail</th>';
            for(let i=1; i<=7; i++) {
                h += `<th class="${i === activeDay ? 'active-day-col' : ''}">Day ${i}</th>`;
            }
            document.getElementById('mat-head').innerHTML = h;

            // Data Rows
            const rows = [
                { l: "Direction", d: c.direction, i: true },
                { l: "Elevation", d: c.elevation, i: true },
                { l: "Humidity", d: c.humidity, s: "%" },
                { l: "Weather", d: c.weather, i: true }
            ];

            document.getElementById('mat-body').innerHTML = rows.map(r => {
                let cells = `<td><b>${r.l}</b></td>`;
                for(let i=0; i<7; i++) {
                    const val = r.d[i];
                    const isToday = (i + 1) === activeDay;
                    cells += `<td class="${isToday ? 'active-day-col' : ''}">${r.i ? icons[val] : val + (r.s || '')}</td>`;
                }
                return `<tr>${cells}</tr>`;
            }).join('');
        }

        onValue(ref(db, 'cars'), snap => {
            const cars = Object.values(snap.val() || {}).sort((a,b) => (b.total_dist||0) - (a.total_dist||0));
            
            // Leaderboard
            document.getElementById('rankBody').innerHTML = cars.slice(0,10).map((c,i) => 
                `<tr><td>${i+1}</td><td>#${c.id}</td><td>${Math.round(c.total_dist||0)}m</td></tr>`).join('');

            // Track layer
            const layer = document.getElementById('master-layer');
            layer.innerHTML = '';
            cars.forEach(c => {
                if (c.role && (c.hp || 100) > 0) {
                    const prog = Math.min((c.total_dist || 0) / 2000 * 100, 97);
                    const hp = c.hp || 100;
                    const criticalClass = hp <= 15 ? 'critical-hp' : '';
                    layer.innerHTML += `
                        <div class="track-lane">
                            <div class="track-car ${c.role} ${criticalClass}" style="left:${prog}%">
                                ${c.id}
                                <div class="hp-container">
                                    <div class="hp-bar" style="width:${hp}%; background:${hp < 25 ? 'red' : '#00ffcc'}"></div>
                                </div>
                            </div>
                        </div>`;
                }
            });
        });

        window.generateSeason = async () => { /* Logic remains same as previous */ };
    </script>
</body>
</html>
