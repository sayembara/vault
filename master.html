<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MASTER_PILOT_FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: #e74c3c; font-family: 'Courier New', monospace; display: flex; justify-content: center; padding: 20px; }
        .terminal { background: #080808; border: 1px solid #e74c3c; padding: 25px; width: 480px; border-radius: 8px; box-shadow: 0 0 15px rgba(231, 76, 60, 0.2); }
        .stat-box { background: #111; border: 1px solid #333; padding: 12px; margin: 10px 0; font-size: 0.85em; }
        .live-val { color: #fff; font-weight: bold; float: right; font-size: 1.1em; }
        .label { color: #e74c3c; font-weight: bold; }
        input { width: 94%; padding: 10px; margin: 5px 0; background: #111; border: 1px solid #444; color: #fff; border-radius: 4px; }
        button { width: 100%; padding: 12px; margin: 5px 0; background: #e74c3c; color: #fff; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px; }
        button:hover { background: #fff; color: #e74c3c; }
        #playerList { list-style: none; padding: 0; margin-top: 10px; font-size: 0.75em; color: #aaa; max-height: 120px; overflow-y: auto; border: 1px solid #222; padding: 5px; }
        .player-entry { padding: 4px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="text-align:center; letter-spacing: 5px;">MASTER_V4</h2>
    <button id="authBtn">1. AUTHENTICATE MASTER</button>

    <div id="controls" style="display:none;">
        <div class="stat-box"><span class="label">HOUSE_FUNDS:</span> <span class="live-val" id="valFunds">0</span></div>
        <div class="stat-box"><span class="label">SET_PRIZE:</span> <span class="live-val" id="valPrize">0</span></div>
        <div class="stat-box"><span class="label">MIN_CARS:</span> <span class="live-val" id="valMin">0</span></div>
        <div class="stat-box" style="border-color: #2ecc71;"><span class="label">LOBBY_COUNT:</span> <span class="live-val" id="valLobby">0</span></div>
        
        <div id="winnerBanner" style="text-align:center; color: #f3ba2f; font-weight: bold; margin: 10px 0;"></div>

        <ul id="playerList"><li>Waiting for cars...</li></ul>

        <hr style="border: 0.5px dashed #333; margin: 20px 0;">

        <input type="number" step="0.01" id="inpFunds" placeholder="Add tBNB to House">
        <button id="btnFunds">DEPOSIT TO HOUSE</button>

        <input type="number" step="0.01" id="inpPrize" placeholder="New Prize Amount">
        <button id="btnPrize">SET PRIZE AMOUNT</button>

        <input type="number" id="inpMin" placeholder="New Min Cars">
        <button id="btnMin">SET MIN CARS</button>

        <br>
        <button id="btnRunRace" style="background:#f3ba2f; color:#000; height: 60px; font-size: 1.2em;">⚡ FORCE RUN RACE ⚡</button>
        <button id="btnReset" style="background:#2ecc71; color:#000">START NEXT ROUND (CLEARS LOBBY)</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, updateDoc, onSnapshot, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { /* PASTE YOUR CONFIG HERE */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const MASTER_WALLET = "0xce9782f77ec560a1cb329f935b5d416aa41f1a5d".toLowerCase();
    const statsRef = doc(db, "vault", "stats");
    let currentRound = 1;

    // --- AUTHENTICATION ---
    document.getElementById('authBtn').onclick = async () => {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        if (accounts[0].toLowerCase() === MASTER_WALLET) {
            document.getElementById('controls').style.display = "block";
            document.getElementById('authBtn').style.display = "none";
            initSystem();
        } else { alert("ACCESS DENIED"); }
    };

    function initSystem() {
        // Real-time listener for current values
        onSnapshot(statsRef, (snapshot) => {
            const d = snapshot.data();
            currentRound = d.currentRound || 1;
            
            document.getElementById('valFunds').innerText = d.totalFunds + " tBNB";
            document.getElementById('valPrize').innerText = d.prizeAmount + " tBNB";
            document.getElementById('valMin').innerText = d.minCars;
            document.getElementById('valLobby').innerText = d.carCount;
            
            if (d.winner && d.winner !== "none") {
                document.getElementById('winnerBanner').innerText = "🏆 WINNER: " + d.winner.substring(0,20) + "...";
            } else {
                document.getElementById('winnerBanner').innerText = "";
            }
            updateLobby();
        });
    }

    async function updateLobby() {
        const q = query(collection(db, "registrations"), where("lastPaidRound", "==", currentRound));
        const snap = await getDocs(q);
        const list = document.getElementById('playerList');
        list.innerHTML = "";
        snap.forEach(p => {
            list.innerHTML += `<li class="player-entry"><span>${p.id}</span><span style="color:#2ecc71">READY</span></li>`;
        });
    }

    // --- FIXED BUTTON LOGIC ---
    document.getElementById('btnFunds').onclick = async () => {
        const val = parseFloat(document.getElementById('inpFunds').value);
        if (isNaN(val)) return;
        const snap = await getDoc(statsRef);
        await updateDoc(statsRef, { totalFunds: Number(((snap.data().totalFunds || 0) + val).toFixed(4)) });
        document.getElementById('inpFunds').value = "";
    };

    document.getElementById('btnPrize').onclick = async () => {
        const val = parseFloat(document.getElementById('inpPrize').value);
        if (isNaN(val)) return;
        const snap = await getDoc(statsRef);
        if (snap.data().totalFunds < val) return alert("Not enough house funds!");
        await updateDoc(statsRef, { 
            prizeAmount: val, 
            totalFunds: Number((snap.data().totalFunds - val).toFixed(4)) 
        });
        document.getElementById('inpPrize').value = "";
    };

    document.getElementById('btnMin').onclick = async () => {
        const val = parseInt(document.getElementById('inpMin').value);
        if (isNaN(val)) return;
        await updateDoc(statsRef, { minCars: val });
        document.getElementById('inpMin').value = "";
    };

    // --- RACE ENGINE ---
    document.getElementById('btnRunRace').onclick = async () => {
        const q = query(collection(db, "registrations"), where("lastPaidRound", "==", currentRound));
        const snap = await getDocs(q);
        let players = [];
        snap.forEach(p => players.push(p.id));

        if (players.length === 0) return alert("No cars in lobby!");

        const winner = players[Math.floor(Math.random() * players.length)];
        await updateDoc(statsRef, { winner: winner.toLowerCase() });
        alert("RACE FINISHED! Winner selected.");
    };

    document.getElementById('btnReset').onclick = async () => {
        const snap = await getDoc(statsRef);
        const next = (snap.data().currentRound || 1) + 1;
        await updateDoc(statsRef, { winner: "none", carCount: 0, currentRound: next });
        alert("New Round Started.");
    };
</script>
</body>
</html>
