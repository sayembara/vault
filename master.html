<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Master Engine (Web3)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00ffcc; --gold: #ffcc00; --danger: #ff4b2b; --bg: #0b0e14; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; }
        
        /* Wallet Gate */
        #auth-gate { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #admin-ui { width: 100%; max-width: 1300px; display: grid; grid-template-columns: 350px 1fr; gap: 20px; display: none; }
        
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; }
        .full-width { grid-column: 1 / -1; }
        .status-tag { background: var(--accent); color: #000; padding: 4px 12px; border-radius: 4px; font-weight: bold; margin-left: 5px; }
        .btn-master { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        
        /* Table & Track Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.75rem; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        .active-day-col { background: rgba(255, 75, 43, 0.2) !important; border: 2px solid var(--danger) !important; }
        .track-box { background: #000; height: 400px; position: relative; border-radius: 10px; border: 1px solid #444; overflow: hidden; }
        .track-lane { position: relative; width: 100%; height: 35px; border-bottom: 1px solid #222; }
        .track-car { position: absolute; height: 20px; width: 40px; border-radius: 4px; top: 5px; font-size: 0.6rem; color: black; font-weight: 900; text-align: center; line-height: 20px; transition: left 0.8s ease-in-out; }
        .hp-container { width: 100%; height: 3px; background: #333; position: absolute; bottom: -4px; left: 0; }
        .hp-bar { height: 100%; transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <h1 style="color:var(--accent)">MASTER ENGINE</h1>
        <p>Restricted to Authorized Admin Wallet Addresses</p>
        <button class="btn-master" style="background:var(--accent)" onclick="connectWallet()">CONNECT WALLET</button>
        <p id="wallet-status" style="margin-top:15px; color:#666; font-size:0.8rem;"></p>
    </div>

    <div id="admin-ui">
        <div class="card full-width" style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                ROUND: <span id="roundNum" class="status-tag">-</span>
                <span id="dayLabel" style="margin-left:25px; color:var(--danger); font-weight: 800;">DAY 1</span>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-master" style="background:var(--accent);" onclick="generateSeason()">NEW SEASON</button>
                <button id="nextBtn" class="btn-master" style="background:white;" onclick="triggerTick()">NEXT DAY</button>
                <button id="endRoundBtn" class="btn-master" style="background:var(--danger); color:white;" onclick="runToEndOfRound()">FAST END</button>
                <button class="btn-master" style="background:#555; color:white;" onclick="window.location.href='race_constants.html'">CONFIG</button>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0; color:var(--gold);">RANKINGS</h3>
            <table id="rankTable">
                <thead><tr><th>Rank</th><th>ID</th><th>Dist</th></tr></thead>
                <tbody id="rankBody"></tbody>
            </table>
        </div>

        <div class="card">
            <h3 style="margin-top:0;">7-DAY TRACK</h3>
            <table>
                <thead><tr id="mat-head"></tr></thead>
                <tbody id="mat-body"></tbody>
            </table>
        </div>

        <div class="card full-width">
            <div class="track-box"><div id="master-layer"></div></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, update, onValue, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- WALLET AUTH LOGIC ---
        const ADMIN_WALLETS = ["0xYourWalletAddressHere".toLowerCase()]; // Add your wallet here

        window.connectWallet = async () => {
            if (window.ethereum) {
                try {
                    const provider = new ethers.BrowserProvider(window.ethereum);
                    const accounts = await provider.send("eth_requestAccounts", []);
                    const address = accounts[0].toLowerCase();
                    
                    // Simple logic: If address is in list, show UI. 
                    // (Optional: You can add a signature check here for higher security)
                    if (ADMIN_WALLETS.includes(address) || ADMIN_WALLETS[0] === "0xyourwalletaddresshere") {
                        document.getElementById('auth-gate').style.display = 'none';
                        document.getElementById('admin-ui').style.display = 'grid';
                    } else {
                        document.getElementById('wallet-status').innerText = "Unauthorized Wallet: " + address;
                    }
                } catch (err) { alert("Connection Failed"); }
            } else { alert("Please install MetaMask!"); }
        };

        // --- TICK LOGIC (Day 7 Fix) ---
        window.triggerTick = async () => {
            const stateSnap = await get(ref(db, 'race_state'));
            const state = stateSnap.val() || { day_in_round: 1, round: 1, show_end_7: false };
            const carsSnap = await get(ref(db, 'cars'));
            const cars = carsSnap.val();
            const configSnap = await get(ref(db, 'race_constants'));
            const hpSet = configSnap.val().hp_settings || { drain:{min:5,max:10}, heal:{min:5,max:10} };
            
            const updates = {};

            // WARP LOGIC: If we are currently showing Day 7 Results, click resets the board.
            if (state.day_in_round === 7 && state.show_end_7) {
                Object.keys(cars).forEach(id => updates[`cars/${id}/total_dist`] = 0);
                updates['race_state/day_in_round'] = 1;
                updates['race_state/round'] = (state.round || 1) + 1;
                updates['race_state/show_end_7'] = false;
                await update(ref(db), updates);
                return;
            }

            // NORMAL PROCESSING
            Object.keys(cars).forEach(id => {
                const car = cars[id];
                const coreBonus = (car.traits?.core || 0) / 20;
                
                if (car.role === 'support' && (car.hp || 100) > 0) {
                    const move = Math.random() * 200 + 100;
                    updates[`cars/${id}/total_dist`] = (car.total_dist || 0) + move;
                    const drain = (Math.random() * (hpSet.drain.max - hpSet.drain.min) + hpSet.drain.min) - coreBonus;
                    updates[`cars/${id}/hp`] = Math.max(0, (car.hp || 100) - drain);
                } else if (!car.role) {
                    const heal = (Math.random() * (hpSet.heal.max - hpSet.heal.min) + hpSet.heal.min) + coreBonus;
                    updates[`cars/${id}/hp`] = Math.min(100, (car.hp || 100) + heal);
                }
            });

            // Transition logic
            if (state.day_in_round === 6) {
                updates['race_state/day_in_round'] = 7;
                updates['race_state/show_end_7'] = true; // Signals that Day 7 is now the visual result
            } else {
                updates['race_state/day_in_round'] = state.day_in_round + 1;
                updates['race_state/show_end_7'] = false;
            }

            await update(ref(db), updates);
        };

        window.runToEndOfRound = async () => {
            for(let i=0; i<8; i++) {
                const s = (await get(ref(db, 'race_state'))).val();
                if(s.show_end_7) break;
                await triggerTick();
                await new Promise(r => setTimeout(r, 400));
            }
        };

        // --- UI SYNC ---
        onValue(ref(db, 'race_state'), snap => {
            const s = snap.val() || {};
            document.getElementById('roundNum').innerText = s.round || 1;
            document.getElementById('dayLabel').innerText = `DAY ${s.day_in_round} ${s.show_end_7 ? '🏁 RESULT' : ''}`;
            document.getElementById('nextBtn').innerText = s.show_end_7 ? "WARP TO NEXT ROUND" : "NEXT DAY";
        });

        onValue(ref(db, 'cars'), snap => {
            const list = Object.values(snap.val() || {}).sort((a,b) => (b.total_dist||0) - (a.total_dist||0));
            document.getElementById('rankBody').innerHTML = list.slice(0,8).map((c,i)=>`<tr><td>${i+1}</td><td>${c.id}</td><td>${Math.round(c.total_dist)}m</td></tr>`).join('');
            
            const layer = document.getElementById('master-layer');
            layer.innerHTML = '';
            list.forEach(c => {
                if(c.role) {
                    const p = Math.min((c.total_dist/2000)*100, 95);
                    layer.innerHTML += `<div class="track-lane"><div class="track-car" style="left:${p}%; background:${c.role==='support'?'#00ffcc':'#ffcc00'}">${c.id}<div class="hp-container"><div class="hp-bar" style="width:${c.hp}%; background:${c.hp<20?'red':'#00ffcc'}"></div></div></div></div>`;
                }
            });
        });
    </script>
</body>
</html>
