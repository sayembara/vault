<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MASTER_CONTROL_CENTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ADD YOUR FIREBASE CONFIG HERE
        const firebaseConfig = { ... };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // CONFIG & CONTRACT
        const MASTER_WALLET = "0xce9782f77ec560a1cb329f935b5d416aa41f1a5d".toLowerCase();
        const contractAddress = "0xb436c8C192288F45ca154081aa6c04b867c1946C";
        const abi = [
            "function owner() view returns (address)",
            "function setEntranceFee(uint256) external",
            "function emergencyWithdraw() external"
        ];

        let signer, contract;

        // AUTH & DASHBOARD
        window.connectMaster = async () => {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            if (accounts[0].toLowerCase() !== MASTER_WALLET) return alert("UNAUTHORIZED");
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            signer = provider.getSigner();
            contract = new ethers.Contract(contractAddress, abi, signer);
            document.getElementById('controls').style.display = "block";
        };

        // 1. FUND MANAGEMENT
        window.depositToFunds = async () => {
            const amt = parseFloat(document.getElementById('depositAmt').value);
            const snap = await getDoc(doc(db, "vault", "stats"));
            await updateDoc(doc(db, "vault", "stats"), { totalFunds: (snap.data().totalFunds || 0) + amt });
            alert("Funds added to Virtual Balance");
        };

        window.resetFunds = async () => {
            if(confirm("Reset all virtual stats?")) {
                await updateDoc(doc(db, "vault", "stats"), { totalFunds: 0, prizeAmount: 0, carCount: 0, winner: "none" });
            }
        };

        // 2. PRIZE & RULES
        window.setPrize = async () => {
            const p = parseFloat(document.getElementById('prizeInp').value);
            const snap = await getDoc(doc(db, "vault", "stats"));
            if (snap.data().totalFunds < p) return alert("Add more funds first!");
            await updateDoc(doc(db, "vault", "stats"), { 
                prizeAmount: p, 
                totalFunds: snap.data().totalFunds - p 
            });
        };

        window.setMinCars = async () => {
            const m = parseInt(document.getElementById('minInp').value);
            await updateDoc(doc(db, "vault", "stats"), { minCars: m });
        };

        // 3. RACE CONTROL
        window.forceStart = async () => {
            await updateDoc(doc(db, "vault", "stats"), { winner: "none", carCount: 0 });
            alert("Race Reset for Round 2!");
        };

        window.assignWinner = async () => {
            const addr = prompt("Enter Winner Wallet Address:");
            if (addr) await updateDoc(doc(db, "vault", "stats"), { winner: addr.toLowerCase() });
        };

        // REAL-TIME LISTENER
        onSnapshot(doc(db, "vault", "stats"), (d) => {
            const s = d.data();
            document.getElementById('statBox').innerText = `FUNDS: ${s.totalFunds} | PRIZE: ${s.prizeAmount} | CARS: ${s.carCount}/${s.minCars}`;
            document.getElementById('winnerBox').innerText = `WINNER: ${s.winner}`;
            document.getElementById('startBtn').style.display = (s.carCount >= s.minCars) ? "block" : "none";
        });
    </script>
    <style>
        body { background: #000; color: #e74c3c; font-family: monospace; padding: 20px; }
        .card { border: 2px solid #e74c3c; padding: 20px; max-width: 450px; margin: auto; }
        input { width: 90%; background: #111; border: 1px solid #e74c3c; color: #fff; padding: 10px; margin: 5px 0; }
        button { width: 100%; padding: 10px; background: #e74c3c; color: #fff; border: none; margin: 5px 0; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>MASTER_PILOT</h2>
        <button onclick="connectMaster()">AUTHENTICATE</button>
        <div id="statBox">...</div>
        <div id="winnerBox" style="color:#fff">...</div>
        
        <div id="controls" style="display:none">
            <input type="number" id="depositAmt" placeholder="Add to Virtual Funds">
            <button onclick="depositToFunds()">DEPOSIT TO HOUSE</button>
            <input type="number" id="prizeInp" placeholder="Prize for Winner">
            <button onclick="setPrize()">SET PRIZE AMOUNT</button>
            <input type="number" id="minInp" placeholder="Min Cars Required">
            <button onclick="setMinCars()">SET MIN CARS</button>
            <button id="startBtn" onclick="forceStart()" style="background:#2ecc71; color:#000">FORCE START ROUND</button>
            <button onclick="assignWinner()" style="background:#f3ba2f; color:#000">ASSIGN WINNER ADDRESS</button>
            <button onclick="resetFunds()" style="background:#333">RESET EVERYTHING</button>
        </div>
    </div>
</body>
</html>
