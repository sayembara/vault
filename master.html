<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANRAT | Master Engine</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00ffcc; --gold: #ffcc00; --danger: #ff4b2b; --bg: #0b0e14; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; }
        #admin-ui { width: 100%; max-width: 1300px; display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; position: relative; }
        .full-width { grid-column: 1 / -1; }
        
        .status-tag { background: var(--accent); color: #000; padding: 4px 12px; border-radius: 4px; font-weight: bold; margin-left: 5px; }
        .btn-master { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-master:active { transform: scale(0.95); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.75rem; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        th { background: rgba(255,255,255,0.05); color: var(--accent); }
        
        /* THE FIX: Active Day Highlighting */
        .active-day-col { background: rgba(255, 75, 43, 0.2) !important; border: 2px solid var(--danger) !important; }

        /* Track UI */
        .track-box { background: #000; height: 450px; position: relative; border-radius: 10px; border: 1px solid #444; overflow-y: auto; overflow-x: hidden; padding-top: 10px; }
        .marker-1000 { position: absolute; left: 50%; top: 0; bottom: 0; border-left: 1px dashed rgba(255,255,255,0.3); z-index: 1; }
        .marker-1000::after { content: "1000m"; position: absolute; top: 5px; left: 5px; font-size: 0.6rem; color: #666; }
        .track-lane { position: relative; width: 100%; height: 38px; border-bottom: 1px solid #222; }
        
        .track-car { 
            position: absolute; height: 24px; width: 42px; border-radius: 4px; top: 6px; 
            font-size: 0.65rem; color: black; font-weight: 900; text-align: center; line-height: 24px; 
            transition: left 1.2s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2; 
        }
        .track-car.hero { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .track-car.support { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        
        /* HP System */
        .hp-container { width: 100%; height: 3px; background: #333; position: absolute; bottom: -5px; left: 0; border-radius: 2px; }
        .hp-bar { height: 100%; background: #00ff00; border-radius: 2px; transition: width 0.3s; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        .critical-hp { animation: blink 0.4s infinite; border: 2px solid white; }
    </style>
</head>
<body>

    <div id="admin-ui">
        <div class="card full-width" style="display:flex; justify-content:space-between; align-items:center;">
            <div style="font-size: 1.1rem; font-weight: bold;">
                SEASON: <span id="seasonNum" class="status-tag">-</span> 
                ROUND: <span id="roundNum" class="status-tag">-</span>
                <span id="dayLabel" style="margin-left:25px; color:var(--danger);">DAY 1</span>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-master" style="background:var(--accent);" onclick="generateSeason()">GENERATE SEASON</button>
                <button class="btn-master" style="background:white;" onclick="triggerTick()">NEXT DAY</button>
                <button id="endRoundBtn" class="btn-master" style="background:var(--danger); color:white;" onclick="runToEndOfRound()">END ROUND (AUTO)</button>
                <button class="btn-master" style="background:#555; color:white;" onclick="window.location.href='race_constants.html'">CONFIG</button>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0; color:var(--gold); border-bottom: 1px solid #333; padding-bottom: 10px;">RANKINGS</h3>
            <table id="rankTable">
                <thead><tr><th>Rank</th><th>Unit</th><th>Dist</th></tr></thead>
                <tbody id="rankBody"></tbody>
            </table>
        </div>

        <div class="card">
            <h3 style="margin-top:0; border-bottom: 1px solid #333; padding-bottom: 10px;">7-DAY TRACK MATRIX</h3>
            <table>
                <thead><tr id="mat-head"></tr></thead>
                <tbody id="mat-body"></tbody>
            </table>
        </div>

        <div class="card full-width">
            <div class="track-box">
                <div class="marker-1000"></div>
                <div id="master-layer"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, update, onValue, get, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", 
            databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const icons = { straight:"➡️", right:"⤴️", left:"⤵️", flatland:"➖", uphill:"🔼", downhill:"🔽", dry:"☀️", wet:"🌧️" };

        // --- TICK ENGINE (HP, Distance, Day Logic) ---
        window.triggerTick = async () => {
            const [cSnap, carsSnap, sSnap] = await Promise.all([
                get(ref(db,'race_constants')), 
                get(ref(db,'cars')), 
                get(ref(db,'race_state'))
            ]);
            
            const cars = carsSnap.val();
            const constants = cSnap.val();
            const state = sSnap.val() || { day_in_round: 1, round: 1 };
            
            // HP Settings from Config Page or Default
            const hpSet = constants.hp_settings || { drain: { min: 5, max: 12 }, heal: { min: 8, max: 13 } };
            const updates = {};

            // WARP CHECK: If already Day 7, clicking Next Day warps to Day 1
            if (state.day_in_round === 7) {
                Object.keys(cars).forEach(id => { updates[`cars/${id}/total_dist`] = 0; });
                updates['race_state/day_in_round'] = 1;
                updates['race_state/round'] = (state.round || 1) + 1;
                await update(ref(db), updates);
                return 1;
            }

            // NORMAL TICK: Process Distances and HP
            Object.keys(cars).forEach(id => {
                const car = cars[id];
                const coreImpact = (car.traits.core || 1) / 20;

                if (car.role && (car.hp || 100) > 0) {
                    updates[`cars/${id}/total_dist`] = (car.total_dist || 0) + (Math.random() * 220 + 80);
                }

                if (car.role === 'support') {
                    const drain = (Math.random() * (hpSet.drain.max - hpSet.drain.min) + hpSet.drain.min) - coreImpact;
                    updates[`cars/${id}/hp`] = Math.max(0, (car.hp || 100) - drain);
                } else if (!car.role) {
                    const heal = (Math.random() * (hpSet.heal.max - hpSet.heal.min) + hpSet.heal.min) + coreImpact;
                    updates[`cars/${id}/hp`] = Math.min(100, (car.hp || 100) + heal);
                }
            });

            const nextDay = state.day_in_round + 1;
            updates['race_state/day_in_round'] = nextDay;
            await update(ref(db), updates);
            return nextDay;
        };

        // --- AUTO-RUN ROUND ---
        window.runToEndOfRound = async () => {
            let day = (await get(ref(db, 'race_state'))).val()?.day_in_round || 1;
            const btn = document.getElementById('endRoundBtn');
            btn.disabled = true;
            
            const interval = setInterval(async () => {
                if (day === 7) {
                    clearInterval(interval);
                    btn.disabled = false;
                    alert("Day 7 Finished. Ready for media capture. Click Next Day to Warp.");
                } else {
                    day = await triggerTick();
                }
            }, 1500);
        };

        // --- UI SYNC ---
        onValue(ref(db, 'race_state'), snap => {
            const s = snap.val() || {};
            document.getElementById('seasonNum').innerText = s.season || 1;
            document.getElementById('roundNum').innerText = s.round || 1;
            document.getElementById('dayLabel').innerText = `DAY ${s.day_in_round || 1}`;
            syncMatrix(s.day_in_round || 1);
        });

        async function syncMatrix(activeDay) {
            const cSnap = await get(ref(db, 'race_constants'));
            const c = cSnap.val(); if(!c) return;

            let h = '<th>Detail</th>';
            for(let i=1; i<=7; i++) h += `<th class="${i===activeDay?'active-day-col':''}">Day ${i}</th>`;
            document.getElementById('mat-head').innerHTML = h;

            const rows = [
                { l: "Direction", d: c.direction, i: true },
                { l: "Elevation", d: c.elevation, i: true },
                { l: "Humidity", d: c.humidity, s: "%" },
                { l: "Weather", d: c.weather, i: true }
            ];

            document.getElementById('mat-body').innerHTML = rows.map(r => {
                let cells = `<td><b>${r.l}</b></td>`;
                for(let i=0; i<7; i++) {
                    const isToday = (i+1) === activeDay;
                    cells += `<td class="${isToday?'active-day-col':''}">${r.i?icons[r.d[i]]:r.d[i]+(r.s||'')}</td>`;
                }
                return `<tr>${cells}</tr>`;
            }).join('');
        }

        onValue(ref(db, 'cars'), snap => {
            const carList = Object.values(snap.val() || {}).sort((a,b) => (b.total_dist||0) - (a.total_dist||0));
            
            // Rankings
            document.getElementById('rankBody').innerHTML = carList.slice(0,10).map((c,i) => 
                `<tr><td>${i+1}</td><td>#${c.id}</td><td>${Math.round(c.total_dist||0)}m</td></tr>`).join('');

            // Track Layer
            const layer = document.getElementById('master-layer');
            layer.innerHTML = '';
            carList.forEach(c => {
                if (c.role && (c.hp || 100) > 0) {
                    const p = Math.min((c.total_dist || 0) / 2000 * 100, 97);
                    const hp = c.hp || 100;
                    layer.innerHTML += `
                        <div class="track-lane">
                            <div class="track-car ${c.role} ${hp <= 15 ? 'critical-hp' : ''}" style="left:${p}%">
                                ${c.id}
                                <div class="hp-container"><div class="hp-bar" style="width:${hp}%; background:${hp < 25 ? 'red' : '#00ffcc'}"></div></div>
                            </div>
                        </div>`;
                }
            });
        });

        // --- SEASON GENERATOR ---
        window.generateSeason = async () => {
            const directions = ["straight", "straight", "right", "left"];
            const elevations = ["flatland", "flatland", "uphill", "downhill"];
            const newC = { direction: [], elevation: [], humidity: [], weather: [] };
            
            for(let i=0; i<7; i++) {
                newC.direction.push(directions[Math.floor(Math.random()*4)]);
                newC.elevation.push(elevations[Math.floor(Math.random()*4)]);
                newC.humidity.push(Math.floor(Math.random()*101));
                newC.weather.push(newC.humidity[i] <= 40 ? "dry" : (Math.random()*100 > newC.humidity[i] ? "dry" : "wet"));
            }
            await update(ref(db, 'race_constants'), newC);
            await update(ref(db, 'race_state'), { day_in_round: 1 });
            alert("New Season Matrix Generated!");
        };
    </script>
</body>
</html>
