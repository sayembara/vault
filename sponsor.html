<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Sponsor Control</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00ffcc; }
        body { margin: 0; padding: 40px; font-family: 'Inter', sans-serif; background: #0f0c29; color: white; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; width: 100%; max-width: 500px; text-align: center; }
        .overflow-val { font-size: 2rem; color: #ffcc00; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-fill { background: var(--accent); color: #00334e; }
        .btn-reset { background: transparent; border: 1px solid #ff4b2b; color: #ff4b2b; }
    </style>
</head>
<body>
    <h1>SPONSOR MANAGEMENT</h1>
    
    <div class="card">
        <div class="overflow-val" id="disp-overflow">0.000</div>
        <p style="font-size: 0.8rem; color: #888;">Use Overflow to refill buckets to Max Limits.</p>
        <button class="btn-fill" onclick="refillFromOverflow()">Execute Auto-Refill</button>
        <button class="btn-reset" onclick="hardReset()">Hard Reset System</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'vault/overflow'), (s) => document.getElementById('disp-overflow').innerText = parseFloat(s.val() || 0).toFixed(3) + " tBNB");

        window.refillFromOverflow = async function() {
            const snap = await get(ref(db));
            const data = snap.val() || {};
            const limits = data.master_settings?.limits || { max: 2.0 };
            let overflow = parseFloat(data.vault?.overflow || 0);
            let rounds = data.vault?.rounds || {};

            if(overflow <= 0) return alert("Overflow Empty!");

            for(let i=1; i<=12; i++) {
                let cur = parseFloat(rounds[`r${i}`] || 0);
                let needed = limits.max - cur;
                if(needed > 0 && overflow > 0) {
                    let take = Math.min(overflow, needed);
                    rounds[`r${i}`] = parseFloat((cur + take).toFixed(3));
                    overflow -= take;
                }
            }

            const up = {};
            up['vault/rounds'] = rounds;
            up['vault/overflow'] = parseFloat(overflow.toFixed(3));
            update(ref(db), up).then(() => alert("Buckets Refilled!"));
        };

        window.hardReset = function() {
            if(!confirm("Reset race data?")) return;
            update(ref(db, 'race_data'), { current_round: 1, players: null, status: 'stopped' });
        };
    </script>
</body>
</html>
