<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Sponsor Audit & Control</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00ffcc; --danger: #ff4b2b; --gold: #ffcc00; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: #0f0c29; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; text-align: center; }
        .btn-connect { background: #f6851b; color: white; padding: 15px 30px; font-size: 1.2rem; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; }
        
        #admin-ui { display: none; width: 100%; max-width: 900px; flex-direction: column; gap: 20px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; text-align: center; }
        
        .history-card { text-align: left; background: rgba(0,0,0,0.2); }
        .log-entry { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        button { padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-view { background: var(--accent); color: #00334e; font-size: 0.75rem; }
        
        /* Modal Style */
        #historyModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a2e; border: 1px solid var(--accent); padding: 30px; border-radius: 20px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        th, td { border: 1px solid rgba(255,255,255,0.1); padding: 8px; text-align: center; }
        th { background: rgba(0, 255, 204, 0.1); color: var(--accent); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1>SPONSOR AUDIT</h1>
        <button class="btn-connect" id="connectBtn">Connect MetaMask</button>
    </div>

    <div id="admin-ui">
        <div class="card">
            <h3>VAULT OVERFLOW</h3>
            <div style="font-size: 2.5rem; color: var(--gold); font-family: monospace;" id="disp-overflow">0.000</div>
        </div>

        <div class="card history-card">
            <h4 style="margin-top:0; color:#888;">PREVIOUS SEASON RECORDS</h4>
            <div id="log-content"><i>No historical data available.</i></div>
        </div>
    </div>

    <div id="historyModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="color: var(--accent); margin-top:0;">Season Details</h2>
            <div id="modalBody"></div>
            <button onclick="document.getElementById('historyModal').style.display='none'" style="margin-top:20px; width:100%; background:var(--danger); color:white;">CLOSE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const WHITELISTED_ADMIN = "0xCe9782f77eC560a1Cb329F935b5D416AA41f1a5d".toLowerCase(); 
        const firebaseConfig = { apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('connectBtn').onclick = async () => {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (accounts[0].toLowerCase() === WHITELISTED_ADMIN) {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('admin-ui').style.display = 'flex';
                    loadSponsorData();
                }
            }
        };

        function loadSponsorData() {
            onValue(ref(db), (snap) => {
                const data = snap.val() || {};
                const history = data.history?.transitions || {};
                document.getElementById('disp-overflow').innerText = parseFloat(data.vault?.overflow || 0).toFixed(3);

                const logBox = document.getElementById('log-content');
                const entries = Object.entries(history).reverse();
                
                if(entries.length > 0) {
                    logBox.innerHTML = entries.map(([id, e]) => `
                        <div class="log-entry">
                            <div>
                                <b>Season ${e.from_season}</b><br>
                                <small style="color:#666;">${e.timestamp}</small>
                            </div>
                            <div style="color:var(--gold); font-size:0.9rem;">${e.moved_from_overflow} tBNB Reclaimed</div>
                            <button class="btn-view" onclick="window.showDetails('${id}')">VIEW DETAILS</button>
                        </div>
                    `).join('');

                    // Global function for the buttons to trigger
                    window.showDetails = (id) => {
                        const record = history[id];
                        const states = record.final_vault_state;
                        document.getElementById('modalTitle').innerText = `Season ${record.from_season} Final Audit`;
                        
                        let tableHTML = `<table><thead><tr><th>RD</th><th>Normal</th><th>Boost</th><th>Total</th></tr></thead><tbody>`;
                        for(let i=1; i<=12; i++) {
                            let rd = states[`r${i}`];
                            tableHTML += `<tr>
                                <td>${i}</td>
                                <td>${parseFloat(rd.normal).toFixed(2)}</td>
                                <td>${parseFloat(rd.boost).toFixed(2)}</td>
                                <td style="color:var(--accent)">${rd.total}</td>
                            </tr>`;
                        }
                        tableHTML += `</tbody></table>`;
                        document.getElementById('modalBody').innerHTML = tableHTML;
                        document.getElementById('historyModal').style.display = 'flex';
                    };
                }
            });
        }
    </script>
</body>
</html>
