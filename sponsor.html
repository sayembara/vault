<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANRAT | Sponsor Policy (Stable Firebase)</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --accent: #00ffcc; --bg: #0b0e14; --card: #161b22; --border: #30363d; 
            --danger: #ff4b2b; --boost: #b300ff;
        }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
        h1 { color: var(--accent); font-size: 1.6rem; text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        
        .vault-stats { text-align: right; background: rgba(0, 255, 204, 0.05); padding: 12px 20px; border-radius: 10px; border: 1px solid var(--border); }
        .vault-value { font-size: 2.2rem; font-weight: 900; color: var(--accent); font-family: 'Courier New', monospace; }

        .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #8b949e; margin: 40px 0 15px 0; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
        .input-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        label { display: block; font-size: 0.6rem; color: #8b949e; margin-bottom: 5px; font-weight: 800; text-transform: uppercase; }
        input { width: 100%; background: #0d1117; border: 1px solid var(--border); color: var(--accent); padding: 10px; border-radius: 6px; font-weight: 900; outline: none; }

        .bucket-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; min-height: 100px; }
        .b-card { background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 15px; }
        .b-card.active { border: 1px solid var(--accent); background: rgba(0, 255, 204, 0.02); }
        .b-card.special { border: 1px solid var(--boost); }
        .b-card.past { opacity: 0.4; filter: grayscale(1); }
        .b-main { font-family: 'Courier New', monospace; font-size: 1.3rem; margin: 8px 0; }
        .val-total { color: var(--accent); font-weight: bold; }
        .b-breakdown { font-size: 0.55rem; border-top: 1px solid #222; padding-top: 8px; color: #666; display: flex; justify-content: space-between; }

        .controls { display: flex; gap: 15px; margin-top: 30px; }
        .btn { flex: 1; padding: 20px; border-radius: 8px; font-weight: 900; cursor: pointer; border: none; text-transform: uppercase; transition: 0.2s; font-size: 1rem; }
        .btn-save { background: var(--accent); color: #0b0e14; }
        .btn-wipe { background: transparent; border: 2px solid var(--danger); color: var(--danger); }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>🤝 Sponsor Policy</h1>
            <div id="sync_status" style="font-size: 0.75rem; color: #8b949e; margin-top: 5px; font-weight: bold;">INITIALIZING...</div>
        </div>
        <div class="vault-stats">
            <span style="font-size: 0.6rem; color: #8b949e; font-weight: 900;">VAULT TOTAL</span>
            <div class="vault-value" id="sponsor_vault_display">0 TBNB</div>
        </div>
    </div>

    <div class="section-title">Global Waterfall Limits (N)</div>
    <div class="grid-3">
        <div class="card">
            <label>🗓️ Round Allocation</label>
            <div class="input-pair">
                <div><label>Min</label><input type="number" id="wk_min" value="1000"></div>
                <div><label>Max (N)</label><input type="number" id="wk_max" value="5000"></div>
            </div>
        </div>
        <div class="card">
            <label>🏆 Season Pool</label>
            <div class="input-pair">
                <div><label>Min</label><input type="number" id="sea_min" value="5000"></div>
                <div><label>Max (N)</label><input type="number" id="sea_max" value="20000"></div>
            </div>
        </div>
        <div class="card">
            <label>🛠️ Constructor Pool</label>
            <div class="input-pair">
                <div><label>Min</label><input type="number" id="con_min" value="2000"></div>
                <div><label>Max (N)</label><input type="number" id="con_max" value="10000"></div>
            </div>
        </div>
    </div>

    <div class="section-title">Live Preview (12 Rounds + 2 Specials)</div>
    <div id="sponsor_grid_mirror" class="bucket-grid"></div>

    <div class="controls">
        <button class="btn btn-save" onclick="updatePolicy()">Sync Policy to Firebase</button>
        <button class="btn btn-wipe" onclick="triggerWipe()">Wipe All Payouts</button>
    </div>
</div>

<script>
    // --- REPLACE WITH YOUR CONFIG ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT.firebaseio.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentRound = 4;
    let treasury = { normal: 0, boost: 0 };
    let hasLoadedPolicy = false;

    // 1. Initial Logic: Render instantly so buckets don't disappear
    window.onload = () => {
        calculateAndRender();
        initListeners();
    };

    function initListeners() {
        // Listen for Treasury
        db.ref('treasury').on('value', (snap) => {
            treasury = snap.val() || { normal: 0, boost: 0 };
            calculateAndRender();
        });

        // Listen for Policy
        db.ref('policy').on('value', (snap) => {
            const p = snap.val();
            if (p) {
                document.getElementById('wk_min').value = p.wk_min || 1000;
                document.getElementById('wk_max').value = p.wk_max || 5000;
                document.getElementById('sea_min').value = p.sea_min || 5000;
                document.getElementById('sea_max').value = p.sea_max || 20000;
                document.getElementById('con_min').value = p.con_min || 2000;
                document.getElementById('con_max').value = p.con_max || 10000;
                document.getElementById('sync_status').innerText = "● LIVE SYNC ACTIVE";
                hasLoadedPolicy = true;
                calculateAndRender();
            }
        });
    }

    function calculateAndRender() {
        const total = treasury.normal + treasury.boost;
        document.getElementById('sponsor_vault_display').innerText = total.toLocaleString() + " TBNB";

        const wkMax = parseInt(document.getElementById('wk_max').value) || 5000;
        const wkMin = parseInt(document.getElementById('wk_min').value) || 1000;
        const seaMax = parseInt(document.getElementById('sea_max').value) || 20000;
        const conMax = parseInt(document.getElementById('con_max').value) || 10000;

        const grid = document.getElementById('sponsor_grid_mirror');
        grid.innerHTML = '';

        // Waterfall Math
        let remNrm = treasury.normal;
        const divisor = (12 - currentRound + 1) + 2;
        const bShare = total > 0 ? (treasury.boost / divisor) : 0;

        // Force render all 12 rounds
        for (let i = 1; i <= 12; i++) {
            let n = 0;
            if (total > 0) {
                if (i < currentRound) { n = wkMax; remNrm -= wkMax; }
                else { n = Math.max(0, Math.min(remNrm, wkMin)); remNrm -= n; }
            }
            renderBucket(grid, `Round ${i}`, n, (i >= currentRound && total > 0 ? bShare : 0), wkMax, i < currentRound ? 'past' : (i === currentRound ? 'active' : ''));
        }

        // Force render 2 specials
        renderBucket(grid, "Season Pool", (total > 0 ? Math.min(remNrm, seaMax) : 0), (total > 0 ? bShare : 0), seaMax, 'special');
        renderBucket(grid, "Constructor", (total > 0 ? Math.min(remNrm, conMax) : 0), (total > 0 ? bShare : 0), conMax, 'special');
    }

    function renderBucket(container, label, n, b, max, state) {
        container.innerHTML += `
            <div class="b-card ${state}">
                <span style="font-size: 0.6rem; color: #8b949e; text-transform: uppercase; font-weight: 800;">${label}</span>
                <div class="b-main">
                    <span style="color:#555">${max}</span> : 
                    <span class="val-total">${(n + b).toFixed(0)}</span>
                </div>
                <div class="b-breakdown">
                    <span>N: ${n.toFixed(0)}</span>
                    <span>B: +${b.toFixed(0)}</span>
                </div>
            </div>
        `;
    }

    function updatePolicy() {
        document.getElementById('sync_status').innerText = "SAVING...";
        
        const policyData = {
            wk_min: parseInt(document.getElementById('wk_min').value),
            wk_max: parseInt(document.getElementById('wk_max').value),
            sea_min: parseInt(document.getElementById('sea_min').value),
            sea_max: parseInt(document.getElementById('sea_max').value),
            con_min: parseInt(document.getElementById('con_min').value),
            con_max: parseInt(document.getElementById('con_max').value)
        };

        db.ref('policy').set(policyData)
            .then(() => {
                document.getElementById('sync_status').innerText = "● SAVED TO FIREBASE";
                setTimeout(() => document.getElementById('sync_status').innerText = "● LIVE SYNC ACTIVE", 2000);
            })
            .catch(err => alert("Sync Failed: " + err.message));
    }

    function triggerWipe() {
        if(confirm("Confirm Wipe: This will zero out the Treasury in Firebase.")) {
            db.ref('treasury').set({ normal: 0, boost: 0 });
        }
    }
</script>
</body>
</html>
