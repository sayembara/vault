<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANRAT | Sponsor Control Center</title>
    <style>
        :root { 
            --accent: #00ffcc; --bg: #0b0e14; --card: #161b22; --border: #30363d; 
            --danger: #ff4b2b; --warning: #ffcc00; --success: #00ffcc;
        }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        h1 { color: var(--accent); margin: 0; font-size: 1.8rem; }
        
        .section-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #8b949e; margin: 30px 0 15px 0; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        
        /* Inputs */
        .input-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        label { display: block; font-size: 0.7rem; color: #8b949e; margin-bottom: 5px; }
        input { width: 100%; background: #0d1117; border: 1px solid var(--border); color: var(--accent); padding: 10px; border-radius: 6px; font-weight: bold; }
        
        /* Waterfall Buckets (N:B Format) */
        .bucket-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .bucket { background: #0d1117; border: 1px solid #21262d; padding: 12px; border-radius: 8px; position: relative; }
        .bucket-label { font-size: 0.65rem; color: #8b949e; font-weight: bold; }
        .bucket-main { font-family: 'Courier New', monospace; font-size: 1rem; margin: 5px 0; }
        .target { color: #8b949e; }
        .balance { color: var(--accent); font-weight: bold; }
        
        /* Status Indicators */
        .status { font-size: 0.6rem; text-transform: uppercase; font-weight: 900; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        .status-below { background: rgba(255, 75, 43, 0.15); color: var(--danger); }
        .status-min { background: rgba(255, 204, 0, 0.15); color: var(--warning); }
        .status-max { background: rgba(0, 255, 204, 0.15); color: var(--success); }

        /* Action Buttons */
        .admin-actions { display: flex; gap: 15px; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); }
        .btn { flex: 1; padding: 16px; border-radius: 8px; font-weight: 900; cursor: pointer; border: none; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-save { background: var(--accent); color: #000; }
        .btn-reallocate { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn-wipe { background: transparent; border: 1px solid var(--danger); color: var(--danger); flex: 0.4; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>🤝 Sponsor Control Center</h1>
            <p style="color: #8b949e;">Waterfall Policy & Real-time Bucket Tracking</p>
        </div>
        <div style="text-align: right;">
            <label>Total Fund in Vault</label>
            <div id="total_vault_display" style="font-size: 1.8rem; font-weight: 900; color: var(--accent);">0.00 TBNB</div>
        </div>
    </div>

    <div class="section-title">Waterfall Limits (Min/Max)</div>
    <div class="grid-3">
        <div class="card">
            <h2>🗓️ Weekly Rules</h2>
            <div class="input-pair">
                <div><label>Min (Prio 1)</label><input type="number" id="wk_min" value="1000"></div>
                <div><label>Max (Prio 4)</label><input type="number" id="wk_max" value="5000"></div>
            </div>
        </div>
        <div class="card">
            <h2>🏆 Season Rules</h2>
            <div class="input-pair">
                <div><label>Min (Prio 2)</label><input type="number" id="sea_min" value="5000"></div>
                <div><label>Max (Prio 5)</label><input type="number" id="sea_max" value="20000"></div>
            </div>
        </div>
        <div class="card">
            <h2>🛠️ Constructor Rules</h2>
            <div class="input-pair">
                <div><label>Min (Prio 3)</label><input type="number" id="con_min" value="2000"></div>
                <div><label>Max (Prio 6)</label><input type="number" id="con_max" value="10000"></div>
            </div>
        </div>
    </div>

    <div class="section-title">Round Buckets (N:B)</div>
    <div class="bucket-grid" id="round_buckets_grid">
        </div>

    <div class="section-title">Specialized Pools</div>
    <div class="grid-3">
        <div id="season_bucket_ui"></div>
        <div id="constructor_bucket_ui"></div>
        <div id="overflow_bucket_ui"></div>
    </div>

    <div class="admin-actions">
        <button class="btn btn-save" onclick="savePolicy()">Save Policy</button>
        <button class="btn btn-reallocate" onclick="runWaterfall()">Reallocate Waterfall</button>
        <button class="btn btn-wipe" onclick="wipeAll()">Wipe All Rounds</button>
    </div>
</div>

<script>
    // 1. DYNAMIC STATE (This would be pulled from your Master Admin / Database)
    let currentRound = 3; // The current round number (1-12)
    let totalVault = 60000; // Total TBNB collected since Day 1
    
    function runWaterfall() {
        // --- A. GET LIMITS FROM SPONSOR INPUTS ---
        const wkMin = parseFloat(document.getElementById('wk_min').value) || 0;
        const wkMax = parseFloat(document.getElementById('wk_max').value) || 0;
        const seaMin = parseFloat(document.getElementById('sea_min').value) || 0;
        const seaMax = parseFloat(document.getElementById('sea_max').value) || 0;
        const conMin = parseFloat(document.getElementById('con_min').value) || 0;
        const conMax = parseFloat(document.getElementById('con_max').value) || 0;

        let remaining = totalVault;
        let buckets = {
            rounds: Array(12).fill(0),
            season: 0,
            constructor: 0,
            overflow: 0,
            pastSpent: 0
        };

        // --- B. TEMPORAL ALLOCATION ---

        // Step 1: Lock and deduct Past Rounds (Assuming they hit Max)
        for (let i = 0; i < currentRound - 1; i++) {
            buckets.rounds[i] = wkMax;
            remaining -= wkMax;
            buckets.pastSpent += wkMax;
        }

        // Step 2: Fill MINS for Current & Future Rounds (Priority 1)
        for (let i = currentRound - 1; i < 12; i++) {
            let amt = Math.min(remaining, wkMin);
            buckets.rounds[i] += amt;
            remaining -= amt;
        }

        // Step 3: Fill Season MIN (Priority 2)
        let sMinAmt = Math.min(remaining, seaMin);
        buckets.season += sMinAmt;
        remaining -= sMinAmt;

        // Step 4: Fill Constructor MIN (Priority 3)
        let cMinAmt = Math.min(remaining, conMin);
        buckets.constructor += cMinAmt;
        remaining -= cMinAmt;

        // Step 5: Fill ACTIVE Round to MAX (Priority 4 - Bonus to current racers)
        let activeIdx = currentRound - 1;
        let activeTopUp = Math.min(remaining, wkMax - buckets.rounds[activeIdx]);
        buckets.rounds[activeIdx] += activeTopUp;
        remaining -= activeTopUp;

        // Step 6: Fill FUTURE Rounds to MAX (Priority 4 - Extended)
        for (let i = currentRound; i < 12; i++) {
            let topUp = Math.min(remaining, wkMax - buckets.rounds[i]);
            buckets.rounds[i] += topUp;
            remaining -= topUp;
        }

        // Step 7: Fill Season MAX (Priority 5)
        let sMaxTop = Math.min(remaining, seaMax - buckets.season);
        buckets.season += sMaxTop;
        remaining -= sMaxTop;

        // Step 8: Fill Constructor MAX (Priority 6)
        let cMaxTop = Math.min(remaining, conMax - buckets.constructor);
        buckets.constructor += cMaxTop;
        remaining -= cMaxTop;

        // Step 9: Overflow
        buckets.overflow = remaining;

        // --- C. REFRESH UI ---
        updateUI(buckets, wkMin, wkMax, seaMin, seaMax, conMin, conMax);
    }

    function updateUI(b, wkMin, wkMax, seaMin, seaMax, conMin, conMax) {
        document.getElementById('total_vault_display').innerText = `${totalVault.toLocaleString()} TBNB`;
        const grid = document.getElementById('round_buckets_grid');
        grid.innerHTML = '';

        for (let i = 0; i < 12; i++) {
            let roundNum = i + 1;
            let status = "future";
            let label = `Round ${roundNum}`;
            
            if (roundNum < currentRound) {
                status = "past";
                label += " (PAST)";
            } else if (roundNum === currentRound) {
                status = "active";
                label += " (LIVE)";
            }

            grid.innerHTML += renderBucketHTML(label, b.rounds[i], wkMin, wkMax, status);
        }

        // Special Buckets
        document.getElementById('season_bucket_ui').innerHTML = renderBucketHTML('Season Pool', b.season, seaMin, seaMax, 'special');
        document.getElementById('constructor_bucket_ui').innerHTML = renderBucketHTML('Constructor Pool', b.constructor, conMin, conMax, 'special');
        document.getElementById('overflow_bucket_ui').innerHTML = `
            <div class="card overflow">
                <span class="bucket-label">Vault Overflow</span>
                <div class="bucket-main"><span class="balance">${b.overflow.toFixed(2)}</span></div>
                <span class="status status-max">Secured</span>
            </div>
        `;
    }

    function renderBucketHTML(label, current, min, max, state) {
        let statusClass = "status-below";
        let statusText = "Below Min";
        
        if (current >= max) { statusClass = "status-max"; statusText = "Maxed"; }
        else if (current >= min) { statusClass = "status-min"; statusText = "At Min"; }

        // Styling past/active/future
        let borderStyle = "";
        if (state === 'past') borderStyle = "opacity: 0.5; border-color: #444;";
        if (state === 'active') borderStyle = "border: 2px solid var(--accent); background: rgba(0,255,204,0.05);";

        return `
            <div class="card" style="${borderStyle}">
                <span class="bucket-label">${label}</span>
                <div class="bucket-main">
                    <span class="target">${max}:</span><span class="balance">${current.toFixed(0)}</span>
                </div>
                <span class="status ${statusClass}">${statusText}</span>
            </div>
        `;
    }
</script>

</body>
</html>
