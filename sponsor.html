<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANRAT | Sponsor Portal</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #0b0e14; --card: #161b22; --border: #30363d; --boost: #b300ff; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* THE REQUESTED HEADER: Split Treasury */
        .sponsor-header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .round-info { font-weight: 900; color: var(--accent); font-size: 1.2rem; }
        
        .treasury-display { display: flex; gap: 25px; }
        .t-group { text-align: center; }
        .t-label { font-size: 0.6rem; text-transform: uppercase; color: #8b949e; display: block; margin-bottom: 4px; }
        .t-val { font-family: 'Courier New', monospace; font-weight: 900; font-size: 1.1rem; }

        /* Preservation of your existing Sponsor Styles */
        .car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .car-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 10px; }
        .car-id { font-weight: 900; color: var(--accent); margin-bottom: 10px; display: flex; justify-content: space-between; }
        .trait-row { display: flex; justify-content: space-between; font-size: 0.8rem; margin: 5px 0; color: #8b949e; }
        .trait-val { color: white; font-weight: bold; }
        
        .btn-action { 
            width: 100%; margin-top: 10px; padding: 10px; border-radius: 6px; 
            border: none; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }
        .btn-boost { background: var(--boost); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="sponsor-header">
        <div class="round-info">ROUND <span id="display_round">4</span></div>
        
        <div class="treasury-display">
            <div class="t-group">
                <span class="t-label">Normal</span>
                <span id="bal_n" class="t-val" style="color:var(--accent)">0</span>
            </div>
            <div class="t-group">
                <span class="t-label">Boost</span>
                <span id="bal_b" class="t-val" style="color:var(--boost)">0</span>
            </div>
            <div class="t-group" style="border-left: 1px solid #333; padding-left: 20px;">
                <span class="t-label">Total Treasury</span>
                <span id="bal_total" class="t-val" style="color:white">0</span>
            </div>
        </div>
    </div>

    <div id="car_grid" class="car-grid"></div>
</div>

<script>
    // Configuration
    const firebaseConfig = {
        apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4",
        databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "nuclearf1-94a6b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Sync Round from race_state
    db.ref('race_state/round').on('value', snap => {
        document.getElementById('display_round').innerText = snap.val() || 4;
    });

    // 2. Sync Treasury (Split Display)
    db.ref('treasury').on('value', snap => {
        const t = snap.val() || { normal: 0, boost: 0 };
        document.getElementById('bal_n').innerText = Math.floor(t.normal).toLocaleString();
        document.getElementById('bal_b').innerText = Math.floor(t.boost).toLocaleString();
        document.getElementById('bal_total').innerText = Math.floor(t.normal + t.boost).toLocaleString();
    });

    // 3. Original Car List Logic
    db.ref('cars').on('value', snap => {
        const grid = document.getElementById('car_grid');
        grid.innerHTML = '';
        const cars = snap.val();
        
        for(let id in cars) {
            const car = cars[id];
            grid.innerHTML += `
                <div class="car-card">
                    <div class="car-id">
                        <span>${id}</span>
                        <span style="color:#555">#${car.role || 'NONE'}</span>
                    </div>
                    <div class="trait-row"><span>Propulsion</span><span class="trait-val">${car.traits?.propulsion || 0}</span></div>
                    <div class="trait-row"><span>Traction</span><span class="trait-val">${car.traits?.traction || 0}</span></div>
                    <div class="trait-row"><span>Stability</span><span class="trait-val">${car.traits?.stability || 0}</span></div>
                    <button class="btn-action btn-boost" onclick="applyBoost('${id}')">Apply Boost</button>
                </div>
            `;
        }
    });

    function applyBoost(carId) {
        // Your existing boost logic here
        console.log("Boosting:", carId);
    }
</script>
</body>
</html>
