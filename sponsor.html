<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANRAT | Sponsor Control Center</title>
    <style>
        :root { --accent: #00ffcc; --bg: #0b0e14; --card: #161b22; --border: #30363d; --danger: #ff4b2b; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        h1 { color: var(--accent); margin: 0; font-size: 1.8rem; }
        
        .section-title { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; color: #8b949e; margin: 30px 0 15px 0; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; }
        
        /* Inputs */
        .input-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        label { display: block; font-size: 0.7rem; color: #8b949e; margin-bottom: 5px; }
        input { width: 100%; background: #0d1117; border: 1px solid var(--border); color: var(--accent); padding: 10px; border-radius: 6px; font-weight: bold; }
        
        /* Buckets Display */
        .bucket-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 10px; }
        .bucket { background: #0d1117; border: 1px solid #21262d; padding: 10px; border-radius: 6px; text-align: center; }
        .bucket-label { font-size: 0.6rem; color: #8b949e; display: block; }
        .bucket-value { font-size: 0.85rem; font-weight: bold; color: var(--accent); }
        .special-bucket { grid-column: span 3; background: rgba(0, 255, 204, 0.05); border: 1px solid var(--accent); }

        /* Action Buttons */
        .admin-actions { display: flex; gap: 15px; margin-top: 30px; }
        .btn { flex: 1; padding: 15px; border-radius: 8px; font-weight: 900; cursor: pointer; border: none; transition: 0.2s; text-transform: uppercase; }
        .btn-save { background: var(--accent); color: #000; }
        .btn-reallocate { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn-wipe { background: transparent; border: 1px solid var(--danger); color: var(--danger); font-size: 0.8rem; flex: 0.5; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>🤝 Sponsor Control Center</h1>
            <p style="color: #8b949e; margin: 5px 0 0 0;">Manage limits and monitor TBNB bucket allocations.</p>
        </div>
        <div style="text-align: right;">
            <label>Total Fund Available</label>
            <div style="font-size: 1.5rem; font-weight: 900; color: var(--accent);">24,500 TBNB</div>
        </div>
    </div>

    <div class="section-title">Waterfall Limit Settings</div>
    <div class="grid-3">
        <div class="card">
            <h2 style="font-size: 1rem; margin-top: 0;">🗓️ Weekly Limits</h2>
            <div class="input-pair">
                <div><label>MIN (PRIO 1)</label><input type="number" id="wk_min" value="1000"></div>
                <div><label>MAX (PRIO 4)</label><input type="number" id="wk_max" value="5000"></div>
            </div>
        </div>
        <div class="card">
            <h2 style="font-size: 1rem; margin-top: 0;">🏆 Season Limits</h2>
            <div class="input-pair">
                <div><label>MIN (PRIO 2)</label><input type="number" id="sea_min" value="5000"></div>
                <div><label>MAX (PRIO 5)</label><input type="number" id="sea_max" value="20000"></div>
            </div>
        </div>
        <div class="card">
            <h2 style="font-size: 1rem; margin-top: 0;">🛠️ Constructor Limits</h2>
            <div class="input-pair">
                <div><label>MIN (PRIO 3)</label><input type="number" id="con_min" value="2000"></div>
                <div><label>MAX (PRIO 6)</label><input type="number" id="con_max" value="10000"></div>
            </div>
        </div>
    </div>

    <div class="section-title">Live Round Buckets (1-12)</div>
    <div class="card">
        <div class="bucket-grid" id="round_buckets">
            </div>
    </div>

    <div class="section-title">Specialized Buckets</div>
    <div class="grid-3">
        <div class="card special-bucket">
            <span class="bucket-label">Total Season Pool</span>
            <div class="bucket-value" style="font-size: 1.2rem;" id="season_val">0.00 TBNB</div>
        </div>
        <div class="card special-bucket" style="border-color: #8b949e;">
            <span class="bucket-label">Total Constructor Pool</span>
            <div class="bucket-value" style="font-size: 1.2rem;" id="constructor_val">0.00 TBNB</div>
        </div>
    </div>

    <div class="admin-actions">
        <button class="btn btn-save" onclick="saveLimits()">Save Policy</button>
        <button class="btn btn-reallocate" onclick="triggerReallocate()">Reallocate Fund Waterfall</button>
        <button class="btn btn-wipe" onclick="wipeRounds()">Wipe All Rounds</button>
    </div>
</div>

<script>
    // Initialize 12 Round Buckets UI
    const bucketContainer = document.getElementById('round_buckets');
    for (let i = 1; i <= 12; i++) {
        bucketContainer.innerHTML += `
            <div class="bucket">
                <span class="bucket-label">RD ${i}</span>
                <span class="bucket-value" id="rd_${i}_val">0.00</span>
            </div>
        `;
    }

    function saveLimits() {
        console.log("Saving limits to DB...");
        alert("Policy Limits Saved.");
    }

    function triggerReallocate() {
        console.log("Running Waterfall Algorithm...");
        // This is where your waterfall logic from previous steps would run
        // and update the 'bucket-value' innerTexts.
        alert("Reallocation Complete. Fund has been distributed across Rounds, Season, and Constructors.");
    }

    function wipeRounds() {
        if(confirm("DANGER: This will set all round buckets to 0. Are you sure?")) {
            for (let i = 1; i <= 12; i++) {
                document.getElementById(`rd_${i}_val`).innerText = "0.00";
            }
            document.getElementById('season_val').innerText = "0.00 TBNB";
            document.getElementById('constructor_val').innerText = "0.00 TBNB";
        }
    }
</script>

</body>
</html>
