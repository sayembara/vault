<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANRAT | Sponsor Policy Center</title>
    <style>
        :root { 
            --accent: #00ffcc; --bg: #0b0e14; --card: #161b22; --border: #30363d; 
            --danger: #ff4b2b; --warning: #ffcc00; --success: #00ffcc;
        }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        h1 { color: var(--accent); margin: 0; font-size: 1.6rem; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Live Vault Display (Linked from Funding) */
        .vault-stats { text-align: right; }
        .vault-label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; font-weight: 900; }
        .vault-value { font-size: 2rem; font-weight: 900; color: var(--accent); line-height: 1; }

        .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #8b949e; margin: 35px 0 15px 0; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        /* Policy Inputs */
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
        
        .input-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        label { display: block; font-size: 0.7rem; color: #8b949e; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; background: #0d1117; border: 1px solid var(--border); color: var(--accent); padding: 12px; border-radius: 6px; font-weight: bold; outline: none; }
        input:focus { border-color: var(--accent); }

        /* Buttons */
        .admin-actions { display: flex; gap: 15px; margin-top: 40px; }
        .btn { flex: 1; padding: 18px; border-radius: 8px; font-weight: 900; cursor: pointer; border: none; text-transform: uppercase; transition: 0.2s; }
        .btn-save { background: var(--accent); color: #000; }
        .btn-wipe { background: transparent; border: 2px solid var(--danger); color: var(--danger); }
        .btn-wipe:hover { background: var(--danger); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>🤝 Sponsor Policy</h1>
            <div id="round_indicator" style="font-size: 0.8rem; color: #8b949e; margin-top: 5px;">READING MASTER TIMELINE...</div>
        </div>
        <div class="vault-stats">
            <span class="vault-label">Vault Source (Funding Page)</span>
            <div class="vault-value" id="sponsor_vault_display">0.00 TBNB</div>
        </div>
    </div>

    <div class="section-title">Global Waterfall Limits (N)</div>
    <div class="grid-3">
        <div class="card">
            <label>🗓️ Weekly (Rounds)</label>
            <div class="input-pair">
                <div><label>MIN</label><input type="number" id="wk_min" value="1000"></div>
                <div><label>MAX (N)</label><input type="number" id="wk_max" value="5000"></div>
            </div>
        </div>
        <div class="card">
            <label>🏆 Season Pool</label>
            <div class="input-pair">
                <div><label>MIN</label><input type="number" id="sea_min" value="5000"></div>
                <div><label>MAX (N)</label><input type="number" id="sea_max" value="20000"></div>
            </div>
        </div>
        <div class="card">
            <label>🛠️ Constructor Pool</label>
            <div class="input-pair">
                <div><label>MIN</label><input type="number" id="con_min" value="2000"></div>
                <div><label>MAX (N)</label><input type="number" id="con_max" value="10000"></div>
            </div>
        </div>
    </div>

    <div class="admin-actions">
        <button class="btn btn-save" onclick="savePolicy()">Update Economic Policy</button>
        <button class="btn btn-wipe" onclick="triggerWipe()">Wipe All Payouts</button>
    </div>
</div>

<script>
    // These would normally be stored in localStorage or a Database
    // The Funding page uses these to calculate the N : B ratio.
    function savePolicy() {
        const policy = {
            wk_max: document.getElementById('wk_max').value,
            sea_max: document.getElementById('sea_max').value,
            con_max: document.getElementById('con_max').value
        };
        alert("Policy Updated! Funding page will now use " + policy.wk_max + " as the N value for rounds.");
    }

    /** * LINK TO FUNDING: This function simulates pulling the total 
     * from the Funding Page's 'totalNormal' and 'totalBoost' state.
     */
    function syncVaultValue() {
        // In a live environment, you'd fetch this from your database.
        // For this demo, we check if the funding state exists.
        const liveTotal = 56000; // This value represents totalNormal + totalBoost
        document.getElementById('sponsor_vault_display').innerText = liveTotal.toLocaleString() + " TBNB";
        document.getElementById('round_indicator').innerText = "SEASON 1 | ROUND 4 ACTIVE";
    }

    /** * WIPE TRIGGER: This sends a message to the Funding Page 
     * to reset its internal TBNB counters to zero.
     */
    function triggerWipe() {
        if(confirm("CRITICAL: This will reset the Treasury to 0.00 TBNB on the Funding Page. Continue?")) {
            // Send signal to funding.html
            window.parent.postMessage('WIPE_TREASURY', '*'); 
            document.getElementById('sponsor_vault_display').innerText = "0.00 TBNB";
            alert("Treasury Zeroed.");
        }
    }

    // Initial Sync
    syncVaultValue();
</script>
</body>
</html>
