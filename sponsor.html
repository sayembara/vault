<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Sponsor Control & Audit</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00ffcc; --danger: #ff4b2b; --gold: #ffcc00; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: #0f0c29; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; text-align: center; }
        .btn-connect { background: #f6851b; color: white; padding: 15px 30px; font-size: 1.2rem; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; }
        
        #admin-ui { display: none; width: 100%; max-width: 900px; flex-direction: column; align-items: center; gap: 20px; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; text-align: center; width: 100%; box-sizing: border-box; }
        
        input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); padding: 10px; border-radius: 8px; color: white; width: 80px; text-align: center; }
        button { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        .btn-set { background: #fff; color: #000; margin-left: 5px; }
        .btn-reallocate { background: var(--accent); color: #00334e; width: 100%; font-size: 1rem; margin-top: 10px; }
        .btn-view { background: var(--gold); color: #000; font-size: 0.7rem; padding: 5px 10px; }
        .btn-copy { background: #444; color: #fff; width: 100%; margin-top: 10px; font-size: 0.8rem; }
        .btn-wipe { background: transparent; border: 2px solid var(--danger); color: var(--danger); width: 100%; margin-top: 20px; }

        .sensor-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 100%; }
        .sensor-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; text-align: center; }
        .val-sub-n { font-size: 0.65rem; color: #bbb; }
        .val-sub-b { font-size: 0.65rem; color: var(--gold); font-weight: bold; }
        .val-main { font-size: 0.95rem; font-weight: bold; color: var(--accent); border-top: 1px solid rgba(255,255,255,0.08); padding-top: 4px; margin-top: 4px; }
        
        .history-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
        .history-content { display: none; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        .history-list { text-align: left; max-height: 200px; overflow-y: auto; }
        .log-entry { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center; }
        .active .toggle-arrow { transform: rotate(180deg); }

        #historyModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a2e; border: 1px solid var(--accent); padding: 30px; border-radius: 20px; width: 95%; max-width: 550px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.8rem; }
        th, td { border: 1px solid rgba(255,255,255,0.1); padding: 8px; text-align: center; }
        .t-footer { background: rgba(255,255,255,0.05); font-weight: 900; }
        .td-b { color: var(--gold); }
        .td-t { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1>SPONSOR GATEWAY</h1>
        <button class="btn-connect" id="connectBtn">Connect MetaMask</button>
    </div>

    <div id="admin-ui">
        <div class="container">
            <div class="card">
                <h3>SET LIMITS</h3>
                <div>Min: <input type="number" id="minIn" step="0.1"> <button class="btn-set" id="btnMin">SET</button></div>
                <div style="margin-top:10px;">Max: <input type="number" id="maxIn" step="0.1"> <button class="btn-set" id="btnMax">SET</button></div>
                <p id="curLimits" style="font-size: 0.7rem; color:#888; margin-top:10px;"></p>
            </div>
            <div class="card">
                <h3>VAULT OVERFLOW</h3>
                <div style="font-size: 2.2rem; color: var(--gold); font-family: monospace;" id="disp-overflow">0.000</div>
                <button class="btn-reallocate" id="btnReallocate">REALLOCATE FUNDS</button>
            </div>
        </div>

        <div class="sensor-grid" id="sensorGrid"></div>

        <div class="card" id="historyCard">
            <div class="history-header" id="toggleHistory">
                <h4 style="margin:0; color: #888;">SEASON HISTORY LOGS</h4>
                <span class="toggle-arrow">▼</span>
            </div>
            <div class="history-content" id="historyContent">
                <div id="history-list" class="history-list"><i>Loading...</i></div>
            </div>
        </div>

        <button class="btn-wipe" id="btnWipe">🚨 WIPE ALL ROUNDS</button>
    </div>

    <div id="historyModal">
        <div class="modal-content">
            <h3 id="modalTitle" style="color: var(--accent); margin-top:0;">Audit Details</h3>
            <div id="modalBody"></div>
            <button class="btn-copy" id="btnCopySummary">📋 COPY DATA SUMMARY</button>
            <button onclick="document.getElementById('historyModal').style.display='none'" style="margin-top:10px; width:100%; background:var(--danger); color:white; border-radius:10px; padding:10px;">CLOSE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const WHITELISTED_ADMIN = "0xCe9782f77eC560a1Cb329F935b5D416AA41f1a5d".toLowerCase(); 
        const firebaseConfig = { apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentSummaryText = ""; // Holds the data for the clipboard

        document.getElementById('toggleHistory').onclick = () => {
            const content = document.getElementById('historyContent');
            document.getElementById('historyCard').classList.toggle('active');
            content.style.display = content.style.display === 'block' ? 'none' : 'block';
        };

        document.getElementById('connectBtn').onclick = async () => {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (accounts[0].toLowerCase() === WHITELISTED_ADMIN) {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('admin-ui').style.display = 'flex';
                    initSponsorActions();
                }
            }
        };

        function initSponsorActions() {
            onValue(ref(db), (snap) => {
                const data = snap.val() || {};
                const vault = data.vault || {};
                const history = data.history?.transitions || {};

                // Grid update logic...
                const grid = document.getElementById('sensorGrid');
                grid.innerHTML = '';
                for(let i=1; i<=12; i++) {
                    let r = vault.rounds?.[`r${i}`] || { normal: 0, boost: 0 };
                    grid.innerHTML += `<div class="sensor-box">
                        <div style="font-size:0.55rem;color:#555;margin-bottom:4px;">RD ${i}</div>
                        <div class="val-sub-n">N: ${parseFloat(r.normal||0).toFixed(2)}</div>
                        <div class="val-sub-b">B: ${parseFloat(r.boost||0).toFixed(2)}</div>
                        <div class="val-main">${(parseFloat(r.normal||0)+parseFloat(r.boost||0)).toFixed(3)}</div>
                    </div>`;
                }

                const histList = document.getElementById('history-list');
                const entries = Object.entries(history).reverse();
                histList.innerHTML = entries.length > 0 ? entries.map(([id, e]) => `
                    <div class="log-entry">
                        <span>Season ${e.from_season} <small style="color:#555; margin-left:10px;">${e.timestamp}</small></span>
                        <button class="btn-view" onclick="window.showDetails('${id}')">DETAILS</button>
                    </div>`).join('') : '<i>No records.</i>';

                window.showDetails = (id) => {
                    const record = history[id];
                    const states = record.final_vault_state;
                    let tN = 0, tB = 0, tT = 0;
                    
                    let table = `<table><tr><th>RD</th><th>Norm</th><th>Boost</th><th>Total</th></tr>`;
                    for(let i=1; i<=12; i++) {
                        let rd = states[`r${i}`];
                        let n = parseFloat(rd.normal || 0);
                        let b = parseFloat(rd.boost || 0);
                        let tot = parseFloat(rd.total || 0);
                        tN += n; tB += b; tT += tot;
                        table += `<tr><td>${i}</td><td>${n.toFixed(2)}</td><td class="td-b">${b.toFixed(2)}</td><td class="td-t">${tot.toFixed(3)}</td></tr>`;
                    }
                    table += `<tr class="t-footer"><td>SUM</td><td>${tN.toFixed(2)}</td><td class="td-b">${tB.toFixed(2)}</td><td class="td-t">${tT.toFixed(3)}</td></tr>`;
                    
                    // Format text for copy button
                    currentSummaryText = `SANRAT AUDIT: Season ${record.from_season}\nDate: ${record.timestamp}\n------------------\nTotal Normal: ${tN.toFixed(2)} tBNB\nTotal Boost: ${tB.toFixed(2)} tBNB\nGRAND TOTAL: ${tT.toFixed(3)} tBNB\nReclaimed: ${record.moved_from_overflow} tBNB`;
                    
                    document.getElementById('modalTitle').innerText = `Season ${record.from_season} Summary`;
                    document.getElementById('modalBody').innerHTML = table + `</table>`;
                    document.getElementById('historyModal').style.display = 'flex';
                };
            });

            document.getElementById('btnCopySummary').onclick = () => {
                navigator.clipboard.writeText(currentSummaryText);
                const btn = document.getElementById('btnCopySummary');
                btn.innerText = "✅ COPIED TO CLIPBOARD!";
                setTimeout(() => btn.innerText = "📋 COPY DATA SUMMARY", 2000);
            };

            // Limit and Wipe buttons logic...
            document.getElementById('btnMin').onclick = () => update(ref(db, 'master_settings/limits'), { min: parseFloat(document.getElementById('minIn').value) });
            document.getElementById('btnMax').onclick = () => update(ref(db, 'master_settings/limits'), { max: parseFloat(document.getElementById('maxIn').value) });
            document.getElementById('btnWipe').onclick = () => confirm("Wipe all rounds?") && set(ref(db, 'vault/rounds'), {});
        }
    </script>
</body>
</html>
