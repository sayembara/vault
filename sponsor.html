<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANRAT | Sponsor Policy Center</title>
    <style>
        :root { 
            --accent: #00ffcc; --bg: #0b0e14; --card: #161b22; --border: #30363d; 
            --danger: #ff4b2b; --warning: #ffcc00; --success: #00ffcc;
        }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Header & Live Sync */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 30px; }
        h1 { color: var(--accent); margin: 0; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; }
        
        .vault-stats { text-align: right; background: rgba(0, 255, 204, 0.05); padding: 15px 25px; border-radius: 12px; border: 1px solid var(--border); }
        .vault-label { font-size: 0.65rem; color: #8b949e; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        .vault-value { font-size: 2.2rem; font-weight: 900; color: var(--accent); font-family: 'Courier New', monospace; line-height: 1; }

        .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #8b949e; margin: 40px 0 20px 0; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        /* Policy Grid */
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 25px; transition: 0.3s; }
        .card:hover { border-color: #444; }
        
        .input-group { margin-top: 15px; }
        .input-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        
        label { display: block; font-size: 0.65rem; color: #8b949e; margin-bottom: 8px; font-weight: 800; text-transform: uppercase; }
        input { 
            width: 100%; background: #0d1117; border: 1px solid var(--border); color: var(--accent); 
            padding: 14px; border-radius: 8px; font-weight: 900; font-size: 1rem; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 255, 204, 0.1); }

        /* Action Buttons */
        .admin-actions { display: flex; gap: 20px; margin-top: 50px; }
        .btn { flex: 1; padding: 20px; border-radius: 10px; font-weight: 900; cursor: pointer; border: none; text-transform: uppercase; font-size: 0.9rem; transition: 0.2s; }
        .btn-save { background: var(--accent); color: #000; box-shadow: 0 4px 15px rgba(0, 255, 204, 0.2); }
        .btn-wipe { background: transparent; border: 2px solid var(--danger); color: var(--danger); }
        .btn-wipe:hover { background: var(--danger); color: white; box-shadow: 0 4px 15px rgba(255, 75, 43, 0.3); }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>🤝 Sponsor Policy</h1>
            <div id="round_tag" style="font-size: 0.8rem; color: #8b949e; margin-top: 8px; font-weight: 600;">STATUS: CONNECTED TO MASTER</div>
        </div>
        <div class="vault-stats">
            <span class="vault-label">Live Treasury (Linked)</span>
            <div class="vault-value" id="sponsor_vault_display">0 TBNB</div>
        </div>
    </div>

    <div class="section-title">Global Waterfall Limits (The "N" Values)</div>
    <div class="grid-3">
        <div class="card">
            <label>🗓️ Round Allocation</label>
            <div class="input-pair">
                <div><label>Min (Floor)</label><input type="number" id="wk_min" value="1000"></div>
                <div><label>Max (Limit N)</label><input type="number" id="wk_max" value="5000"></div>
            </div>
        </div>
        <div class="card">
            <label>🏆 Season Payout</label>
            <div class="input-pair">
                <div><label>Min (Floor)</label><input type="number" id="sea_min" value="5000"></div>
                <div><label>Max (Limit N)</label><input type="number" id="sea_max" value="20000"></div>
            </div>
        </div>
        <div class="card">
            <label>🛠️ Constructor Team</label>
            <div class="input-pair">
                <div><label>Min (Floor)</label><input type="number" id="con_min" value="2000"></div>
                <div><label>Max (Limit N)</label><input type="number" id="con_max" value="10000"></div>
            </div>
        </div>
    </div>

    <div class="admin-actions">
        <button class="btn btn-save" onclick="updatePolicy()">Update Economic Policy</button>
        <button class="btn btn-wipe" onclick="triggerWipe()">Wipe All Payouts (0.00)</button>
    </div>
</div>

<script>
    /**
     * SYNCING WITH FUNDING PAGE
     * We read the shared 'sanrat_vault_total' from localStorage.
     */
    function syncFromVault() {
        const liveTotal = localStorage.getItem('sanrat_vault_total') || "0";
        const formattedTotal = parseFloat(liveTotal).toLocaleString();
        
        document.getElementById('sponsor_vault_display').innerText = formattedTotal + " TBNB";
        
        // Update Round Tag (Mocking Master read)
        document.getElementById('round_tag').innerText = "SEASON 1 | ROUND 4 ACTIVE";
    }

    /**
     * POLICY UPDATES
     * This pushes the new N values into memory for Funding.html to read.
     */
    function updatePolicy() {
        const policy = {
            wk_max: document.getElementById('wk_max').value,
            sea_max: document.getElementById('sea_max').value,
            con_max: document.getElementById('con_max').value
        };
        // Save limits to localStorage for the Funding Page to pick up
        localStorage.setItem('sanrat_limits', JSON.stringify(policy));
        alert("Economic Policy Updated. N values synchronized.");
    }

    /**
     * THE WIPE SIGNAL
     * Sets the vault total to 0 in memory. Funding.html is listening for this.
     */
    function triggerWipe() {
        if(confirm("CRITICAL: Wipe out all Treasury funds? This action will zero out the Funding Page and cannot be undone.")) {
            // Signal the Funding Page by zeroing the source value
            localStorage.setItem('sanrat_vault_total', "0");
            localStorage.setItem('sanrat_total_normal', "0");
            localStorage.setItem('sanrat_total_boost', "0");
            
            syncFromVault();
            alert("Treasury reset to 0.00 TBNB.");
        }
    }

    // Start sync loop (Refresh every 1 second)
    setInterval(syncFromVault, 1000);
    syncFromVault();
</script>
</body>
</html>
