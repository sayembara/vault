<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUCLEAR_SPONSOR_PORTAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --accent: #f3ba2f; --bg: #000; --panel: #0a0a0a; --border: #222; --boost: #3498db; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; }
        .panel { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 4px; margin-bottom: 20px; }
        h3 { color: var(--accent); margin-top: 0; letter-spacing: 2px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        /* Grid for Round Buckets */
        .buckets-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 20px 0; }
        .bucket { background: #111; border: 1px solid #222; padding: 10px; text-align: center; border-radius: 4px; }
        .bucket-label { font-size: 0.7em; color: #666; display: block; }
        .bucket-val { font-size: 0.9em; color: var(--accent); font-weight: bold; }
        .progress-bg { background: #000; height: 4px; width: 100%; margin-top: 8px; border-radius: 2px; }
        .progress-fill { background: var(--accent); height: 100%; width: 0%; transition: 0.3s; }

        /* Controls */
        .input-group { display: flex; gap: 10px; margin-top: 20px; }
        input { flex: 1; padding: 15px; background: #000; border: 1px solid #333; color: #fff; font-family: inherit; }
        button { padding: 0 30px; background: var(--accent); border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        .mode-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 10px; border: 1px solid #333; background: #111; color: #666; cursor: pointer; font-size: 0.8em; }
        .mode-btn.active { border-color: var(--accent); color: var(--accent); }
        .mode-btn.boost-active { border-color: var(--boost); color: var(--boost); }
        
        #status-log { font-size: 0.75em; color: #555; margin-top: 15px; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h3>SEASON_FUNDING_MATRIX</h3>
        <div class="buckets-grid" id="bucketDisplay">
            </div>
        <div class="stat-box" style="display:flex; justify-content: space-between; font-size: 0.8em; color: #888;">
            <span>OVERFLOW_POOL: <span id="overflowVal" style="color:#2ecc71">0.00</span> tBNB</span>
            <span>PHASE: <span id="phaseLabel" style="color:#fff">1 (SEQUENTIAL)</span></span>
        </div>
    </div>

    <div class="panel">
        <h3>CONTRIBUTE_SPONSORSHIP</h3>
        <div class="mode-selector">
            <button class="mode-btn active" id="modeNormal">NORMAL_MODE (STABILIZE)</button>
            <button class="mode-btn" id="modeBoost">BOOST_MODE (SEASON_ONLY)</button>
        </div>
        <div class="input-group">
            <input type="number" id="sponsorAmt" step="0.01" placeholder="Amount in tBNB">
            <button id="btnSponsor">EXECUTE_FUNDING</button>
        </div>
        <div id="status-log">// STANDBY //</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "nuclearf1-94a6b.firebaseapp.com",
        databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "nuclearf1-94a6b",
        storageBucket: "nuclearf1-94a6b.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    // CONFIGURATION LIMITS
    const MIN_VAL = 0.5; // Phase 1 Goal per round
    const MAX_VAL = 2.0; // Phase 3 Ceiling per round
    let currentMode = 'normal';

    // Initialize UI Buckets
    const grid = document.getElementById('bucketDisplay');
    for(let i=1; i<=12; i++) {
        grid.innerHTML += `
            <div class="bucket">
                <span class="bucket-label">ROUND_${i}</span>
                <span class="bucket-val" id="bVal${i}">0.00</span>
                <div class="progress-bg"><div class="progress-fill" id="bFill${i}"></div></div>
            </div>`;
    }

    // Toggle Modes
    document.getElementById('modeNormal').onclick = () => {
        currentMode = 'normal';
        document.getElementById('modeNormal').classList.add('active');
        document.getElementById('modeBoost').classList.remove('boost-active');
    };
    document.getElementById('modeBoost').onclick = () => {
        currentMode = 'boost';
        document.getElementById('modeBoost').classList.add('boost-active');
        document.getElementById('modeNormal').classList.remove('active');
    };

    // Sync Data
    onValue(ref(db, 'vault/season'), (snap) => {
        const data = snap.val() || {};
        const overflow = data.overflow || 0;
        document.getElementById('overflowVal').innerText = overflow.toFixed(2);

        let allMetMin = true;
        let allMetMax = true;

        for(let i=1; i<=12; i++) {
            const val = data[`round${i}`] || 0;
            document.getElementById(`bVal${i}`).innerText = val.toFixed(2);
            
            // Calculate progress based on MAX_VAL
            const percent = Math.min((val / MAX_VAL) * 100, 100);
            document.getElementById(`bFill${i}`).style.width = percent + "%";
            
            if(val < MIN_VAL) allMetMin = false;
            if(val < MAX_VAL) allMetMax = false;
        }

        // Update Phase Label
        let phase = "1 (SEQUENTIAL)";
        if(allMetMax) phase = "4 (OVERFLOW)";
        else if(allMetMin) phase = "2 (SCALING)";
        document.getElementById('phaseLabel').innerText = phase;
    });

    document.getElementById('btnSponsor').onclick = async () => {
        const amt = parseFloat(document.getElementById('sponsorAmt').value);
        if(!amt || amt <= 0) return;
        
        const snap = await get(ref(db, 'vault/season'));
        let seasonData = snap.val() || {};
        let remaining = amt;

        if (currentMode === 'normal') {
            // PHASE 1: Sequential Fill to MIN_VAL
            for(let i=1; i<=12; i++) {
                let rKey = `round${i}`;
                let current = seasonData[rKey] || 0;
                if(current < MIN_VAL) {
                    let space = MIN_VAL - current;
                    let add = Math.min(remaining, space);
                    seasonData[rKey] = Number((current + add).toFixed(4));
                    remaining -= add;
                }
                if(remaining <= 0) break;
            }

            // PHASE 2: Equal Scaling to MAX_VAL
            if(remaining > 0) {
                let roundsNotAtMax = [];
                for(let i=1; i<=12; i++) {
                    if((seasonData[`round${i}`] || 0) < MAX_VAL) roundsNotAtMax.push(`round${i}`);
                }

                if(roundsNotAtMax.length > 0) {
                    let split = remaining / roundsNotAtMax.length;
                    roundsNotAtMax.forEach(key => {
                        let current = seasonData[key] || 0;
                        let add = Math.min(split, MAX_VAL - current);
                        seasonData[key] = Number((current + add).toFixed(4));
                        remaining -= (add); // Note: Simple logic for example
                    });
                    // Recalculate remaining properly if some hit ceiling
                    remaining = Math.max(0, remaining - (split * roundsNotAtMax.length)); 
                }
            }

            // PHASE 4: Overflow
            if(remaining > 0) {
                seasonData.overflow = Number(((seasonData.overflow || 0) + remaining).toFixed(4));
            }

        } else { 
            // BOOST MODE: Only adds to the current active round (Round 1 for this example)
            // Or spreads only across current season rounds, ignoring overflow.
            let split = remaining / 12;
            for(let i=1; i<=12; i++) {
                seasonData[`round${i}`] = Number(((seasonData[`round${i}`] || 0) + split).toFixed(4));
            }
        }

        await update(ref(db, 'vault/season'), seasonData);
        document.getElementById('statusLog').innerText = "// FUNDING_DISTRIBUTED //";
        document.getElementById('sponsorAmt').value = "";
    };
</script>
</body>
</html>
