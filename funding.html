<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANRAT | Funding & Treasury</title>
    <style>
        :root { 
            --accent: #00ffcc; --bg: #0b0e14; --card: #161b22; --border: #30363d; 
            --danger: #ff4b2b; --warning: #ffcc00; --success: #00ffcc;
        }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Treasury Header */
        .treasury-header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; }
        .total-fund { font-size: 2.5rem; font-weight: 900; color: var(--accent); }
        
        /* Deposit Controls */
        .deposit-box { display: flex; gap: 10px; margin-top: 15px; }
        .deposit-input { background: #0d1117; border: 1px solid var(--border); color: var(--accent); padding: 12px; border-radius: 6px; width: 150px; font-weight: bold; }
        .btn-deposit { background: var(--accent); color: #000; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* Bucket Grid */
        .section-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #8b949e; margin: 30px 0 15px 0; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .bucket-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 15px; position: relative; }
        .card.active { border: 2px solid var(--accent); background: rgba(0, 255, 204, 0.03); }
        .card.past { opacity: 0.5; filter: grayscale(0.5); }
        
        .bucket-label { font-size: 0.7rem; color: #8b949e; font-weight: bold; }
        .bucket-main { font-family: 'Courier New', monospace; font-size: 1.1rem; margin: 8px 0; }
        .target { color: #8b949e; }
        .balance { color: var(--accent); font-weight: bold; }
        
        /* Status Tags */
        .status { font-size: 0.6rem; text-transform: uppercase; font-weight: 900; padding: 2px 6px; border-radius: 4px; }
        .status-below { background: rgba(255, 75, 43, 0.1); color: var(--danger); }
        .status-min { background: rgba(255, 204, 0, 0.1); color: var(--warning); }
        .status-max { background: rgba(0, 255, 204, 0.1); color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <div class="treasury-header">
        <div>
            <label style="color: #8b949e; text-transform: uppercase; font-size: 0.75rem;">Global Treasury Balance</label>
            <div class="total-fund" id="total_display">0 TBNB</div>
            <div class="deposit-box">
                <input type="number" id="deposit_amt" class="deposit-input" placeholder="Amount">
                <button class="btn-deposit" onclick="addFunds()">ADD SPONSORSHIP</button>
            </div>
        </div>
        <div style="text-align: right;">
            <div id="round_status" style="color: var(--accent); font-weight: bold;">ROUND 4 ACTIVE</div>
            <div style="font-size: 0.8rem; color: #8b949e;">Next Transition: Sunday 00:00</div>
        </div>
    </div>

    <div class="section-title">Primary Pool Allocations</div>
    <div class="bucket-grid" style="grid-template-columns: 1fr 1fr 1fr;">
        <div id="weekly_bucket_ui"></div>
        <div id="season_bucket_ui"></div>
        <div id="constructor_bucket_ui"></div>
    </div>

    <div class="section-title">Round-by-Round Breakdown</div>
    <div class="bucket-grid" id="rounds_grid">
        </div>

    <div class="section-title">Treasury Overflow</div>
    <div id="overflow_ui"></div>
</div>

<script>
    // DATA FROM MASTER & SPONSOR PAGES
    let currentRound = 4;
    let totalVault = 72000;
    
    // Limits pulled from sponsor.html settings
    const limits = {
        wk: { min: 1000, max: 5000 },
        sea: { min: 5000, max: 20000 },
        con: { min: 2000, max: 10000 }
    };

    function addFunds() {
        const val = parseFloat(document.getElementById('deposit_amt').value) || 0;
        totalVault += val;
        document.getElementById('deposit_amt').value = '';
        runFundingWaterfall();
    }

    function runFundingWaterfall() {
        let remaining = totalVault;
        let b = { rounds: Array(12).fill(0), sea: 0, con: 0, over: 0 };

        // 1. Lock Past Rounds (Assumed Maxed)
        for (let i = 0; i < currentRound - 1; i++) {
            b.rounds[i] = limits.wk.max;
            remaining -= limits.wk.max;
        }

        // 2. Weekly Min (Current & Future)
        for (let i = currentRound - 1; i < 12; i++) {
            let amt = Math.min(remaining, limits.wk.min);
            b.rounds[i] += amt; remaining -= amt;
        }

        // 3. Season & Constructor Min
        let sM = Math.min(remaining, limits.sea.min); b.sea += sM; remaining -= sM;
        let cM = Math.min(remaining, limits.con.min); b.con += cM; remaining -= cM;

        // 4. Weekly Max (Active Round Priority)
        let aIdx = currentRound - 1;
        let aTop = Math.min(remaining, limits.wk.max - b.rounds[aIdx]);
        b.rounds[aIdx] += aTop; remaining -= aTop;

        // 5. Weekly Max (Future Rounds)
        for (let i = currentRound; i < 12; i++) {
            let top = Math.min(remaining, limits.wk.max - b.rounds[i]);
            b.rounds[i] += top; remaining -= top;
        }

        // 6. Season & Constructor Max
        let sX = Math.min(remaining, limits.sea.max - b.sea); b.sea += sX; remaining -= sX;
        let cX = Math.min(remaining, limits.con.max - b.con); b.con += cX; remaining -= cX;

        b.over = remaining;
        renderFundingUI(b);
    }

    function renderFundingUI(b) {
        document.getElementById('total_display').innerText = `${totalVault.toLocaleString()} TBNB`;
        
        // Render 12 Rounds
        const grid = document.getElementById('rounds_grid');
        grid.innerHTML = '';
        b.rounds.forEach((val, i) => {
            let rNum = i + 1;
            let state = rNum < currentRound ? 'past' : (rNum === currentRound ? 'active' : 'future');
            grid.innerHTML += renderCard(`Round ${rNum}`, val, limits.wk.min, limits.wk.max, state);
        });

        // Render Totals
        document.getElementById('weekly_bucket_ui').innerHTML = renderCard(`Active Sponsor (R${currentRound})`, b.rounds[currentRound-1], limits.wk.min, limits.wk.max, 'active');
        document.getElementById('season_bucket_ui').innerHTML = renderCard('Season Pool', b.sea, limits.sea.min, limits.sea.max, 'special');
        document.getElementById('constructor_bucket_ui').innerHTML = renderCard('Constructor Pool', b.con, limits.con.min, limits.con.max, 'special');
        
        document.getElementById('overflow_ui').innerHTML = `
            <div class="card" style="border-color: #444; width: 300px;">
                <span class="bucket-label">Overflow Reserve</span>
                <div class="bucket-main"><span class="balance">${b.over.toFixed(2)}</span></div>
                <span class="status status-max">Secured</span>
            </div>
        `;
    }

    function renderCard(label, val, min, max, state) {
        let sCls = val >= max ? 'status-max' : (val >= min ? 'status-min' : 'status-below');
        let sTxt = val >= max ? 'Maxed' : (val >= min ? 'At Min' : 'Below Min');
        return `
            <div class="card ${state}">
                <span class="bucket-label">${label}</span>
                <div class="bucket-main">
                    <span class="target">${max}:</span><span class="balance">${val.toFixed(0)}</span>
                </div>
                <span class="status ${sCls}">${sTxt}</span>
            </div>
        `;
    }

    runFundingWaterfall();
</script>
</body>
</html>
