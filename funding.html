<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANRAT | Funding Treasury</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --accent: #00ffcc; --bg: #0b0e14; --card: #161b22; --border: #30363d; 
            --boost: #b300ff; --text: #8b949e; --danger: #ff4b2b; --warning: #ffcc00;
        }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; text-align: center; }
        .stat-label { font-size: 0.6rem; color: var(--text); text-transform: uppercase; font-weight: 800; }
        .stat-value { font-size: 2.2rem; font-weight: 900; color: var(--accent); font-family: 'Courier New', monospace; margin-top: 5px; }
        .stat-value.boost { color: var(--boost); }

        /* Injection Panel */
        .injection-panel { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 30px; }
        .row { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 12px; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--text); margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; background: #0d1117; border: 1px solid var(--border); padding: 12px; border-radius: 6px; color: var(--accent); font-weight: 900; outline: none; }
        
        .btn-inject { padding: 0 25px; border-radius: 6px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; height: 45px; font-size: 0.75rem; transition: 0.2s; }
        .btn-n { background: var(--accent); color: #000; }
        .btn-b { background: var(--boost); color: #fff; }
        .btn-inject:hover { filter: brightness(1.2); transform: translateY(-1px); }

        /* Grid */
        .bucket-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .b-card { background: #0d1117; border: 1px solid var(--border); padding: 15px; border-radius: 10px; position: relative; }
        .b-card.active { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,255,204,0.05); }
        .b-card.past { opacity: 0.3; filter: grayscale(1); border-style: dotted; }
        
        .status-tag { position: absolute; top: 10px; right: 10px; font-size: 0.5rem; font-weight: 900; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
        .status-max { background: var(--accent); color: #000; }
        .status-min { background: var(--warning); color: #000; }
        .status-below { background: var(--danger); color: #fff; }
        .status-empty { background: #333; color: #fff; }

        .b-label { font-size: 0.6rem; color: var(--text); font-weight: 900; text-transform: uppercase; }
        .b-main { font-size: 1.4rem; font-family: 'Courier New', monospace; margin: 10px 0; }
        .total-val { font-weight: 900; color: var(--accent); }
        .b-breakdown { font-size: 0.55rem; color: #555; display: flex; justify-content: space-between; border-top: 1px solid #222; padding-top: 8px; }

        .footer-bar { display: flex; justify-content: space-between; margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 0.65rem; color: #444; font-weight: 800; text-transform: uppercase; }
        #latest_remark { color: var(--accent); font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats-bar">
        <div class="stat-card">
            <span class="stat-label">Normal Treasury (N)</span>
            <div id="stat_n" class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <span class="stat-label">Boost Pool (B)</span>
            <div id="stat_b" class="stat-value boost">0</div>
        </div>
        <div class="stat-card">
            <span class="stat-label">Total Liquid Assets</span>
            <div id="stat_total" class="stat-value">0</div>
        </div>
    </div>

    <div class="injection-panel">
        <div class="row">
            <div class="input-group">
                <label>Amount (TBNB)</label>
                <input type="number" id="inject_amt" placeholder="0.00">
            </div>
            <div class="input-group" style="flex: 2;">
                <label>Injection Remark</label>
                <input type="text" id="inject_note" placeholder="Note for the ledger...">
            </div>
            <button class="btn-inject btn-n" onclick="processInjection('normal')">Inject N</button>
            <button class="btn-inject btn-b" onclick="processInjection('boost')">Inject B</button>
        </div>
        <div id="latest_remark">Remark: No recent injections</div>
    </div>

    <div id="main_grid" class="bucket-grid"></div>
    
    <div class="footer-bar">
        <div id="last_update">Last Sync: --:--:--</div>
        <div>Active Context: Round <span id="round_display" style="color:var(--accent)">-</span></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "nuclearf1-94a6b.firebaseapp.com",
        databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "nuclearf1-94a6b",
        storageBucket: "nuclearf1-94a6b.appspot.com",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentRound = 1; 
    let treasury = { normal: 0, boost: 0, remark: "" };
    let policy = { wk_min: 10, wk_max: 50, sea_min: 100, sea_max: 500, con_min: 50, con_max: 200 };

    window.onload = () => {
        // Listen for Round Advancement (Shared with Sponsor Page)
        db.ref('currentRound').on('value', (snap) => {
            currentRound = snap.val() || 1;
            render();
        });

        // Listen for Treasury
        db.ref('treasury').on('value', (snap) => {
            treasury = snap.val() || { normal: 0, boost: 0, remark: "" };
            document.getElementById('latest_remark').innerText = `Remark: ${treasury.remark || 'None'}`;
            syncDone();
        });

        // Listen for Policy
        db.ref('policy').on('value', (snap) => {
            if (snap.val()) { policy = snap.val(); syncDone(); }
        });
    };

    function syncDone() {
        const now = new Date();
        document.getElementById('last_update').innerText = `Last Sync: ${now.toLocaleTimeString()}`;
        document.getElementById('round_display').innerText = currentRound;
        render();
    }

    function render() {
        const total = treasury.normal + treasury.boost;
        document.getElementById('stat_n').innerText = treasury.normal.toLocaleString();
        document.getElementById('stat_b').innerText = treasury.boost.toLocaleString();
        document.getElementById('stat_total').innerText = total.toLocaleString();

        const grid = document.getElementById('main_grid');
        grid.innerHTML = '';

        let remNrm = treasury.normal;
        const activeCount = (12 - currentRound + 1);
        const divisor = activeCount + 2; 
        const bShare = total > 0 ? (treasury.boost / divisor) : 0;

        let bucketN = {};
        for(let i=1; i<=12; i++) bucketN[`r${i}`] = 0;
        bucketN['sea'] = 0; bucketN['con'] = 0;

        // --- PASS 1: FILL MINIMUMS (Active + Future + Specials) ---
        for (let i = currentRound; i <= 12; i++) {
            let n = Math.min(remNrm, policy.wk_min);
            bucketN[`r${i}`] = n;
            remNrm -= n;
        }
        let sMin = Math.min(remNrm, policy.sea_min);
        bucketN['sea'] = sMin;
        remNrm -= sMin;

        let cMin = Math.min(remNrm, policy.con_min);
        bucketN['con'] = cMin;
        remNrm -= cMin;

        // --- PASS 2: FILL TO MAXIMUMS ---
        for (let i = currentRound; i <= 12; i++) {
            let space = policy.wk_max - bucketN[`r${i}`];
            let n = Math.min(remNrm, space);
            bucketN[`r${i}`] += n;
            remNrm -= n;
        }
        let sSpace = Math.max(0, policy.sea_max - bucketN['sea']);
        let sExtra = Math.min(remNrm, sSpace);
        bucketN['sea'] += sExtra;
        remNrm -= sExtra;

        let cSpace = Math.max(0, policy.con_max - bucketN['con']);
        let cExtra = Math.min(remNrm, cSpace);
        bucketN['con'] += cExtra;
        remNrm -= cExtra;

        // --- RENDER GRID ---
        for (let i = 1; i <= 12; i++) {
            renderBucket(grid, `Round ${i}`, bucketN[`r${i}`], (i >= currentRound ? bShare : 0), policy.wk_max, policy.wk_min, i < currentRound ? 'past' : (i === currentRound ? 'active' : ''));
        }
        renderBucket(grid, "Season Pool", bucketN['sea'], bShare, policy.sea_max, policy.sea_min, 'special');
        renderBucket(grid, "Constructor", bucketN['con'], bShare, policy.con_max, policy.con_min, 'special');
        renderBucket(grid, "Overflow Vault", Math.max(0, remNrm), 0, "∞", 0, 'overflow');
    }

    function renderBucket(container, label, n, b, max, min, state) {
        let statusClass = 'status-empty';
        let statusText = 'Empty';

        if (state === 'overflow') { statusText = n > 0 ? 'Overflow' : 'Idle'; statusClass = n > 0 ? 'status-max' : 'status-empty'; }
        else if (state === 'past') { statusText = 'LOCKED'; statusClass = 'status-empty'; }
        else {
            if (n >= max && max > 0) { statusClass = 'status-max'; statusText = 'Maxed'; }
            else if (n >= min && min > 0) { statusClass = 'status-min'; statusText = 'At Min'; }
            else if (n > 0) { statusClass = 'status-below'; statusText = 'Below Min'; }
        }

        container.innerHTML += `
            <div class="b-card ${state}">
                <div class="status-tag ${statusClass}">${statusText}</div>
                <span class="b-label">${label}</span>
                <div class="b-main">
                    <span style="color:#444; font-size: 0.8rem;">${max}</span> : 
                    <span class="total-val">${(n + b).toFixed(0)}</span>
                </div>
                <div class="b-breakdown">
                    <span>N: ${n.toFixed(0)}</span>
                    <span>B: +${b.toFixed(0)}</span>
                </div>
            </div>
        `;
    }

    function processInjection(type) {
        const amt = parseInt(document.getElementById('inject_amt').value);
        const note = document.getElementById('inject_note').value;
        if (!amt || amt <= 0) return alert("Enter valid amount");

        if (type === 'normal') treasury.normal += amt;
        else treasury.boost += amt;
        
        treasury.remark = note || "Injected " + amt + " TBNB";

        db.ref('treasury').set(treasury).then(() => {
            document.getElementById('inject_amt').value = '';
            document.getElementById('inject_note').value = '';
        });
    }
</script>
</body>
</html>
