<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANRAT | Funding Treasury</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --accent: #00ffcc; --bg: #0b0e14; --card: #161b22; --border: #30363d; 
            --boost: #b300ff; --text: #8b949e; --danger: #ff4b2b; --warning: #ffcc00;
        }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Stats Header */
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; text-align: center; }
        .stat-label { font-size: 0.6rem; color: var(--text); text-transform: uppercase; font-weight: 800; }
        .stat-value { font-size: 2rem; font-weight: 900; color: var(--accent); font-family: 'Courier New', monospace; margin-top: 5px; }
        .stat-value.boost { color: var(--boost); }

        /* Custom Injection Box */
        .injection-panel { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 30px; display: flex; gap: 20px; align-items: flex-end; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--text); margin-bottom: 8px; text-transform: uppercase; }
        .input-group input { width: 100%; background: #0d1117; border: 1px solid var(--border); padding: 12px; border-radius: 6px; color: var(--accent); font-weight: 900; outline: none; }
        .btn-inject { padding: 12px 25px; border-radius: 6px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; height: 45px; }
        .btn-n { background: var(--accent); color: #000; }
        .btn-b { background: var(--boost); color: #fff; }

        /* Grid & Buckets */
        .bucket-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .b-card { background: #0d1117; border: 1px solid var(--border); padding: 15px; border-radius: 10px; position: relative; }
        .b-card.active { border-color: var(--accent); }
        .b-card.past { opacity: 0.4; filter: grayscale(1); }
        
        .status-tag { position: absolute; top: 10px; right: 10px; font-size: 0.5rem; font-weight: 900; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
        .status-max { background: var(--accent); color: #000; }
        .status-min { background: var(--warning); color: #000; }
        .status-below { background: var(--danger); color: #fff; }
        .status-empty { background: #333; color: #fff; }

        .b-label { font-size: 0.6rem; color: var(--text); font-weight: 900; text-transform: uppercase; }
        .b-main { font-size: 1.4rem; font-family: 'Courier New', monospace; margin: 10px 0; }
        .total-val { font-weight: 900; color: var(--accent); }
        .b-breakdown { font-size: 0.55rem; color: #555; display: flex; justify-content: space-between; border-top: 1px solid #222; padding-top: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats-bar">
        <div class="stat-card">
            <span class="stat-label">Normal (N)</span>
            <div id="stat_n" class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <span class="stat-label">Boost (B)</span>
            <div id="stat_b" class="stat-value boost">0</div>
        </div>
        <div class="stat-card">
            <span class="stat-label">Total Liquid</span>
            <div id="stat_total" class="stat-value">0</div>
        </div>
    </div>

    <div class="injection-panel">
        <div class="input-group">
            <label>Injection Amount (TBNB)</label>
            <input type="number" id="inject_amt" placeholder="Enter amount...">
        </div>
        <button class="btn-inject btn-n" onclick="processInjection('normal')">Inject Normal</button>
        <button class="btn-inject btn-b" onclick="processInjection('boost')">Inject Boost</button>
    </div>

    <div id="main_grid" class="bucket-grid"></div>
</div>

<script>
    // ... Keep Firebase Config ...

    function render() {
        const total = treasury.normal + treasury.boost;
        document.getElementById('stat_n').innerText = treasury.normal.toLocaleString();
        document.getElementById('stat_b').innerText = treasury.boost.toLocaleString();
        document.getElementById('stat_total').innerText = total.toLocaleString();

        const grid = document.getElementById('main_grid');
        grid.innerHTML = '';

        let remNrm = treasury.normal;
        const divisor = (12 - currentRound + 1) + 2;
        const bShare = treasury.boost / divisor;

        // 1 - 12 Rounds
        for (let i = 1; i <= 12; i++) {
            let n = 0;
            if (i < currentRound) {
                n = policy.wk_max;
                remNrm -= n;
            } else {
                n = Math.max(0, Math.min(remNrm, policy.wk_min));
                remNrm -= n;
            }
            renderBucket(grid, `Round ${i}`, n, (i >= currentRound ? bShare : 0), policy.wk_max, policy.wk_min, i < currentRound ? 'past' : (i === currentRound ? 'active' : ''));
        }

        // 13-14 Specials
        const sVal = Math.max(0, Math.min(remNrm, policy.sea_max));
        renderBucket(grid, "Season Pool", sVal, bShare, policy.sea_max, policy.sea_min, 'special');
        remNrm -= sVal;

        const cVal = Math.max(0, Math.min(remNrm, policy.con_max));
        renderBucket(grid, "Constructor", cVal, bShare, policy.con_max, policy.con_min, 'special');
        remNrm -= cVal;

        // 15: THE OVERFLOW BUCKET (Calculates remaining N)
        if (remNrm > 0) {
            renderBucket(grid, "Overflow Vault", remNrm, 0, "∞", 0, 'overflow');
        }
    }

    function renderBucket(container, label, n, b, max, min, state) {
        let statusClass = 'status-empty';
        let statusText = 'Empty';

        // Overflow Logic
        if (state === 'overflow') {
            statusClass = 'status-max';
            statusText = 'Overflow';
        } else {
            if (n >= max) { statusClass = 'status-max'; statusText = 'Maxed'; }
            else if (n >= min) { statusClass = 'status-min'; statusText = 'At Min'; }
            else if (n > 0) { statusClass = 'status-below'; statusText = 'Below Min'; }
        }

        container.innerHTML += `
            <div class="b-card ${state}">
                <div class="status-tag ${statusClass}">${statusText}</div>
                <span class="b-label">${label}</span>
                <div class="b-main">
                    <span style="color:#444; font-size: 0.8rem;">${max}</span> : 
                    <span class="total-val">${(n + b).toFixed(0)}</span>
                </div>
                <div class="b-breakdown">
                    <span>N: ${n.toFixed(0)}</span>
                    <span>B: +${b.toFixed(0)}</span>
                </div>
            </div>
        `;
    }
</script>
</body>
</html>
