<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Funding Master | SANRAT</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #0b0e14; --card: #161b22; --border: #30363d; --boost: #b300ff; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; margin: 0; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; text-align: center; }
        .stat-val { font-size: 2rem; font-weight: 900; color: var(--accent); }
        .inject-area { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 30px; }
        .input-row { display: flex; gap: 15px; align-items: flex-end; }
        input { flex: 1; background: #0d1117; border: 1px solid var(--border); color: white; padding: 15px; border-radius: 8px; font-weight: bold; }
        .btn-n { background: var(--accent); color: black; border: none; padding: 15px 30px; border-radius: 8px; font-weight: 900; cursor: pointer; }
        .btn-b { background: var(--boost); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: 900; cursor: pointer; }
        .btn-recalc { background: transparent; color: #8b949e; border: 1px solid #333; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: bold; transition: 0.2s; }
        .btn-recalc:hover { border-color: var(--accent); color: var(--accent); }
        .bucket-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .b-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 15px; border-radius: 10px; position: relative; }
        .tag { position: absolute; top: 10px; right: 10px; font-size: 0.5rem; background: #f1c40f; color: black; padding: 2px 5px; border-radius: 3px; font-weight: 900; }
        .locked { opacity: 0.3; filter: grayscale(1); }
        .active-bucket { border-color: var(--accent); background: rgba(0, 255, 204, 0.05); }
        .special-bucket { border-color: var(--boost); }
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.7rem; color: #555; }
    </style>
</head>
<body>

<div class="stat-grid">
    <div class="stat-card"><div>NORMAL TREASURY</div><div class="stat-val" id="disp_n">0</div></div>
    <div class="stat-card"><div>BOOST POOL</div><div class="stat-val" id="disp_b" style="color:var(--boost)">0</div></div>
    <div class="stat-card"><div>TOTAL ASSETS</div><div class="stat-val" id="disp_total">0</div></div>
</div>

<div class="inject-area">
    <div class="status-bar">
        <span id="sync_ts">LAST SYNC: NEVER</span>
        <button class="btn-recalc" onclick="updateMath()">🔄 FORCE MATH REFRESH</button>
    </div>
    <label style="font-size: 0.7rem; color: #8b949e; font-weight: 900;">INJECTION AMOUNT</label>
    <div class="input-row">
        <input type="number" id="amt" step="0.01" placeholder="0.00">
        <button class="btn-n" onclick="inject('normal')">INJECT NORMAL</button>
        <button class="btn-b" onclick="inject('boost')">INJECT BOOST</button>
    </div>
</div>

<div id="grid" class="bucket-grid"></div>

<script>
    const firebaseConfig = { databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let treasury = { normal: 0, boost: 0 };
    let policy = { wk_min: 0, wk_max: 0, sea_min: 0, sea_max: 0, con_min: 0, con_max: 0 };
    let round = 1;

    db.ref('treasury').on('value', snap => { treasury = snap.val() || {normal:0, boost:0}; updateMath(); });
    db.ref('policy').on('value', snap => { if(snap.val()) policy = snap.val(); updateMath(); });
    db.ref('race_state/round').on('value', snap => { round = snap.val() || 1; updateMath(); });

    function inject(type) {
        const val = parseFloat(document.getElementById('amt').value) || 0;
        if(val <= 0) return;
        treasury[type] += val;
        db.ref('treasury').set(treasury);
        document.getElementById('amt').value = '';
    }

    function updateMath() {
        document.getElementById('disp_n').innerText = treasury.normal.toLocaleString();
        document.getElementById('disp_b').innerText = treasury.boost.toLocaleString();
        document.getElementById('disp_total').innerText = (treasury.normal + treasury.boost).toLocaleString();

        let remNrm = treasury.normal;
        let funding = {};

        // 1. MIN ROUNDS
        for(let i=1; i<=12; i++) {
            funding[`round${i}`] = { n: 0, b: 0 };
            if(i >= round) {
                let take = Math.min(remNrm, policy.wk_min || 0);
                funding[`round${i}`].n = take; remNrm -= take;
            }
        }
        // 2. SPECIALS
        let sN = Math.min(remNrm, policy.sea_max || 0); funding.season_pool = { n: sN, b: 0 }; remNrm -= sN;
        let cN = Math.min(remNrm, policy.con_max || 0); funding.constructor_pool = { n: cN, b: 0 }; remNrm -= cN;

        // 3. MAX ROUNDS
        for(let i=round; i<=12; i++) {
            let space = (policy.wk_max || 0) - funding[`round${i}`].n;
            let take = Math.min(remNrm, space); funding[`round${i}`].n += take; remNrm -= take;
        }

        const div = Math.max(0, 12 - round + 1) + 2;
        const bsh = (treasury.boost || 0) / div;
        for(let i=round; i<=12; i++) funding[`round${i}`].b = bsh;
        funding.season_pool.b = bsh; funding.constructor_pool.b = bsh;
        funding.overflow = { n: remNrm, b: 0 };

        db.ref('funding').set(funding);
        document.getElementById('sync_ts').innerText = "LAST SYNC: " + new Date().toLocaleTimeString();
        renderGrid(funding);
    }

    function renderGrid(data) {
        const g = document.getElementById('grid'); g.innerHTML = '';
        for(let i=1; i<=12; i++) {
            let s = i < round ? 'locked' : (i === round ? 'active-bucket' : '');
            let isAtMin = data[`round${i}`].n >= (policy.wk_min || 0) && i >= round;
            g.innerHTML += `<div class="b-card ${s}">${isAtMin ? '<div class="tag">AT MIN</div>':''}<div style="font-size:0.6rem; color:#8b949e">ROUND ${i}</div><div style="font-size:1.2rem; font-family:monospace">${policy.wk_max || 0} : <span style="color:var(--accent)">${(data[`round${i}`].n + data[`round${i}`].b).toFixed(0)}</span></div></div>`;
        }
        g.innerHTML += `<div class="b-card active-bucket special-bucket"><div class="tag">POOL</div><div style="font-size:0.6rem; color:#8b949e">SEASON</div><div style="font-size:1.2rem; font-family:monospace">${policy.sea_max || 0} : <span style="color:var(--accent)">${(data.season_pool.n + data.season_pool.b).toFixed(0)}</span></div></div>`;
        g.innerHTML += `<div class="b-card active-bucket special-bucket"><div class="tag">POOL</div><div style="font-size:0.6rem; color:#8b949e">CONSTRUCTOR</div><div style="font-size:1.2rem; font-family:monospace">${policy.con_max || 0} : <span style="color:var(--accent)">${(data.constructor_pool.n + data.constructor_pool.b).toFixed(0)}</span></div></div>`;
        if(data.overflow.n > 0) g.innerHTML += `<div class="b-card"><div style="font-size:0.6rem; color:#8b949e">OVERFLOW</div><div style="font-size:1.2rem; font-family:monospace">∞ : <span style="color:var(--accent)">${data.overflow.n.toFixed(0)}</span></div></div>`;
    }
</script>
</body>
</html>
