<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANRAT | Funding Treasury</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --accent: #00ffcc; --bg: #0b0e14; --card: #161b22; --border: #30363d; 
            --boost: #b300ff; --text: #8b949e;
        }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Stats Header */
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 12px; text-align: center; }
        .stat-label { font-size: 0.65rem; color: var(--text); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        .stat-value { font-size: 2.5rem; font-weight: 900; color: var(--accent); font-family: 'Courier New', monospace; margin-top: 10px; }
        .stat-value.boost { color: var(--boost); }

        /* Grid */
        .bucket-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .b-card { background: #0d1117; border: 1px solid var(--border); padding: 20px; border-radius: 10px; transition: 0.3s; }
        .b-card.active { border-color: var(--accent); background: rgba(0, 255, 204, 0.03); }
        .b-card.special { border-color: var(--boost); }
        .b-card.past { opacity: 0.3; filter: grayscale(1); }
        
        .b-label { font-size: 0.6rem; color: var(--text); font-weight: 900; text-transform: uppercase; }
        .b-main { font-size: 1.5rem; font-family: 'Courier New', monospace; margin: 10px 0; }
        .n-limit { color: #444; font-size: 0.9rem; }
        .total-val { font-weight: 900; color: var(--accent); }
        
        .b-breakdown { font-size: 0.6rem; color: #555; display: flex; justify-content: space-between; border-top: 1px solid #222; padding-top: 10px; }

        /* Controls */
        .controls { margin-top: 40px; display: flex; gap: 10px; }
        button { padding: 15px 30px; border-radius: 8px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .btn-inject { background: var(--accent); color: #000; }
        .btn-boost { background: var(--boost); color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats-bar">
        <div class="stat-card">
            <span class="stat-label">Normal Treasury (N)</span>
            <div id="stat_n" class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <span class="stat-label">Boost Pool (B)</span>
            <div id="stat_b" class="stat-value boost">0</div>
        </div>
        <div class="stat-card">
            <span class="stat-label">Total Liquid</span>
            <div id="stat_total" class="stat-value">0</div>
        </div>
    </div>

    <div id="main_grid" class="bucket-grid"></div>

    <div class="controls">
        <button class="btn-inject" onclick="inject(5000, 'normal')">Inject 5,000 N</button>
        <button class="btn-boost" onclick="inject(5000, 'boost')">Inject 5,000 Boost</button>
    </div>
</div>

<script>
    // 1. CONFIG (Matches Sponsor Page)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "nuclearf1-94a6b.firebaseapp.com",
        databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "nuclearf1-94a6b",
        storageBucket: "nuclearf1-94a6b.appspot.com",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Internal State
    let currentRound = 4;
    let treasury = { normal: 0, boost: 0 };
    let policy = { wk_min: 1000, wk_max: 5000, sea_max: 20000, con_max: 10000 };

    window.onload = () => {
        // Listen for Treasury changes
        db.ref('treasury').on('value', (snap) => {
            treasury = snap.val() || { normal: 0, boost: 0 };
            render();
        });

        // Listen for Sponsor Policy changes
        db.ref('policy').on('value', (snap) => {
            const p = snap.val();
            if (p) {
                policy = p; // wk_min, wk_max, etc.
                render();
            }
        });
    };

    function render() {
        const total = treasury.normal + treasury.boost;
        document.getElementById('stat_n').innerText = treasury.normal.toLocaleString();
        document.getElementById('stat_b').innerText = treasury.boost.toLocaleString();
        document.getElementById('stat_total').innerText = total.toLocaleString();

        const grid = document.getElementById('main_grid');
        grid.innerHTML = '';

        // ZERO GUARD
        if (total <= 0) {
            for(let i=1; i<=12; i++) renderBucket(grid, `Round ${i}`, 0, 0, policy.wk_max, i < currentRound ? 'past' : '');
            renderBucket(grid, "Season Pool", 0, 0, policy.sea_max, 'special');
            renderBucket(grid, "Constructor", 0, 0, policy.con_max, 'special');
            return;
        }

        // Waterfall Math
        let remNrm = treasury.normal;
        const divisor = (12 - currentRound + 1) + 2;
        const bShare = treasury.boost / divisor;

        // 12 Rounds
        for (let i = 1; i <= 12; i++) {
            let n = 0;
            if (i < currentRound) {
                n = policy.wk_max;
                remNrm -= n;
            } else {
                n = Math.max(0, Math.min(remNrm, policy.wk_min));
                remNrm -= n;
            }
            renderBucket(grid, `Round ${i}`, n, (i >= currentRound ? bShare : 0), policy.wk_max, i < currentRound ? 'past' : (i === currentRound ? 'active' : ''));
        }

        // Specials
        renderBucket(grid, "Season Pool", Math.max(0, Math.min(remNrm, policy.sea_max)), bShare, policy.sea_max, 'special');
        renderBucket(grid, "Constructor", Math.max(0, Math.min(remNrm, policy.con_max)), bShare, policy.con_max, 'special');
    }

    function renderBucket(container, label, n, b, max, state) {
        container.innerHTML += `
            <div class="b-card ${state}">
                <span class="b-label">${label}</span>
                <div class="b-main">
                    <span class="n-limit">${max}</span> : 
                    <span class="total-val">${(n + b).toFixed(0)}</span>
                </div>
                <div class="b-breakdown">
                    <span>N: ${n.toFixed(0)}</span>
                    <span>B: +${b.toFixed(0)}</span>
                </div>
            </div>
        `;
    }

    function inject(amt, type) {
        if (type === 'normal') treasury.normal += amt;
        else treasury.boost += amt;
        
        db.ref('treasury').set(treasury);
    }
</script>
</body>
</html>
