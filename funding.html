<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANRAT | Funding & Treasury</title>
    <style>
        :root { 
            --accent: #00ffcc; --bg: #0b0e14; --card: #161b22; --border: #30363d; 
            --danger: #ff4b2b; --warning: #ffcc00; --success: #00ffcc; --boost: #b300ff;
        }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .treasury-header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; }
        .total-fund { font-size: 2.5rem; font-weight: 900; color: var(--accent); }
        
        .input-row { display: flex; gap: 10px; margin-top: 15px; }
        .deposit-input { background: #0d1117; border: 1px solid var(--border); color: var(--accent); padding: 12px; border-radius: 6px; width: 180px; font-weight: bold; }
        
        .btn { border: none; padding: 12px 20px; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .btn-normal { background: var(--accent); color: #000; }
        .btn-boost { background: var(--boost); color: #fff; }

        .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #8b949e; margin: 30px 0 15px 0; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .bucket-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
        .card.active { border: 2px solid var(--accent); box-shadow: 0 0 15px rgba(0, 255, 204, 0.1); }
        .card.past { opacity: 0.5; background: #0d1117; }
        
        .bucket-label { font-size: 0.65rem; color: #8b949e; font-weight: bold; }
        .bucket-main { font-family: 'Courier New', monospace; font-size: 1.3rem; margin: 10px 0; }
        .n-val { color: #8b949e; }
        .b-val { color: var(--accent); font-weight: bold; }
        
        .breakdown { display: flex; justify-content: space-between; font-size: 0.65rem; border-top: 1px solid #222; padding-top: 8px; margin-top: 5px; }
        .val-nrm { color: var(--accent); }
        .val-bst { color: var(--boost); font-weight: bold; }

        .status { font-size: 0.6rem; text-transform: uppercase; font-weight: 900; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 10px;}
        .status-below { background: rgba(255, 75, 43, 0.1); color: var(--danger); }
        .status-min { background: rgba(255, 204, 0, 0.1); color: var(--warning); }
        .status-max { background: rgba(0, 255, 204, 0.1); color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <div class="treasury-header">
        <div>
            <label style="color: #8b949e; text-transform: uppercase; font-size: 0.7rem;">Live Treasury Vault</label>
            <div class="total-fund" id="total_display">0 TBNB</div>
            <div class="input-row">
                <input type="number" id="inject_amt" class="deposit-input" placeholder="0.00">
                <button class="btn btn-normal" onclick="inject('normal')">Inject Normal</button>
                <button class="btn btn-boost" onclick="inject('boost')">Inject Boost</button>
            </div>
        </div>
        <div style="text-align: right;">
            <div id="round_status" style="color: var(--accent); font-weight: 900; font-size: 1.4rem;">ROUND 4</div>
            <button onclick="wipeOut()" style="background: var(--danger); border: none; color: #fff; font-size: 0.6rem; cursor: pointer; padding: 6px 10px; border-radius: 4px; margin-top: 10px; font-weight: bold;">WIPE ALL (SYMBOLS 0)</button>
        </div>
    </div>

    <div class="section-title">Special Pools (Season + Constructor)</div>
    <div class="bucket-grid" style="grid-template-columns: 1fr 1fr;">
        <div id="season_bucket_ui"></div>
        <div id="constructor_bucket_ui"></div>
    </div>

    <div class="section-title">12-Round Breakdown (N : B)</div>
    <div class="bucket-grid" id="rounds_grid"></div>
</div>

<script>
    // State
    let currentRound = 4; // Read from Master
    let totalNormal = 70000;
    let totalBoost = 11000; // Example: 11000 / 11 buckets = 1000 each
    
    const limits = {
        wk: { min: 1000, max: 5000 },
        sea: { min: 5000, max: 20000 },
        con: { min: 2000, max: 10000 }
    };

    function inject(type) {
        const val = parseFloat(document.getElementById('inject_amt').value) || 0;
        if (type === 'normal') totalNormal += val;
        else totalBoost += val;
        document.getElementById('inject_amt').value = '';
        calculateAndRender();
    }

    function wipeOut() {
        if(confirm("Wipe all treasury values? Sponsor page will reflect 0.")) {
            totalNormal = 0; totalBoost = 0;
            calculateAndRender();
        }
    }

    function calculateAndRender() {
        let remainingNormal = totalNormal;
        
        // --- BOOST MATH ---
        // Boost divides by (Remaining Rounds including Active) + (Season Pool) + (Constructor Pool)
        const remainingRoundCount = (12 - currentRound) + 1;
        const totalBoostDivisor = remainingRoundCount + 2; 
        const boostPerEligibleBucket = totalBoost > 0 ? (totalBoost / totalBoostDivisor) : 0;

        let roundData = [];
        for(let i=0; i<12; i++) {
            // Only Active or Future rounds get boost
            let isEligible = (i + 1) >= currentRound;
            roundData.push({ nrm: 0, bst: isEligible ? boostPerEligibleBucket : 0 });
        }

        // --- NORMAL WATERFALL ---
        // 1. Past Rounds (Assumed Maxed from earlier Normal funds)
        for (let i = 0; i < currentRound - 1; i++) {
            roundData[i].nrm = limits.wk.max;
            remainingNormal -= limits.wk.max;
        }

        // 2. Mins
        for (let i = currentRound - 1; i < 12; i++) {
            let amt = Math.min(remainingNormal, limits.wk.min);
            roundData[i].nrm += amt; remainingNormal -= amt;
        }
        let sNrm = Math.min(remainingNormal, limits.sea.min); remainingNormal -= sNrm;
        let cNrm = Math.min(remainingNormal, limits.con.min); remainingNormal -= cNrm;

        // 3. Maxes
        let aIdx = currentRound - 1;
        let aTop = Math.min(remainingNormal, limits.wk.max - roundData[aIdx].nrm);
        roundData[aIdx].nrm += aTop; remainingNormal -= aTop;

        for (let i = currentRound; i < 12; i++) {
            let top = Math.min(remainingNormal, limits.wk.max - roundData[i].nrm);
            roundData[i].nrm += top; remainingNormal -= top;
        }
        let sMax = Math.min(remainingNormal, limits.sea.max - sNrm); sNrm += sMax;
        let cMax = Math.min(remainingNormal, limits.con.max - cNrm); cNrm += cMax;

        renderUI(roundData, sNrm, cNrm, boostPerEligibleBucket);
    }

    function renderUI(rounds, sNrm, cNrm, bstShare) {
        document.getElementById('total_display').innerText = `${(totalNormal + totalBoost).toLocaleString()} TBNB`;
        
        // Special Pools
        document.getElementById('season_bucket_ui').innerHTML = renderBucketUI('Season Pool', sNrm, bstShare, limits.sea.max, limits.sea.min, 'special');
        document.getElementById('constructor_bucket_ui').innerHTML = renderBucketUI('Constructor Pool', cNrm, bstShare, limits.con.max, limits.con.min, 'special');

        // Rounds
        const grid = document.getElementById('rounds_grid');
        grid.innerHTML = '';
        rounds.forEach((r, i) => {
            let rNum = i + 1;
            let state = rNum < currentRound ? 'past' : (rNum === currentRound ? 'active' : 'future');
            grid.innerHTML += renderBucketUI(`Round ${rNum}`, r.nrm, r.bst, limits.wk.max, limits.wk.min, state);
        });
    }

    function renderBucketUI(label, nVal, bVal, limitN, min, state) {
        let totalB = nVal + bVal;
        let sCls = totalB >= limitN ? 'status-max' : (totalB >= min ? 'status-min' : 'status-below');
        let sTxt = totalB >= limitN ? 'Maxed' : (totalB >= min ? 'At Min' : 'Below Min');

        return `
            <div class="card ${state}">
                <span class="bucket-label">${label}</span>
                <div class="bucket-main">
                    <span class="n-val">${limitN}</span><span style="color:#444"> : </span><span class="b-val">${totalB.toFixed(1)}</span>
                </div>
                <div class="breakdown">
                    <span>N: <span class="val-nrm">${nVal.toFixed(1)}</span></span>
                    <span>B: <span class="val-bst">+${bVal.toFixed(1)}</span></span>
                </div>
                <span class="status ${sCls}">${sTxt}</span>
            </div>
        `;
    }

    calculateAndRender();
</script>
</body>
</html>
