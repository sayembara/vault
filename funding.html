<!DOCTYPE html>
<html lang="en">
<head><title>Brain | Funding Page</title></head>
<body style="background:#0b0e14; color:white; font-family:sans-serif; padding:40px;">
    <h1>🧠 Funding Brain</h1>
    <p>This page handles the waterfall math and mirrors it to the Sponsor Center.</p>
    <div id="status" style="color:#00ffcc">Syncing...</div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let treasury = { normal: 0, boost: 0 };
        let policy = { wk_min: 1000, wk_max: 5000, sea_min: 5000, sea_max: 20000, con_min: 2000, con_max: 10000 };
        let currentRound = 1;

        // Auto-recalculate whenever anything changes
        function runWaterfall() {
            let remNrm = treasury.normal;
            let exportData = {};

            // 1. Fill MIN Rounds
            for (let i = 1; i <= 12; i++) {
                exportData[`round${i}`] = { n: 0, b: 0 };
                if (i >= currentRound) {
                    let take = Math.min(remNrm, policy.wk_min);
                    exportData[`round${i}`].n = take; remNrm -= take;
                }
            }
            // 2. Fill Specials to MAX
            let sN = Math.min(remNrm, policy.sea_max); exportData['season_pool'] = { n: sN, b: 0 }; remNrm -= sN;
            let cN = Math.min(remNrm, policy.con_max); exportData['constructor_pool'] = { n: cN, b: 0 }; remNrm -= cN;

            // 3. Top up Rounds to MAX
            for (let i = currentRound; i <= 12; i++) {
                let space = policy.wk_max - exportData[`round${i}`].n;
                let take = Math.min(remNrm, space); exportData[`round${i}`].n += take; remNrm -= take;
            }

            // 4. Distribute Boost
            const divisor = Math.max(0, 12 - currentRound + 1) + 2;
            const bShare = treasury.boost / divisor;
            for (let i = currentRound; i <= 12; i++) exportData[`round${i}`].b = bShare;
            exportData['season_pool'].b = bShare; exportData['constructor_pool'].b = bShare;

            if (remNrm > 0) exportData['overflow'] = { n: remNrm, b: 0 };

            db.ref('funding').set(exportData);
            document.getElementById('status').innerText = "Last Math Run: " + new Date().toLocaleTimeString();
        }

        db.ref('treasury').on('value', snap => { treasury = snap.val() || {normal:0, boost:0}; runWaterfall(); });
        db.ref('policy').on('value', snap => { if(snap.val()) policy = snap.val(); runWaterfall(); });
        db.ref('race_state/round').on('value', snap => { currentRound = snap.val() || 1; runWaterfall(); });
    </script>
</body>
</html>
