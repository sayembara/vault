<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Player Garage</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00ffcc; --gold: #ffcc00; --danger: #ff4b2b; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: #0b0e14; color: white; display: flex; flex-direction: column; align-items: center; }
        
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .btn-connect { background: #f6851b; color: white; padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }

        #player-ui { display: none; width: 100%; max-width: 1100px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--glass); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .car-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; position: relative; }
        .car-card.hero { border: 2px solid var(--gold); }
        .car-card.support { border: 2px solid var(--accent); }
        
        .finance-card { background: rgba(255,255,255,0.03); border: 1px solid var(--gold); padding: 20px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-action { padding: 12px 18px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 0.75rem; }
        .btn-pay { background: var(--accent); color: #00334e; }
        .btn-claim { background: var(--gold); color: #000; }

        /* Track Listens to Master */
        .track-box { background: #161b22; border-radius: 15px; padding: 20px; border: 1px solid #30363d; width: 100%; box-sizing: border-box; }
        .track-lane { position: relative; width: 100%; height: 25px; border-bottom: 1px solid #21262d; }
        .track-car { position: absolute; height: 15px; width: 25px; background: var(--accent); border-radius: 2px; top: 5px; transition: 1s linear; font-size: 0.5rem; color: black; font-weight: 900; text-align: center; }
        .finish-line { position: absolute; left: 66.6%; top: 0; bottom: 0; border-left: 2px dashed #444; } /* 1000m / 1500m */
    </style>
</head>
<body>

    <div id="auth-screen">
        <button class="btn-connect" id="connectBtn">Connect MetaMask</button>
    </div>

    <div id="player-ui">
        <div class="header-bar">
            <select id="teamSelect" style="background:#000; color:white; border:1px solid var(--accent); padding:8px; border-radius:5px;">
                <option value="Alpha">Alpha Team</option>
                <option value="Beta">Beta Team</option>
                <option value="Gamma">Gamma Team</option>
                <option value="Delta">Delta Team</option>
                <option value="Epsilon">Epsilon Team</option>
            </select>
            <div style="text-align: right;">
                <div id="walletAddr" style="font-size: 0.7rem; color: #888;"></div>
                <div id="walletBal" style="font-size: 1.1rem; font-weight: bold; color: var(--accent);">0.0000 BNB</div>
            </div>
        </div>

        <div class="finance-card">
            <div>
                <div style="font-size: 0.65rem; color: #888;">TOTAL CLAIMABLE PRIZE</div>
                <div id="claimableDisplay" style="font-size: 1.6rem; font-weight: bold; color: var(--gold);">0.000 tBNB</div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-action btn-pay" onclick="handleEntrance()">PAY ENTRANCE (0.1 tBNB)</button>
                <button class="btn-action btn-claim" id="btnClaim">RELEASE TO WALLET</button>
            </div>
        </div>

        <div class="grid" id="garageGrid"></div>

        <div class="track-box">
            <h4 id="track-status" style="margin-top:0; color:var(--gold);">WAITING FOR MASTER...</h4>
            <div id="track-container" style="position:relative; width:100%; height:300px; background:#000; border-radius:10px; overflow:hidden;">
                <div class="finish-line"></div>
                <div id="cars-layer"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let userWallet = "";
        let currentClaimable = 0.75; // Mock value for testing logic

        document.getElementById('connectBtn').onclick = async () => {
            if (window.ethereum) {
                const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userWallet = accs[0];
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('player-ui').style.display = 'block';
                syncAll();
            }
        };

        function syncAll() {
            updateFinanceUI();
            loadGarage();
            listenToMaster();
        }

        async function updateFinanceUI() {
            const balance = await window.ethereum.request({ method: 'eth_getBalance', params: [userWallet, 'latest'] });
            document.getElementById('walletBal').innerText = `${(parseInt(balance, 16) / 1e18).toFixed(4)} BNB`;
            document.getElementById('walletAddr').innerText = userWallet;
            document.getElementById('claimableDisplay').innerText = `${currentClaimable.toFixed(3)} tBNB`;
            document.getElementById('btnClaim').innerText = `RELEASE ${currentClaimable.toFixed(3)} TO WALLET`;
        }

        function loadGarage() {
            const team = document.getElementById('teamSelect').value;
            onValue(ref(db, 'cars'), (snap) => {
                const cars = Object.values(snap.val() || {}).filter(c => c.team === team);
                const grid = document.getElementById('garageGrid');
                grid.innerHTML = '';
                cars.forEach(car => {
                    const hp = 100 - (car.damage || 0);
                    grid.innerHTML += `
                        <div class="car-card ${car.role || ''}">
                            <div style="font-weight:bold;">CAR #${car.id}</div>
                            <div style="font-size:0.7rem; color:var(--accent);">Trait Sum: ${car.traits.propulsion + car.traits.traction + car.traits.stability + car.traits.core}</div>
                            <div class="hp-bar-bg"><div class="hp-bar-fill" style="width:${hp}%"></div></div>
                            <div style="display:flex; gap:5px; margin-top:15px;">
                                <button onclick="setRole(${car.id}, 'hero')" style="flex:1; font-size:0.6rem; cursor:pointer;">SET HERO</button>
                                <button onclick="setRole(${car.id}, 'support')" style="flex:1; font-size:0.6rem; cursor:pointer;">SET SUPPORT</button>
                            </div>
                        </div>`;
                });
            });
        }

        // ROLE SWITCHING LOGIC
        window.setRole = async (id, role) => {
            if(!confirm(`Set Car #${id} as Team ${role.toUpperCase()}?`)) return;
            const team = document.getElementById('teamSelect').value;
            const snap = await get(ref(db, 'cars'));
            const cars = snap.val();
            const updates = {};
            
            // Remove role from any other car in THIS team
            Object.keys(cars).forEach(key => {
                if(cars[key].team === team && cars[key].role === role) {
                    updates[`cars/${key}/role`] = null;
                }
            });
            // Set new role
            updates[`cars/car_${id.toString().padStart(3,'0')}/role`] = role;
            await update(ref(db), updates);
        };

        // TRACK LISTENING TO MASTER
        function listenToMaster() {
            onValue(ref(db, 'master_state'), (snap) => {
                const state = snap.val() || { isLive: false, label: "OFFLINE" };
                document.getElementById('track-status').innerText = `RACE STATUS: ${state.label}`;
                if(state.isLive) {
                    updateTrackPositions();
                }
            });
        }

        function updateTrackPositions() {
            onValue(ref(db, 'cars'), (snap) => {
                const layer = document.getElementById('cars-layer');
                layer.innerHTML = '';
                const cars = Object.values(snap.val() || {}).sort((a,b) => (b.total_dist || 0) - (a.total_dist || 0)).slice(0, 10);
                cars.forEach((car, i) => {
                    const progress = (car.total_dist || 0) / 1500 * 100;
                    layer.innerHTML += `<div class="track-lane"><div class="track-car" style="left:${progress}%">${car.id}</div></div>`;
                });
            }, { onlyOnce: true });
        }

        // FINANCE HANDLERS
        window.handleEntrance = () => {
            const fee = 0.1;
            if(confirm(`Pay 0.1 tBNB Entrance Fee? (Will use Claimable Balance first)`)) {
                if(currentClaimable >= fee) {
                    currentClaimable -= fee;
                    alert("Paid from Claimable Balance!");
                } else {
                    alert("Not enough Claimable Balance. Redirecting to MetaMask...");
                }
                updateFinanceUI();
            }
        };

        document.getElementById('btnClaim').onclick = () => {
            if(currentClaimable <= 0) return alert("Nothing to claim.");
            if(confirm(`Release ${currentClaimable.toFixed(3)} tBNB to your wallet?`)) {
                alert("Transaction Sent! Your balance will be updated once confirmed.");
                currentClaimable = 0;
                updateFinanceUI();
            }
        };

        document.getElementById('teamSelect').onchange = () => loadGarage();
    </script>
</body>
</html>
