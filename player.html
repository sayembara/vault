<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANRAT | Player Garage</title>
    <style>
        :root { 
            --glass: rgba(255, 255, 255, 0.08); 
            --accent: #00ffcc; 
            --gold: #ffcc00; 
            --danger: #ff4b2b; 
            --bg: #0b0e14;
        }

        body { 
            margin: 0; 
            padding: 20px; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* --- Auth Section --- */
        #auth-screen { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 80vh; 
        }
        .btn-connect { 
            background: #f6851b; 
            color: white; 
            padding: 15px 30px; 
            border-radius: 50px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1.1rem;
        }

        /* --- Main UI Section --- */
        #player-ui { display: none; width: 100%; max-width: 1100px; }

        .header-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            background: var(--glass); 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        .finance-card { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid var(--gold); 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        /* --- Garage Grid --- */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 15px; 
            margin-bottom: 30px; 
        }
        .car-card { 
            background: var(--glass); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 15px; 
            padding: 15px; 
            position: relative; 
            transition: 0.3s;
        }
        .car-card.hero { border: 2px solid var(--gold); box-shadow: 0 0 10px rgba(255,204,0,0.1); }
        .car-card.support { border: 2px solid var(--accent); box-shadow: 0 0 10px rgba(0,255,204,0.1); }

        .role-text { font-weight: 900; font-size: 0.75rem; margin-bottom: 5px; letter-spacing: 1px; }
        .hero .role-text { color: var(--gold); }
        .support .role-text { color: var(--accent); }

        .trait-row { display: flex; justify-content: space-between; font-size: 0.8rem; margin: 4px 0; color: #ccc; }
        .trait-val { color: white; font-weight: bold; }

        .hp-bar-bg { width: 100%; height: 6px; background: #333; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .hp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--danger), var(--accent)); transition: 0.5s; }

        /* --- Buttons --- */
        .btn-action { padding: 12px 18px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 0.75rem; }
        .btn-pay { background: var(--accent); color: #00334e; }
        .btn-claim { background: var(--gold); color: #000; }
        .btn-role { flex: 1; font-size: 0.6rem; background: #222; color: white; border: 1px solid #444; padding: 5px; cursor: pointer; border-radius: 4px; }
        .btn-role:hover { background: #333; }

        /* --- Track View --- */
        .track-box { 
            background: #161b22; 
            border-radius: 15px; 
            padding: 20px; 
            border: 1px solid #30363d; 
            width: 100%; 
            box-sizing: border-box; 
        }
        .track-lane { position: relative; width: 100%; height: 25px; border-bottom: 1px solid #21262d; }
        .track-car { 
            position: absolute; 
            height: 15px; 
            width: 25px; 
            background: var(--accent); 
            border-radius: 2px; 
            top: 5px; 
            transition: 1s linear; 
            font-size: 0.5rem; 
            color: black; 
            font-weight: 900; 
            text-align: center; 
            line-height: 15px;
        }
        .finish-line { position: absolute; left: 66.6%; top: 0; bottom: 0; border-left: 2px dashed #444; z-index: 0; }
        
        select { background:#000; color:white; border:1px solid var(--accent); padding:8px; border-radius:5px; outline:none; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="letter-spacing: 3px; margin-bottom: 10px;">SANRAT GARAGE</h1>
        <p style="color: #666; margin-bottom: 30px;">Access your team and manage racing units</p>
        <button class="btn-connect" id="connectBtn">Connect MetaMask</button>
    </div>

    <div id="player-ui">
        <div class="header-bar">
            <select id="teamSelect">
                <option value="Alpha">Alpha Team</option>
                <option value="Beta">Beta Team</option>
                <option value="Gamma">Gamma Team</option>
                <option value="Delta">Delta Team</option>
                <option value="Epsilon">Epsilon Team</option>
            </select>
            <div style="text-align: right;">
                <div id="walletAddr" style="font-size: 0.7rem; color: #888; font-family: monospace;"></div>
                <div id="walletBal" style="font-size: 1.1rem; font-weight: bold; color: var(--accent);">0.0000 BNB</div>
            </div>
        </div>

        <div class="finance-card">
            <div>
                <div style="font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 1px;">Claimable Balance</div>
                <div id="claimableDisplay" style="font-size: 1.8rem; font-weight: bold; color: var(--gold);">0.000 tBNB</div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-action btn-pay" onclick="handleEntrance()">PAY ENTRANCE (0.1 tBNB)</button>
                <button class="btn-action btn-claim" id="btnClaim" onclick="handleRelease()">RELEASE TO WALLET</button>
            </div>
        </div>

        <h3 style="margin-left: 5px; color: #666;">TEAM ASSETS</h3>
        <div class="grid" id="garageGrid"></div>

        <div class="track-box">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin:0;">SEASON TRACK</h3>
                <span id="track-status" style="font-size: 0.7rem; padding: 4px 10px; background: #000; border-radius: 50px; color: var(--gold);">OFFLINE</span>
            </div>
            <div id="track-container" style="position:relative; width:100%; height:300px; background:#000; border-radius:10px; overflow:hidden;">
                <div class="finish-line"></div>
                <div id="cars-layer"></div>
            </div>
            <p style="font-size: 0.6rem; color: #555; margin-top: 10px; text-align: center;">Line indicates 1000m mark of 1500m total track length.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", 
            databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let userWallet = "";
        let currentClaimable = 0.550; // Initial testing value

        // --- Authentication ---
        document.getElementById('connectBtn').onclick = async () => {
            if (window.ethereum) {
                try {
                    const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    userWallet = accs[0];
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('player-ui').style.display = 'block';
                    startApp();
                } catch (e) { alert("Connection failed."); }
            } else { alert("Please install MetaMask."); }
        };

        function startApp() {
            syncFinance();
            loadGarage();
            listenToMaster();
            document.getElementById('teamSelect').onchange = () => loadGarage();
        }

        // --- Financial Logic ---
        async function syncFinance() {
            const balance = await window.ethereum.request({ method: 'eth_getBalance', params: [userWallet, 'latest'] });
            const ethBal = (parseInt(balance, 16) / 1e18).toFixed(4);
            
            document.getElementById('walletAddr').innerText = userWallet;
            document.getElementById('walletBal').innerText = `${ethBal} BNB`;
            document.getElementById('claimableDisplay').innerText = `${currentClaimable.toFixed(3)} tBNB`;
            document.getElementById('btnClaim').innerText = `RELEASE ${currentClaimable.toFixed(3)} TO WALLET`;
        }

        window.handleEntrance = () => {
            const fee = 0.1;
            if(confirm(`Confirm payment of 0.1 tBNB for Season Entrance Fee?\n(System will check your Claimable Balance first).`)) {
                if(currentClaimable >= fee) {
                    currentClaimable -= fee;
                    alert("Success: Paid using internal Claimable Balance.");
                } else {
                    alert("Insufficient Claimable Balance. Please confirm the transaction in MetaMask.");
                    // Here you would trigger: await ethereum.request({ method: 'eth_sendTransaction', ... });
                }
                syncFinance();
            }
        };

        window.handleRelease = () => {
            if(currentClaimable <= 0) return alert("Nothing to release.");
            if(confirm(`Do you want to release your entire prize of ${currentClaimable.toFixed(3)} tBNB to your MetaMask wallet?`)) {
                alert("Transfer Initialized. Your wallet will be updated shortly.");
                currentClaimable = 0;
                syncFinance();
            }
        };

        // --- Garage Logic ---
        function loadGarage() {
            const team = document.getElementById('teamSelect').value;
            onValue(ref(db, 'cars'), (snap) => {
                const cars = Object.values(snap.val() || {}).filter(c => c.team === team);
                renderGarageUI(cars);
            });
        }

        function renderGarageUI(cars) {
            const grid = document.getElementById('garageGrid');
            grid.innerHTML = '';
            cars.forEach(car => {
                const hp = 100 - (car.damage || 0);
                const isHero = car.role === 'hero';
                const isSupport = car.role === 'support';
                const traitSum = car.traits.propulsion + car.traits.traction + car.traits.stability + car.traits.core;

                grid.innerHTML += `
                    <div class="car-card ${car.role || ''}">
                        <div class="role-text">${car.role ? '[ ' + car.role.toUpperCase() + ' ]' : '&nbsp;'}</div>
                        <div style="font-weight:bold; font-size:1.1rem; margin-bottom:10px;">UNIT #${car.id}</div>
                        
                        <div class="trait-row"><span>Propulsion:</span><span class="trait-val">${car.traits.propulsion}</span></div>
                        <div class="trait-row"><span>Traction:</span><span class="trait-val">${car.traits.traction}</span></div>
                        <div class="trait-row"><span>Stability:</span><span class="trait-val">${car.traits.stability}</span></div>
                        <div class="trait-row"><span>Core:</span><span class="trait-val">${car.traits.core}</span></div>
                        
                        <div class="trait-row" style="border-top:1px solid rgba(255,255,255,0.1); margin-top:8px; padding-top:8px; color:var(--gold);">
                            <span>Total Trait Sum:</span><span class="trait-val">${traitSum}</span>
                        </div>

                        <div class="hp-bar-bg"><div class="hp-bar-fill" style="width:${hp}%"></div></div>
                        <div style="font-size:0.6rem; color:#666; margin-top:4px;">Hull Integrity: ${hp}%</div>

                        <div style="display:flex; gap:5px; margin-top:20px;">
                            <button class="btn-role" onclick="setRole(${car.id}, 'hero')">SET HERO</button>
                            <button class="btn-role" onclick="setRole(${car.id}, 'support')">SET SUPPORT</button>
                        </div>
                    </div>`;
            });
        }

        window.setRole = async (carId, role) => {
            if(!confirm(`Confirm changing Team ${role.toUpperCase()} role to Unit #${carId}?`)) return;
            
            const team = document.getElementById('teamSelect').value;
            const snap = await get(ref(db, 'cars'));
            const cars = snap.val();
            const updates = {};
            
            // 1. Remove that specific role from any other car in THIS team
            Object.keys(cars).forEach(key => {
                if(cars[key].team === team && cars[key].role === role) {
                    updates[`cars/${key}/role`] = null;
                }
            });

            // 2. Assign role to target car
            updates[`cars/car_${carId.toString().padStart(3,'0')}/role`] = role;
            
            try {
                await update(ref(db), updates);
                alert(`${role.toUpperCase()} Updated!`);
            } catch (e) { console.error(e); }
        };

        // --- Master/Track Integration ---
        function listenToMaster() {
            onValue(ref(db, 'master_state'), (snap) => {
                const state = snap.val() || { isLive: false, label: "OFFLINE" };
                const statusLabel = document.getElementById('track-status');
                statusLabel.innerText = state.label;
                statusLabel.style.color = state.isLive ? 'var(--accent)' : 'var(--gold)';
                
                if(state.isLive) {
                    updateTrackVisuals();
                } else {
                    document.getElementById('cars-layer').innerHTML = '<p style="text-align:center; color:#333; margin-top:100px;">RACE PAUSED</p>';
                }
            });
        }

        function updateTrackVisuals() {
            onValue(ref(db, 'cars'), (snap) => {
                const layer = document.getElementById('cars-layer');
                layer.innerHTML = '';
                // Only show Top 10 to keep the garage track view focused
                const cars = Object.values(snap.val() || {}).sort((a,b) => (b.total_dist || 0) - (a.total_dist || 0)).slice(0, 10);
                
                cars.forEach(car => {
                    const progress = (car.total_dist || 0) / 1500 * 100;
                    layer.innerHTML += `
                        <div class="track-lane">
                            <div class="track-car" style="left:${progress}%">${car.id}</div>
                        </div>`;
                });
            }, { onlyOnce: true });
        }
    </script>
</body>
</html>
