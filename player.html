<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANRAT | Player Garage</title>
    <style>
        :root { 
            --glass: rgba(255, 255, 255, 0.08); 
            --accent: #00ffcc; 
            --gold: #ffcc00; 
            --danger: #ff4b2b; 
            --bg: #0b0e14;
        }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; }
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .btn-connect { background: #f6851b; color: white; padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        #player-ui { display: none; width: 100%; max-width: 1100px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--glass); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .finance-card { background: rgba(255,255,255,0.03); border: 1px solid var(--gold); padding: 20px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .car-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; position: relative; transition: 0.3s; }
        .car-card.hero { border: 2px solid var(--gold); }
        .car-card.support { border: 2px solid var(--accent); }
        .role-text { font-weight: 900; font-size: 0.75rem; margin-bottom: 5px; letter-spacing: 1px; min-height: 1rem; }
        .hero .role-text { color: var(--gold); }
        .support .role-text { color: var(--accent); }
        .trait-row { display: flex; justify-content: space-between; font-size: 0.8rem; margin: 4px 0; color: #ccc; }
        .trait-val { color: white; font-weight: bold; }
        .hp-bar-bg { width: 100%; height: 6px; background: #333; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .hp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--danger), var(--accent)); transition: 0.5s; }
        .btn-action { padding: 12px 18px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 0.75rem; }
        .btn-pay { background: var(--accent); color: #00334e; }
        .btn-claim { background: var(--gold); color: #000; }
        .btn-role { flex: 1; font-size: 0.6rem; background: #222; color: white; border: 1px solid #444; padding: 5px; cursor: pointer; border-radius: 4px; }
        .track-box { background: #161b22; border-radius: 15px; padding: 20px; border: 1px solid #30363d; width: 100%; box-sizing: border-box; }
        .track-lane { position: relative; width: 100%; height: 25px; border-bottom: 1px solid #21262d; }
        .track-car { position: absolute; height: 15px; width: 25px; background: var(--accent); border-radius: 2px; top: 5px; transition: 1s linear; font-size: 0.5rem; color: black; font-weight: 900; text-align: center; line-height: 15px; }
        .finish-line { position: absolute; left: 66.6%; top: 0; bottom: 0; border-left: 2px dashed #444; z-index: 0; }
        select { background:#000; color:white; border:1px solid var(--accent); padding:8px; border-radius:5px; outline:none; }
    </style>
</head>
<body>
    <div id="auth-screen">
        <h1 style="letter-spacing: 3px;">SANRAT GARAGE</h1>
        <button class="btn-connect" id="connectBtn">Connect MetaMask</button>
    </div>

    <div id="player-ui">
        <div class="header-bar">
            <select id="teamSelect">
                <option value="Alpha">Alpha Team</option>
                <option value="Beta">Beta Team</option>
                <option value="Gamma">Gamma Team</option>
                <option value="Delta">Delta Team</option>
                <option value="Epsilon">Epsilon Team</option>
            </select>
            <div style="text-align: right;">
                <div id="walletAddr" style="font-size: 0.7rem; color: #888; font-family: monospace;"></div>
                <div id="walletBal" style="font-size: 1.1rem; font-weight: bold; color: var(--accent);">0.0000 BNB</div>
            </div>
        </div>

        <div class="finance-card">
            <div>
                <div style="font-size: 0.65rem; color: #888; text-transform: uppercase;">Team Claimable Balance</div>
                <div id="claimableDisplay" style="font-size: 1.8rem; font-weight: bold; color: var(--gold);">0.000 tBNB</div>
            </div>
            <div id="payActions" style="display: flex; gap: 10px;">
                <button class="btn-action btn-pay" id="btnPayBal" onclick="payWithBalance()">PAY VIA BALANCE (0.1)</button>
                <button class="btn-action btn-pay" id="btnPayMeta" onclick="payWithMeta()">PAY VIA METAMASK (0.1)</button>
                <button class="btn-action btn-claim" id="btnRelease" onclick="handleRelease()">RELEASE TO WALLET</button>
            </div>
        </div>

        <div class="grid" id="garageGrid"></div>

        <div class="track-box">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin:0;">SEASON TRACK</h3>
                <span id="track-status" style="font-size: 0.7rem; padding: 4px 10px; background: #000; border-radius: 50px; color: var(--gold);">OFFLINE</span>
            </div>
            <div id="track-container" style="position:relative; width:100%; height:300px; background:#000; border-radius:10px; overflow:hidden;">
                <div class="finish-line"></div>
                <div id="cars-layer"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let userWallet = "";

        document.getElementById('connectBtn').onclick = async () => {
            if (window.ethereum) {
                const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userWallet = accs[0];
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('player-ui').style.display = 'block';
                startApp();
            }
        };

        function startApp() {
            syncFinance();
            loadGarage();
            listenToMaster();
            document.getElementById('teamSelect').onchange = () => { syncFinance(); loadGarage(); };
        }

        async function syncFinance() {
            const team = document.getElementById('teamSelect').value;
            const ethBalance = await window.ethereum.request({ method: 'eth_getBalance', params: [userWallet, 'latest'] });
            document.getElementById('walletBal').innerText = `${(parseInt(ethBalance, 16) / 1e18).toFixed(4)} BNB`;
            document.getElementById('walletAddr').innerText = userWallet;

            onValue(ref(db, `balances/${team}`), (snap) => {
                const bal = snap.val() || 0;
                document.getElementById('claimableDisplay').innerText = `${bal.toFixed(3)} tBNB`;
                document.getElementById('btnRelease').innerText = `RELEASE ${bal.toFixed(3)} TO WALLET`;
            });

            onValue(ref(db, `race_state/paid_teams/${team}`), (snap) => {
                const hasPaid = snap.val() === true;
                const btnBal = document.getElementById('btnPayBal');
                const btnMeta = document.getElementById('btnPayMeta');
                if(hasPaid) {
                    btnBal.innerText = "ENTRANCE FEE PAID";
                    btnBal.disabled = true;
                    btnBal.style.opacity = "0.5";
                    btnMeta.style.display = "none";
                } else {
                    btnBal.innerText = "PAY VIA BALANCE (0.1)";
                    btnBal.disabled = false;
                    btnBal.style.opacity = "1";
                    btnMeta.style.display = "block";
                }
            });
        }

        window.payWithBalance = async () => {
            const team = document.getElementById('teamSelect').value;
            const snap = await get(ref(db, `balances/${team}`));
            const current = snap.val() || 0;
            if(current < 0.1) return alert("Insufficient team balance.");
            if(confirm("Confirm: Pay 0.1 tBNB from your internal balance?")) {
                const updates = {};
                updates[`balances/${team}`] = current - 0.1;
                updates[`race_state/paid_teams/${team}`] = true;
                await update(ref(db), updates);
                alert("Payment Successful!");
            }
        };

        window.payWithMeta = async () => {
            const team = document.getElementById('teamSelect').value;
            if(confirm("Confirm: Open MetaMask to pay 0.1 tBNB?")) {
                // Mock success for testing logic
                await set(ref(db, `race_state/paid_teams/${team}`), true);
                alert("MetaMask Payment Recorded!");
            }
        };

        window.handleRelease = async () => {
            const team = document.getElementById('teamSelect').value;
            const snap = await get(ref(db, `balances/${team}`));
            const amount = snap.val() || 0;
            if(amount <= 0) return alert("Nothing to release.");
            if(confirm(`Release ${amount.toFixed(3)} tBNB to your wallet?`)) {
                await set(ref(db, `balances/${team}`), 0);
                alert("Funds sent to wallet!");
            }
        };

        function loadGarage() {
            const team = document.getElementById('teamSelect').value;
            onValue(ref(db, 'cars'), (snap) => {
                const grid = document.getElementById('garageGrid');
                grid.innerHTML = '';
                const cars = Object.values(snap.val() || {}).filter(c => c.team === team);
                cars.forEach(car => {
                    const hp = 100 - (car.damage || 0);
                    grid.innerHTML += `
                        <div class="car-card ${car.role || ''}">
                            <div class="role-text">${car.role ? '[ ' + car.role.toUpperCase() + ' ]' : ''}</div>
                            <div style="font-weight:bold; margin-bottom:10px;">UNIT #${car.id}</div>
                            <div class="trait-row"><span>Sum:</span><span class="trait-val">${car.traits.propulsion + car.traits.traction + car.traits.stability + car.traits.core}</span></div>
                            <div class="hp-bar-bg"><div class="hp-bar-fill" style="width:${hp}%"></div></div>
                            <div style="display:flex; gap:5px; margin-top:15px;">
                                <button class="btn-role" onclick="setRole(${car.id}, 'hero')">SET HERO</button>
                                <button class="btn-role" onclick="setRole(${car.id}, 'support')">SET SUPPORT</button>
                            </div>
                        </div>`;
                });
            });
        }

        window.setRole = async (id, role) => {
            const team = document.getElementById('teamSelect').value;
            if(!confirm(`Set Unit #${id} as ${role.toUpperCase()}?`)) return;
            const snap = await get(ref(db, 'cars'));
            const cars = snap.val();
            const updates = {};
            Object.keys(cars).forEach(k => { if(cars[k].team === team && cars[k].role === role) updates[`cars/${k}/role`] = null; });
            updates[`cars/car_${id.toString().padStart(3,'0')}/role`] = role;
            await update(ref(db), updates);
        };

        function listenToMaster() {
            onValue(ref(db, 'master_state'), (snap) => {
                const state = snap.val() || { isLive: false, label: "OFFLINE" };
                document.getElementById('track-status').innerText = state.label;
                if(state.isLive) {
                    onValue(ref(db, 'cars'), (carSnap) => {
                        const layer = document.getElementById('cars-layer');
                        layer.innerHTML = '';
                        const topCars = Object.values(carSnap.val()).sort((a,b) => (b.total_dist || 0) - (a.total_dist || 0)).slice(0, 10);
                        topCars.forEach(c => {
                            const prog = (c.total_dist || 0) / 1500 * 100;
                            layer.innerHTML += `<div class="track-lane"><div class="track-car" style="left:${prog}%">${c.id}</div></div>`;
                        });
                    }, { onlyOnce: true });
                }
            });
        }
    </script>
</body>
</html>
