<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANRAT | Player Garage</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00ffcc; --gold: #ffcc00; --danger: #ff4b2b; --bg: #0b0e14; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; }
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .btn-connect { background: #f6851b; color: white; padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
        #player-ui { display: none; width: 100%; max-width: 1100px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--glass); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .finance-card { background: rgba(255,255,255,0.03); border: 1px solid var(--gold); padding: 20px; border-radius: 15px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1.5fr; align-items: center; gap: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .car-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; position: relative; }
        .car-card.hero { border: 2px solid var(--gold); }
        .car-card.support { border: 2px solid var(--accent); }
        .role-text { font-weight: 900; font-size: 0.75rem; margin-bottom: 5px; min-height: 1rem; text-transform: uppercase; }
        .hero .role-text { color: var(--gold); }
        .support .role-text { color: var(--accent); }
        .btn-action { padding: 12px 14px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-size: 0.7rem; transition: 0.2s; }
        .btn-pay { background: var(--accent); color: #00334e; }
        .btn-claim { background: var(--gold); color: #000; }
        .btn-release { background: #ffffff; color: #000; }
        .btn-role { flex: 1; font-size: 0.6rem; background: #222; color: white; border: 1px solid #444; padding: 5px; cursor: pointer; }
        .track-box { background: #161b22; border-radius: 15px; padding: 20px; border: 1px solid #30363d; width: 100%; box-sizing: border-box; }
        .track-lane { position: relative; width: 100%; height: 32px; border-bottom: 1px solid #21262d; }
        .track-car { position: absolute; height: 20px; width: 35px; border-radius: 4px; top: 6px; transition: 1s linear; font-size: 0.6rem; color: black; font-weight: 900; text-align: center; line-height: 20px; cursor: help; }
        .track-car.hero { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .track-car.support { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .finish-line { position: absolute; left: 66.6%; top: 0; bottom: 0; border-left: 2px dashed #444; }
        select { background:#000; color:white; border:1px solid var(--accent); padding:8px; border-radius:5px; }
    </style>
</head>
<body>
    <div id="auth-screen">
        <h1>SANRAT GARAGE</h1>
        <button class="btn-connect" id="connectBtn">Connect MetaMask</button>
    </div>

    <div id="player-ui">
        <div class="header-bar">
            <select id="teamSelect"><option value="Alpha">Alpha</option><option value="Beta">Beta</option><option value="Gamma">Gamma</option><option value="Delta">Delta</option><option value="Epsilon">Epsilon</option></select>
            <div id="walletBal" style="font-weight: bold; color: var(--accent);">0.0000 BNB</div>
        </div>

        <div class="finance-card">
            <div>
                <div style="font-size: 0.6rem; color: #888; letter-spacing: 1px;">TEAM INTERNAL BALANCE</div>
                <div id="teamBalDisplay" style="font-size: 1.8rem; font-weight: bold; color: var(--gold);">0.000 tBNB</div>
            </div>
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <button class="btn-action btn-pay" id="btnPayBal" onclick="pay('bal')">PAY ENTRANCE (0.1)</button>
                <button class="btn-action btn-pay" id="btnPayMeta" onclick="pay('meta')">METAMASK PAY</button>
                <button class="btn-action btn-claim" id="btnClaim" onclick="claimPrize()">CLAIM PRIZE (0.000)</button>
                <button class="btn-action btn-release" id="btnRelease" onclick="release()">RELEASE TO WALLET (0.000)</button>
            </div>
        </div>

        <div class="grid" id="garageGrid"></div>

        <div class="track-box">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h3 style="margin:0;">RACE TRACK (LIVE)</h3>
                <span id="track-status" style="font-size:0.7rem; color:var(--gold);">OFFLINE</span>
            </div>
            <div id="track-container" style="position:relative; width:100%; height:320px; background:#000; border-radius:10px; overflow-y:auto;">
                <div class="finish-line"></div>
                <div id="cars-layer"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('connectBtn').onclick = async () => {
            if (window.ethereum) {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('player-ui').style.display = 'block';
                init();
            }
        };

        function init() {
            syncFinance();
            loadGarage();
            listenToTrack();
            document.getElementById('teamSelect').onchange = () => { syncFinance(); loadGarage(); };
        }

        async function syncFinance() {
            const team = document.getElementById('teamSelect').value;
            onValue(ref(db, `balances/${team}`), snap => {
                const bal = snap.val() || 0;
                document.getElementById('teamBalDisplay').innerText = `${bal.toFixed(3)} tBNB`;
                document.getElementById('btnRelease').innerText = `RELEASE TO WALLET (${bal.toFixed(3)})`;
            });
            onValue(ref(db, `prizes/${team}`), snap => {
                const p = snap.val() || 0;
                document.getElementById('btnClaim').innerText = `CLAIM PRIZE (${p.toFixed(3)})`;
            });
            onValue(ref(db, `race_state/paid_teams/${team}`), snap => {
                const paid = snap.val() === true;
                const b = document.getElementById('btnPayBal');
                b.innerText = paid ? "ENTRANCE PAID" : "PAY ENTRANCE (0.1)";
                b.disabled = paid;
                document.getElementById('btnPayMeta').style.display = paid ? "none" : "block";
            });
        }

        window.pay = async (method) => {
            const team = document.getElementById('teamSelect').value;
            if(method === 'bal') {
                const s = await get(ref(db, `balances/${team}`));
                if((s.val()||0) < 0.1) return alert("Insufficient Balance");
                await update(ref(db), { [`balances/${team}`]: s.val() - 0.1, [`race_state/paid_teams/${team}`]: true });
            } else { await set(ref(db, `race_state/paid_teams/${team}`), true); }
        };

        window.claimPrize = async () => {
            const team = document.getElementById('teamSelect').value;
            const pSnap = await get(ref(db, `prizes/${team}`));
            const prizeAmt = pSnap.val() || 0;
            if(prizeAmt <= 0) return alert("No prize to claim");
            
            const bSnap = await get(ref(db, `balances/${team}`));
            const curBal = bSnap.val() || 0;
            
            await update(ref(db), {
                [`balances/${team}`]: curBal + prizeAmt,
                [`prizes/${team}`]: 0
            });
            alert("Prize added to team balance!");
        };

        window.release = async () => {
            const team = document.getElementById('teamSelect').value;
            const bSnap = await get(ref(db, `balances/${team}`));
            const amt = bSnap.val() || 0;
            if(amt <= 0) return alert("Nothing to release");
            if(confirm(`Send ${amt.toFixed(3)} to your MetaMask?`)) {
                await set(ref(db, `balances/${team}`), 0);
                alert("Transaction Processed!");
            }
        };

        function loadGarage() {
            const team = document.getElementById('teamSelect').value;
            onValue(ref(db, 'cars'), snap => {
                const grid = document.getElementById('garageGrid');
                grid.innerHTML = '';
                Object.values(snap.val()).filter(c => c.team === team).forEach(car => {
                    grid.innerHTML += `<div class="car-card ${car.role||''}">
                        <div class="role-text">${car.role || '&nbsp;'}</div>
                        <b>UNIT #${car.id}</b>
                        <div style="display:flex; gap:5px; margin-top:10px;">
                            <button class="btn-role" onclick="setRole(${car.id}, 'hero')">HERO</button>
                            <button class="btn-role" onclick="setRole(${car.id}, 'support')">SUPPORT</button>
                        </div>
                    </div>`;
                });
            });
        }

        window.setRole = async (id, role) => {
            const team = document.getElementById('teamSelect').value;
            const snap = await get(ref(db, 'cars'));
            const updates = {};
            Object.keys(snap.val()).forEach(k => { if(snap.val()[k].team === team && snap.val()[k].role === role) updates[`cars/${k}/role`] = null; });
            updates[`cars/car_${id.toString().padStart(3,'0')}/role`] = role;
            await update(ref(db), updates);
        };

        function listenToTrack() {
            onValue(ref(db, 'master_state'), s => { document.getElementById('track-status').innerText = s.val()?.label || "OFFLINE"; });
            onValue(ref(db, 'race_state/paid_teams'), paidSnap => {
                const paidTeams = paidSnap.val() || {};
                onValue(ref(db, 'cars'), carSnap => {
                    const layer = document.getElementById('cars-layer');
                    layer.innerHTML = '';
                    Object.values(carSnap.val()).forEach(c => {
                        if(paidTeams[c.team] && c.role) {
                            const prog = (c.total_dist || 0) / 1500 * 100;
                            const tip = `ID:${c.id}\nP:${c.traits.propulsion} T:${c.traits.traction} S:${c.traits.stability} C:${c.traits.core}\nDist:${c.total_dist?.toFixed(1)}m`;
                            layer.innerHTML += `<div class="track-lane"><div class="track-car ${c.role}" style="left:${prog}%" title="${tip}">${c.id}</div></div>`;
                        }
                    });
                });
            });
        }
    </script>
</body>
</html>
