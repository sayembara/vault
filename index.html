<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT MASTER TERMINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: #f3ba2f; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .terminal { background: #080808; border: 1px solid #333; padding: 25px; width: 100%; max-width: 350px; text-align: center; }
        button { width: 100%; padding: 15px; margin: 8px 0; background: #f3ba2f; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; }
        #status-bar { background: #111; padding: 10px; margin-top: 15px; font-size: 0.8em; border: 1px solid #222; min-height: 1.2em; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="letter-spacing: 3px; font-size: 1.1em;">SANRAT_VAULT_v2</h2>
    <button id="connectBtn">1. CONNECT PILOT</button>
    <button id="depositBtn" disabled>2. DEPOSIT 0.01 tBNB</button>
    <div id="status-bar">// SYSTEM_READY //</div>
</div>

<script>
    // DOUBLE CHECK: Ensure this matches your MetaMask exactly
    const MASTER_WALLET = "0xce9782f77ec560a1cb329f935b5d416aa41f1a5d".toLowerCase();
    const contractAddress = "0xb436c8C192288F45ca154081aa6c04b867c1946C";
    const abi = ["function payEntranceFee() external payable"];
    
    let signer, contract;

    const updateStatus = (msg) => {
        document.getElementById('status-bar').innerText = "// " + msg + " //";
    }

    document.getElementById('connectBtn').onclick = async () => {
        if (typeof window.ethereum === 'undefined') {
            alert("MetaMask not found!");
            return;
        }
        
        try {
            updateStatus("REQUESTING_AUTH...");
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            const userAddr = accounts[0].toLowerCase();

            // CHECK 1: Wallet Match
            if (userAddr !== MASTER_WALLET) {
                updateStatus("INVALID_PILOT_ID");
                alert("ACCESS DENIED\nYour Wallet: " + userAddr + "\nRequired: " + MASTER_WALLET);
                return;
            }

            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const net = await provider.getNetwork();
            
            // CHECK 2: Network Match (97 is BSC Testnet)
            if (net.chainId !== 97) {
                updateStatus("WRONG_NETWORK");
                alert("Please switch MetaMask to BNB Smart Chain Testnet (Chain ID 97)");
                return;
            }

            signer = provider.getSigner();
            contract = new ethers.Contract(contractAddress, abi, signer);

            document.getElementById('connectBtn').innerText = "LINK_ACTIVE";
            document.getElementById('connectBtn').style.background = "#2ecc71";
            document.getElementById('depositBtn').disabled = false;
            updateStatus("SYSTEM_ONLINE");

        } catch (e) {
            console.error(e);
            updateStatus("USER_REJECTED");
        }
    };

    document.getElementById('depositBtn').onclick = async () => {
        try {
            updateStatus("SENDING_VAULT_LOCK...");
            const tx = await contract.payEntranceFee({ 
                value: ethers.utils.parseEther("0.01") 
            });
            updateStatus("MINING_TRANSACTION...");
            await tx.wait();
            updateStatus("DEPOSIT_SUCCESSFUL");
        } catch (e) {
            updateStatus("TRANSACTION_FAILED");
        }
    };
</script>
</body>
</html>
