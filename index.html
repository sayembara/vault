<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUCLEAR_RACING_DASHBOARD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --accent: #f3ba2f; --bg: #000; --panel: #0a0a0a; --border: #222; --text-dim: #666; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .dashboard-grid { display: grid; grid-template-columns: 350px 1fr 300px; grid-gap: 20px; width: 100%; max-width: 1400px; }
        .panel { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 4px; position: relative; }
        .panel h3 { color: var(--accent); margin-top: 0; font-size: 0.85em; letter-spacing: 2px; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
        .stat-box { background: #111; padding: 10px; margin: 8px 0; border: 1px solid #1a1a1a; display: flex; justify-content: space-between; font-size: 0.8em; }
        button { width: 100%; padding: 15px; margin: 8px 0; background: var(--accent); color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; border: 1px solid #222; }
        #status-bar { color: var(--accent); font-size: 0.7em; margin-top: 10px; text-transform: uppercase; border-left: 2px solid var(--accent); padding-left: 8px; }
        .dummy-content { color: var(--text-dim); font-size: 0.75em; display: flex; align-items: center; justify-content: center; height: 100px; border: 1px dashed #222; text-align: center; }
        .garage-item { padding: 8px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; font-size: 0.8em; color: #aaa; }
        .race-track { height: 350px; background: radial-gradient(circle, #0f0f0f 0%, #000 100%); border: 1px solid #333; }
        .matrix-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; height: 80px; }
        .matrix-cell { background: #080808; border: 1px solid #151515; }
    </style>
</head>
<body>

<div class="dashboard-grid">
    <div class="side-col">
        <div class="panel">
            <h3>COMMAND_CENTER</h3>
            <div class="stat-box"><span>WALLET:</span><span id="userBalance">0.0000 tBNB</span></div>
            <div class="stat-box"><span>PRIZE:</span><span id="prizeDisplay">0.00 tBNB</span></div>
            <div class="stat-box"><span>LOBBY:</span><span id="carCountDisplay">0 / 0</span></div>
            <button id="connectBtn">1. CONNECT_WALLET</button>
            <button id="depositBtn" disabled>2. REGISTER_CAR [<span id="displayFee">...</span>]</button>
            <button id="claimBtn" style="display:none; background:#2ecc71;">3. CLAIM_WINNINGS</button>
            <div id="status-bar">// SYSTEM_OFFLINE //</div>
        </div>
        <div class="panel" style="margin-top:20px;">
            <h3>PLAYER_GARAGE</h3>
            <div class="garage-item"><span>PROTOTYPE_01</span><span style="color:var(--accent)">READY</span></div>
            <div class="garage-item" style="opacity:0.3;"><span>STR-X_PILOT</span><span>LOCKED</span></div>
        </div>
    </div>
    <div class="main-col">
        <div class="panel race-track"><h3>LIVE_RACE_TRACK</h3><div class="dummy-content" style="height:280px;">[ SENSORS_OFFLINE ]</div></div>
        <div class="panel" style="margin-top:20px;"><h3>7-DAY_MATRIX</h3><div class="matrix-grid"><div class="matrix-cell"></div><div class="matrix-cell"></div><div class="matrix-cell"></div><div class="matrix-cell"></div><div class="matrix-cell"></div><div class="matrix-cell"></div><div class="matrix-cell"></div></div></div>
    </div>
    <div class="side-col">
        <div class="panel"><h3>DRIVER_STANDINGS</h3><div class="dummy-content">CALCULATING...</div></div>
        <div class="panel" style="margin-top:20px;"><h3>CONSTRUCTOR</h3><div class="dummy-content">DATA_PENDING</div></div>
        <div class="panel" style="margin-top:20px;"><h3>ROUND_STATS</h3><div class="dummy-content">NO_DATA</div></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, get, update, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "nuclearf1-94a6b.firebaseapp.com",
        databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "nuclearf1-94a6b",
        storageBucket: "nuclearf1-94a6b.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const contractAddress = "0xb436c8C192288F45ca154081aa6c04b867c1946C";
    const RENDER_URL = "https://sanrat-vault-backend.onrender.com";
    const abi = ["function payEntranceFee() external payable", "function claimPrize(uint256 amount, bytes calldata signature) external"];
    
    let signer, contract, userAddress, currentRound;
    let liveFee = "0";

    async function syncData() {
        if (!signer || !userAddress) return;
        try {
            const bal = await signer.getBalance();
            document.getElementById('userBalance').innerText = parseFloat(ethers.utils.formatEther(bal)).toFixed(4) + " tBNB";
            
            const regSnap = await get(ref(db, `registrations/${userAddress.toLowerCase()}`));
            const regData = regSnap.val();
            const btn = document.getElementById('depositBtn');

            if (regData && regData.lastPaidRound === currentRound) {
                btn.disabled = true; btn.innerText = "REGISTERED ✅";
            } else {
                btn.disabled = false; btn.innerText = `REGISTER_CAR`;
            }
        } catch(e) { console.error("Sync error:", e); }
    }

    function startLobby() {
        onValue(ref(db, 'vault/stats'), async (snap) => {
            const data = snap.val();
            if (!data) return;
            currentRound = data.currentRound || 1;
            liveFee = data.entranceFee ? data.entranceFee.toString() : "0.01";

            document.getElementById('prizeDisplay').innerText = data.prizeAmount + " tBNB";
            document.getElementById('carCountDisplay').innerText = `${data.carCount} / ${data.minCars}`;
            document.getElementById('displayFee').innerText = liveFee;
            
            await syncData();

            const walletLower = userAddress.toLowerCase();
            if (data.winner !== "none" && data.winner === walletLower) {
                document.getElementById('claimBtn').style.display = "block";
                document.getElementById('depositBtn').style.display = "none";
                document.getElementById('status-bar').innerText = "// WINNER DETECTED //";
            } else {
                document.getElementById('claimBtn').style.display = "none";
                document.getElementById('depositBtn').style.display = "block";
                document.getElementById('status-bar').innerText = data.winner !== "none" ? "// ROUND OVER //" : "// LOBBY ACTIVE //";
            }
        });
    }

    document.getElementById('connectBtn').onclick = async () => {
        try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userAddress = accounts[0];
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            signer = provider.getSigner();
            contract = new ethers.Contract(contractAddress, abi, signer);
            document.getElementById('connectBtn').innerText = "LINKED";
            document.getElementById('connectBtn').disabled = true;
            startLobby();
        } catch(e) { alert("Connect failed"); }
    };

    document.getElementById('depositBtn').onclick = async () => {
        try {
            if (liveFee === "0" || !liveFee) return alert("System Syncing... try again in 1s.");
            document.getElementById('status-bar').innerText = "// PENDING WALLET... //";
            
            const tx = await contract.payEntranceFee({ 
                value: ethers.utils.parseEther(liveFee),
                gasLimit: 150000 
            });
            
            document.getElementById('status-bar').innerText = "// MINING... //";
            await tx.wait();
            
            await update(ref(db, `registrations/${userAddress.toLowerCase()}`), { paid: true, lastPaidRound: currentRound });
            await runTransaction(ref(db, 'vault/stats/carCount'), (c) => (c || 0) + 1);
            document.getElementById('status-bar').innerText = "// SUCCESS //";
            await syncData();
        } catch (e) { 
            console.error(e);
            document.getElementById('status-bar').innerText = "// TX_ERROR //"; 
        }
    };

    document.getElementById('claimBtn').onclick = async () => {
        try {
            const prizeAmt = document.getElementById('prizeDisplay').innerText.split(' ')[0];
            const res = await fetch(`${RENDER_URL}/get-signature?playerAddress=${userAddress}&amount=${prizeAmt}`);
            const data = await res.json();
            const tx = await contract.claimPrize(data.amountWei, data.signature, { gasLimit: 200000 });
            await tx.wait();
            document.getElementById('status-bar').innerText = "// CLAIMED //";
            document.getElementById('claimBtn').style.display = "none";
            await syncData();
        } catch (e) { document.getElementById('status-bar').innerText = "// CLAIM_ERROR //"; }
    };
</script>
</body>
</html>
