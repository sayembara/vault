<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANRAT_RACE_LOBBY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: #f3ba2f; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .terminal { background: #080808; border: 1px solid #333; padding: 25px; width: 100%; max-width: 380px; text-align: center; border-radius: 8px; box-shadow: 0 0 15px rgba(243, 186, 47, 0.1); }
        button { width: 100%; padding: 15px; margin: 8px 0; background: #f3ba2f; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px; transition: 0.2s; }
        button:hover { background: #fff; }
        button:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; }
        .stat-box { background: #111; padding: 12px; margin: 10px 0; border: 1px solid #222; font-size: 0.9em; display: flex; justify-content: space-between; }
        #status-bar { background: #111; padding: 10px; margin-top: 10px; font-size: 0.8em; border: 1px solid #222; color: #f3ba2f; min-height: 1.2em; border-left: 3px solid #f3ba2f; white-space: pre-wrap; }
        #claimBtn { background: #2ecc71; color: #000; display: none; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="letter-spacing: 4px; color: #fff; margin-bottom: 20px;">RACE_LOBBY</h2>
    
    <div class="stat-box">
        <span>CURRENT_PRIZE:</span>
        <span id="prizeDisplay">0.00 tBNB</span>
    </div>

    <div class="stat-box">
        <span>CARS_IN_LOBBY:</span>
        <span id="carCountDisplay">0 / 0</span>
    </div>

    <button id="connectBtn">1. CONNECT WALLET</button>
    <button id="depositBtn" disabled>2. REGISTER CAR (<span id="displayFee">0.00</span> tBNB)</button>
    <button id="claimBtn">3. CLAIM WINNINGS</button>
    
    <div id="status-bar">// OFFLINE //</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, get, update, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "nuclearf1-94a6b.firebaseapp.com",
        databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "nuclearf1-94a6b",
        storageBucket: "nuclearf1-94a6b.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const contractAddress = "0xb436c8C192288F45ca154081aa6c04b867c1946C";
    const RENDER_URL = "https://sanrat-vault-backend.onrender.com";

    const abi = ["function payEntranceFee() external payable", "function entranceFee() public view returns (uint256)", "function claimPrize(uint256 amount, bytes calldata signature) external"];
    let signer, contract, userAddress, currentRound;

    function startLobbySync() {
        onValue(ref(db, 'vault/stats'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            currentRound = data.currentRound || 1;
            document.getElementById('prizeDisplay').innerText = data.prizeAmount + " tBNB";
            document.getElementById('carCountDisplay').innerText = `${data.carCount} / ${data.minCars}`;
            document.getElementById('displayFee').innerText = data.entranceFee || "0.00";
            
            const walletLower = userAddress ? userAddress.toLowerCase() : "";
            if (data.winner !== "none" && data.winner === walletLower) {
                document.getElementById('claimBtn').style.display = "block";
                document.getElementById('depositBtn').style.display = "none";
                document.getElementById('status-bar').innerText = "🏆 WINNER DETECTED!\nCLAIM YOUR PRIZE.";
            } else if (data.winner !== "none") {
                document.getElementById('status-bar').innerText = `RACE FINISHED.\nWINNER: ${data.winner.substring(0,10)}...`;
                document.getElementById('claimBtn').style.display = "none";
            } else {
                document.getElementById('status-bar').innerText = `STATUS: WAITING FOR START`;
                document.getElementById('claimBtn').style.display = "none";
                document.getElementById('depositBtn').style.display = "block";
                if(userAddress) checkRegistrationStatus();
            }
        });
    }

    async function checkRegistrationStatus() {
        const regSnap = await get(ref(db, `registrations/${userAddress.toLowerCase()}`));
        const regData = regSnap.val();
        if (regData && regData.lastPaidRound === currentRound) {
            document.getElementById('depositBtn').disabled = true;
            document.getElementById('depositBtn').innerText = "REGISTERED ✅";
        } else {
            document.getElementById('depositBtn').disabled = false;
            document.getElementById('depositBtn').innerText = `2. REGISTER CAR`;
        }
    }

    document.getElementById('connectBtn').onclick = async () => {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAddress = accounts[0];
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        contract = new ethers.Contract(contractAddress, abi, signer);
        document.getElementById('connectBtn').innerText = "CONNECTED";
        startLobbySync();
    };

    document.getElementById('depositBtn').onclick = async () => {
        try {
            document.getElementById('status-bar').innerText = "// SIGNING... //";
            const tx = await contract.payEntranceFee({ value: ethers.utils.parseEther(document.getElementById('displayFee').innerText) });
            await tx.wait();
            await update(ref(db, `registrations/${userAddress.toLowerCase()}`), { paid: true, lastPaidRound: currentRound });
            await runTransaction(ref(db, 'vault/stats/carCount'), (c) => (c || 0) + 1);
            document.getElementById('status-bar').innerText = "// REGISTERED! //";
        } catch (e) { document.getElementById('status-bar').innerText = "// ERROR //"; }
    };

    document.getElementById('claimBtn').onclick = async () => {
        try {
            const prizeAmt = document.getElementById('prizeDisplay').innerText.split(' ')[0];
            const res = await fetch(`${RENDER_URL}/get-signature?playerAddress=${userAddress}&amount=${prizeAmt}`);
            const data = await res.json();
            const tx = await contract.claimPrize(data.amountWei, data.signature);
            await tx.wait();
            document.getElementById('status-bar').innerText = "// CLAIMED! //";
            document.getElementById('claimBtn').style.display = "none";
        } catch (e) { document.getElementById('status-bar').innerText = "// CLAIM FAILED //"; }
    };
</script>
</body>
</html>
