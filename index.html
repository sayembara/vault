<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUCLEAR_F1_DASHBOARD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --accent: #f3ba2f; --bg: #000; --panel: #0a0a0a; --border: #222; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; justify-content: center; }
        
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: 350px 1fr 300px; 
            grid-gap: 20px; 
            width: 100%; 
            max-width: 1400px; 
        }

        .panel { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 4px; position: relative; }
        .panel h3 { color: var(--accent); margin-top: 0; font-size: 0.9em; letter-spacing: 2px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        /* LOBBY CONTROLS */
        .stat-box { background: #111; padding: 10px; margin: 10px 0; border: 1px solid #1a1a1a; display: flex; justify-content: space-between; font-size: 0.8em; }
        button { width: 100%; padding: 15px; margin: 8px 0; background: var(--accent); color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; }
        #status-bar { color: var(--accent); font-size: 0.75em; margin-top: 10px; text-transform: uppercase; }

        /* DUMMY BOXES */
        .dummy-content { color: #444; font-size: 0.8em; display: flex; align-items: center; justify-content: center; height: 100px; border: 1px dashed #222; }
        .race-track { height: 300px; border: 2px solid #111; background: repeating-linear-gradient(45deg, #050505, #050505 10px, #080808 10px, #080808 20px); }
        .matrix-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; height: 80px; }
        .matrix-cell { background: #111; border: 1px solid #1a1a1a; }

        .winner-glow { color: #2ecc71; text-shadow: 0 0 10px rgba(46, 204, 113, 0.5); }
    </style>
</head>
<body>

<div class="dashboard-grid">
    
    <div class="side-col">
        <div class="panel">
            <h3>LOBBY_COMMAND</h3>
            <div class="stat-box"><span>PRIZE:</span><span id="prizeDisplay" style="color:var(--accent)">0.00 tBNB</span></div>
            <div class="stat-box"><span>LOBBY:</span><span id="carCountDisplay">0 / 0</span></div>
            <div class="stat-box"><span>WALLET:</span><span id="userBalance">0.00 tBNB</span></div>
            
            <button id="connectBtn">CONNECT_NEURAL_LINK</button>
            <button id="depositBtn" disabled>REGISTER_CAR [<span id="displayFee">0.00</span> tBNB]</button>
            <button id="claimBtn" style="display:none; background:#2ecc71;">CLAIM_WINNINGS</button>
            <div id="status-bar">// SYSTEM_OFFLINE //</div>
        </div>

        <div class="panel" style="margin-top:20px;">
            <h3>ROUND_STANDINGS</h3>
            <div class="dummy-content">NO_DATA_AVAILABLE</div>
        </div>
    </div>

    <div class="main-col">
        <div class="panel race-track">
            <h3>LIVE_RACE_TRACK</h3>
            <div class="dummy-content" style="height:230px;">[ TRACK_VISUALIZATION_LOADING ]</div>
        </div>

        <div class="panel" style="margin-top:20px;">
            <h3>7-DAY_PERFORMANCE_MATRIX</h3>
            <div class="matrix-grid" id="matrix">
                <div class="matrix-cell"></div><div class="matrix-cell"></div><div class="matrix-cell"></div>
                <div class="matrix-cell"></div><div class="matrix-cell"></div><div class="matrix-cell"></div>
                <div class="matrix-cell"></div>
            </div>
        </div>
    </div>

    <div class="side-col">
        <div class="panel">
            <h3>DRIVER_STANDINGS</h3>
            <div class="dummy-content" style="height:150px;">AWAITING_SEASON_START</div>
        </div>

        <div class="panel" style="margin-top:20px;">
            <h3>CONSTRUCTOR_STANDINGS</h3>
            <div class="dummy-content" style="height:150px;">AWAITING_SEASON_START</div>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, get, update, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "nuclearf1-94a6b.firebaseapp.com",
        databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "nuclearf1-94a6b",
        storageBucket: "nuclearf1-94a6b.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const contractAddress = "0xb436c8C192288F45ca154081aa6c04b867c1946C";
    const RENDER_URL = "https://sanrat-vault-backend.onrender.com";

    const abi = [
        "function payEntranceFee() external payable", 
        "function entranceFee() public view returns (uint256)", 
        "function claimPrize(uint256 amount, bytes calldata signature) external"
    ];
    
    let signer, contract, userAddress, currentRound;

    async function updateUIState() {
        if (signer && userAddress) {
            const bal = await signer.getBalance();
            document.getElementById('userBalance').innerText = parseFloat(ethers.utils.formatEther(bal)).toFixed(4) + " tBNB";
            checkRegistrationStatus();
        }
    }

    function startLobbySync() {
        onValue(ref(db, 'vault/stats'), async (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            currentRound = data.currentRound || 1;
            document.getElementById('prizeDisplay').innerText = data.prizeAmount + " tBNB";
            document.getElementById('carCountDisplay').innerText = `${data.carCount} / ${data.minCars}`;
            document.getElementById('displayFee').innerText = data.entranceFee || "0.01";
            
            await updateUIState();

            const walletLower = userAddress ? userAddress.toLowerCase() : "";
            if (data.winner !== "none" && data.winner === walletLower) {
                document.getElementById('claimBtn').style.display = "block";
                document.getElementById('depositBtn').style.display = "none";
                document.getElementById('status-bar').innerText = "// WINNER DETECTED //";
            } else if (data.winner !== "none") {
                document.getElementById('status-bar').innerText = `// RACE FINISHED: ${data.winner.substring(0,8)}... //`;
                document.getElementById('claimBtn').style.display = "none";
            } else {
                document.getElementById('status-bar').innerText = `// LOBBY ACTIVE //`;
                document.getElementById('claimBtn').style.display = "none";
                document.getElementById('depositBtn').style.display = "block";
            }
        });
    }

    async function checkRegistrationStatus() {
        const regSnap = await get(ref(db, `registrations/${userAddress.toLowerCase()}`));
        const regData = regSnap.val();
        const btn = document.getElementById('depositBtn');
        
        if (regData && regData.lastPaidRound === currentRound) {
            btn.disabled = true;
            btn.innerText = "REGISTERED ✅";
            btn.style.background = "#1a1a1a";
        } else {
            btn.disabled = false;
            btn.innerText = `REGISTER_CAR`;
            btn.style.background = "#f3ba2f";
        }
    }

    document.getElementById('connectBtn').onclick = async () => {
        try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userAddress = accounts[0];
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            signer = provider.getSigner();
            contract = new ethers.Contract(contractAddress, abi, signer);
            document.getElementById('connectBtn').innerText = "CONNECTED";
            document.getElementById('connectBtn').style.color = "#2ecc71";
            startLobbySync();
        } catch (e) { console.error(e); }
    };

    document.getElementById('depositBtn').onclick = async () => {
        try {
            const fee = document.getElementById('displayFee').innerText;
            document.getElementById('status-bar').innerText = "// AUTHORIZING... //";
            
            const tx = await contract.payEntranceFee({ 
                value: ethers.utils.parseEther(fee) 
            });
            
            document.getElementById('status-bar').innerText = "// MINING... //";
            await tx.wait();
            
            await update(ref(db, `registrations/${userAddress.toLowerCase()}`), { 
                paid: true, 
                lastPaidRound: currentRound 
            });
            
            await runTransaction(ref(db, 'vault/stats/carCount'), (c) => (c || 0) + 1);
            document.getElementById('status-bar').innerText = "// ENTRY CONFIRMED //";
            await updateUIState();
        } catch (e) { 
            console.error(e);
            document.getElementById('status-bar').innerText = "// TX_ERROR //"; 
        }
    };

    document.getElementById('claimBtn').onclick = async () => {
        try {
            const prizeAmt = document.getElementById('prizeDisplay').innerText.split(' ')[0];
            document.getElementById('status-bar').innerText = "// SIGNING... //";
            const res = await fetch(`${RENDER_URL}/get-signature?playerAddress=${userAddress}&amount=${prizeAmt}`);
            const data = await res.json();
            const tx = await contract.claimPrize(data.amountWei, data.signature);
            await tx.wait();
            document.getElementById('status-bar').innerText = "// FUNDS_CLAIMED //";
            document.getElementById('claimBtn').style.display = "none";
            await updateUIState();
        } catch (e) { document.getElementById('status-bar').innerText = "// CLAIM_ERROR //"; }
    };
</script>
</body>
</html>
