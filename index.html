<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANRAT_RACE_LOBBY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: #f3ba2f; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .terminal { background: #080808; border: 1px solid #333; padding: 25px; width: 100%; max-width: 380px; text-align: center; border-radius: 8px; box-shadow: 0 0 15px rgba(243, 186, 47, 0.1); }
        button { width: 100%; padding: 15px; margin: 8px 0; background: #f3ba2f; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px; transition: 0.2s; }
        button:hover { background: #fff; }
        button:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; }
        .stat-box { background: #111; padding: 12px; margin: 10px 0; border: 1px solid #222; font-size: 0.9em; display: flex; justify-content: space-between; }
        #status-bar { background: #111; padding: 10px; margin-top: 10px; font-size: 0.8em; border: 1px solid #222; color: #f3ba2f; min-height: 1.2em; border-left: 3px solid #f3ba2f; white-space: pre-wrap; }
        #player-history { margin-top: 20px; text-align: left; font-size: 0.75em; color: #888; border-top: 1px dashed #333; padding-top: 10px; }
        .history-item { display: flex; justify-content: space-between; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="letter-spacing: 4px; color: #fff; margin-bottom: 20px;">RACE_LOBBY_V1</h2>
    
    <div class="stat-box">
        <span>CURRENT_PRIZE:</span>
        <span id="prizeDisplay">0.00 tBNB</span>
    </div>

    <button id="connectBtn">1. INITIALIZE MASTER LINK</button>
    <button id="depositBtn" disabled>2. REGISTER CAR (<span id="displayFee">...</span> tBNB)</button>
    
    <button id="claimBtn" style="display:none; background: #2ecc71; color: #000;">3. CLAIM RACE PRIZE</button>
    
    <div id="status-bar">// WAITING_FOR_AUTH //</div>

    <div id="player-history" style="display:none;">
        <div style="color: #f3ba2f; font-size: 0.8em; margin-bottom: 5px;">// RECENT_REGISTRATIONS //</div>
        <div id="historyList">Scanning...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- 1. CONFIGURATION (Replace with your actual keys) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const contractAddress = "0xb436c8C192288F45ca154081aa6c04b867c1946C";
    const RENDER_URL = "https://sanrat-vault-backend.onrender.com";

    const abi = [
        "function payEntranceFee() external payable",
        "function entranceFee() public view returns (uint256)",
        "function claimPrize(uint256 amount, bytes calldata signature) external",
        "event Deposit(address indexed player, uint256 amount)"
    ];

    let signer, contract, userAddress;
    const providerRpc = new ethers.providers.JsonRpcProvider("https://data-seed-prebsc-1-s1.binance.org:8545/");

    // --- 2. FIREBASE REAL-TIME SYNC ---
    onSnapshot(doc(db, "vault", "stats"), (snapshot) => {
        if (!snapshot.exists()) return;
        const data = snapshot.data();
        
        // Update Prize display from Firebase
        document.getElementById('prizeDisplay').innerText = data.prizeAmount + " tBNB";
        
        const currentWallet = userAddress ? userAddress.toLowerCase() : "";

        // WINNER & LOBBY LOGIC
        if (data.winner !== "none") {
            if (data.winner === currentWallet) {
                document.getElementById('claimBtn').style.display = "block";
                document.getElementById('status-bar').innerText = "🏆 WINNER DETECTED: ACCESS GRANTED.\nCLICK 'CLAIM' TO WITHDRAW PRIZE.";
            } else {
                document.getElementById('claimBtn').style.display = "none";
                document.getElementById('status-bar').innerText = `// RACE_FINISHED //\nWINNER: ${data.winner.substring(0,10)}...`;
            }
        } else {
            // No winner yet, show lobby status
            document.getElementById('claimBtn').style.display = "none";
            document.getElementById('status-bar').innerText = `// LOBBY_OPEN //\nCARS: ${data.carCount} / ${data.minCars} READY`;
        }
    });

    // --- 3. BLOCKCHAIN LOGIC ---
    async function refreshBlockchainData() {
        try {
            const contractReadOnly = new ethers.Contract(contractAddress, abi, providerRpc);
            const fee = await contractReadOnly.entranceFee();
            document.getElementById('displayFee').innerText = ethers.utils.formatEther(fee);
            
            if (userAddress) {
                updatePlayerHistory(contractReadOnly);
            }
        } catch (e) { console.error("Chain Read Error:", e); }
    }

async function checkRegistration(address) {
    const regRef = doc(db, "registrations", address.toLowerCase());
    const regSnap = await getDoc(regRef);

    if (regSnap.exists() && regSnap.data().paid === true) {
        // Player already paid for this round
        document.getElementById('depositBtn').disabled = true;
        document.getElementById('depositBtn').innerText = "REGISTERED ✅";
        document.getElementById('status-bar').innerText = "// ENTRY_DETECTED: READY_TO_RACE //";
    } else {
        document.getElementById('depositBtn').disabled = false;
        document.getElementById('depositBtn').innerText = "2. REGISTER CAR";
    }
}
    
    async function updatePlayerHistory(contractInstance) {
        try {
            const filter = contractInstance.filters.Deposit(userAddress);
            const logs = await contractInstance.queryFilter(filter, -5000);
            const list = document.getElementById('historyList');
            if (logs.length === 0) {
                list.innerHTML = "No registrations found.";
            } else {
                list.innerHTML = logs.reverse().slice(0, 3).map(log => `
                    <div class="history-item">
                        <span>BLOCK ${log.blockNumber}</span>
                        <span style="color: #2ecc71;">SUCCESS</span>
                    </div>
                `).join('');
            }
        } catch (e) { console.error("History Error:", e); }
    }

    document.getElementById('connectBtn').onclick = async () => {
        if (!window.ethereum) return alert("Please install MetaMask");
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAddress = accounts[0];
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        contract = new ethers.Contract(contractAddress, abi, signer);
        
        document.getElementById('connectBtn').innerText = "CONNECTED";
        document.getElementById('depositBtn').disabled = false;
        document.getElementById('player-history').style.display = "block";
        refreshBlockchainData();
    };

document.getElementById('depositBtn').onclick = async () => {
    try {
        const snap = await getDoc(doc(db, "vault", "stats"));
        const round = snap.data().currentRound;
        const statsSnap = await getDoc(doc(db, "vault", "stats"));
        const currentRound = statsSnap.data().currentRound;

        const fee = await contract.entranceFee();
        const tx = await contract.payEntranceFee({ value: fee });
        await tx.wait();

        // Save the registration with the current Round ID
        await setDoc(doc(db, "registrations", userAddress.toLowerCase()), {
            paid: true,
            lastPaidRound: round
            lastPaidRound: currentRound
        });

        await updateDoc(doc(db, "vault", "stats"), { carCount: increment(1) });
    } catch (e) { console.error(e); }
};

    document.getElementById('claimBtn').onclick = async () => {
        try {
            document.getElementById('status-bar').innerText = "// VERIFYING_WINNER_CREDENTIALS... //";
            
            // Get winner amount from Firebase state
            const snap = await ethers.utils.fetchJson(`${window.location.origin}/prize-check-placeholder`); // Or just use data from snapshot
            // For now, using a fixed amount or getting it from Firebase logic
            const prizeAmt = document.getElementById('prizeDisplay').innerText.split(' ')[0];

            const response = await fetch(`${RENDER_URL}/get-signature?playerAddress=${userAddress}&amount=${prizeAmt}`);
            const data = await response.json();

            const tx = await contract.claimPrize(data.amountWei, data.signature);
            document.getElementById('status-bar').innerText = "// WITHDRAWING_PRIZE... //";
            await tx.wait();
            
            document.getElementById('status-bar').innerText = "// PRIZE_SECURED_IN_WALLET //";
            
            // Auto-reset winner to none in Firebase after successful claim
            await updateDoc(doc(db, "vault", "stats"), { winner: "none" });
        } catch (e) { 
            document.getElementById('status-bar').innerText = "// CLAIM_ERROR_CHECK_CONSOLE //"; 
            console.error(e);
        }
    };

    window.addEventListener('load', refreshBlockchainData);
    setInterval(refreshBlockchainData, 10000);
</script>
</body>
</html>
