<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Race Constants Engine</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00ffcc; --gold: #ffcc00; --danger: #ff4b2b; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: #0b0e14; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; text-align: center; }
        .btn-connect { background: #f6851b; color: white; padding: 15px 30px; font-size: 1.2rem; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; }
        #admin-ui { display: none; width: 100%; max-width: 1000px; flex-direction: column; gap: 20px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; }
        .flex-row { display: flex; gap: 15px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
        input[type="number"] { background: #000; border: 1px solid var(--accent); color: var(--accent); padding: 8px; border-radius: 5px; width: 65px; text-align: center; }
        select { background: #000; color: white; border: 1px solid var(--accent); padding: 8px; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; text-align: center; }
        th, td { border: 1px solid rgba(255,255,255,0.1); padding: 6px; }
        th { background: rgba(0,255,204,0.1); color: var(--accent); }
        .btn-save { background: var(--accent); color: #00334e; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
        .btn-sim { background: var(--gold); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="auth-screen">
        <h1>ENGINE ACCESS</h1>
        <button class="btn-connect" id="connectBtn">Connect MetaMask</button>
    </div>

    <div id="admin-ui">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Race Constants Engine</h1>
            <button class="btn-sim" style="background:#444; color:white;" onclick="window.location.href='master.html'">Back to Master</button>
        </div>

        <div class="card">
            <h3>1. Global Random Variance (L1, L2)</h3>
            <div class="flex-row">
                L1: <input type="number" id="l1_input"> L2: <input type="number" id="l2_input">
            </div>
        </div>

        <div class="card">
            <h3>2. Trait Logic & Distance Tables</h3>
            <div id="tables-container">Loading...</div>
        </div>

        <div class="card" style="border-left: 4px solid var(--accent);">
            <h3>3. HP Fatigue & Healing Constants</h3>
            <div class="flex-row">
                <div>Drain Min: <input type="number" id="hp_drain_min" step="0.1"> Max: <input type="number" id="hp_drain_max" step="0.1"></div>
                <div>Heal Min: <input type="number" id="hp_heal_min" step="0.1"> Max: <input type="number" id="hp_heal_max" step="0.1"></div>
            </div>
        </div>

        <button class="btn-save" onclick="saveAllToFirebase()">💾 UPDATE ALL ENGINE CONSTANTS</button>

        <div class="card">
            <h3>4. Logic Simulator</h3>
            <div id="sim-result">Ready for test...</div>
            <button class="btn-sim" onclick="runSimulation()">RUN TEST</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const ADMIN_WALLET = "0xCe9782f77eC560a1Cb329F935b5D416AA41f1a5d".toLowerCase();
        const firebaseConfig = { apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('connectBtn').onclick = async () => {
            if (window.ethereum) {
                const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (accs[0].toLowerCase() === ADMIN_WALLET) {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('admin-ui').style.display = 'flex';
                    loadData();
                }
            }
        };

        function loadData() {
            onValue(ref(db, 'race_constants'), (snap) => {
                const d = snap.val(); if(!d) return;
                document.getElementById('l1_input').value = d.limits?.l1 ?? 5;
                document.getElementById('l2_input').value = d.limits?.l2 ?? 15;
                document.getElementById('hp_drain_min').value = d.hp_settings?.drain?.min ?? 5;
                document.getElementById('hp_drain_max').value = d.hp_settings?.drain?.max ?? 12;
                document.getElementById('hp_heal_min').value = d.hp_settings?.heal?.min ?? 8;
                document.getElementById('hp_heal_max').value = d.hp_settings?.heal?.max ?? 13;
                if(d.traits) renderTables(d.traits);
            });
        }

        function renderTables(traits) {
            let html = "";
            for (let t in traits) {
                html += `<h4>${t.toUpperCase()}</h4><table><tr><th>Lv</th>`;
                const conds = Object.keys(traits[t]);
                conds.forEach(c => html += `<th>${c}</th>`);
                html += `</tr>`;
                for (let i = 0; i < 10; i++) {
                    html += `<tr><td>${i+1}</td>`;
                    conds.forEach(c => html += `<td><input type="number" class="engine-val" data-t="${t}" data-c="${c}" data-i="${i}" value="${traits[t][c][i]||0}"></td>`);
                    html += `</tr>`;
                }
                html += `</table>`;
            }
            document.getElementById('tables-container').innerHTML = html;
        }

        window.saveAllToFirebase = () => {
            const data = { 
                limits: { l1: parseInt(document.getElementById('l1_input').value), l2: parseInt(document.getElementById('l2_input').value) },
                hp_settings: {
                    drain: { min: parseFloat(document.getElementById('hp_drain_min').value), max: parseFloat(document.getElementById('hp_drain_max').value) },
                    heal: { min: parseFloat(document.getElementById('hp_heal_min').value), max: parseFloat(document.getElementById('hp_heal_max').value) }
                },
                traits: {} 
            };
            document.querySelectorAll('.engine-val').forEach(el => {
                const { t, c, i } = el.dataset;
                if(!data.traits[t]) data.traits[t] = {};
                if(!data.traits[t][c]) data.traits[t][c] = [];
                data.traits[t][c][parseInt(i)] = parseInt(el.value);
            });
            set(ref(db, 'race_constants'), data).then(() => alert("Saved!"));
        };

        window.runSimulation = () => { alert("Check Console/Master for results"); };
    </script>
</body>
</html>
